<!DOCTYPE html>
<html><head><title>Sprite Diagnostic</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:20px">
<h2>1. Direct img tag (no JS)</h2>
<div style="display:flex;gap:10px;flex-wrap:wrap">
  <div><img src="assets/Pokemon/pokemondb_hd_alt2/0025_pikachu.webp" style="width:60px;height:60px;background:#333" onerror="this.alt='FAIL'"><br>pikachu</div>
  <div><img src="assets/Pokemon/pokemondb_hd_alt2/0172_pichu.webp" style="width:60px;height:60px;background:#333" onerror="this.alt='FAIL'"><br>pichu</div>
  <div><img src="assets/Pokemon/pokemondb_hd_alt2/0004_charmander.webp" style="width:60px;height:60px;background:#333" onerror="this.alt='FAIL'"><br>charmander</div>
</div>

<h2>2. Load game.js dependencies and test functions</h2>
<pre id="log" style="color:#4ade80;font-size:12px;max-height:300px;overflow:auto"></pre>

<h2>3. attachSpriteCascade test</h2>
<div id="cascade-test" style="display:flex;gap:10px;flex-wrap:wrap"></div>

<h2>4. Simulated family selector card</h2>
<div id="fam-test" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;padding:10px 0"></div>

<script>
const log = (msg) => { document.getElementById('log').textContent += msg + '\n'; console.log(msg); }
</script>

<!-- Load the SAME scripts as index.html, in the same order -->
<script src="games/data/poke-sprite-loader.js?v=20260502b"></script>
<script src="game.js?v=20260502b"></script>

<script>
// Test 2: Check if functions exist and what they return
log('=== Function availability ===')
log('pokeSpriteAlt2: ' + (typeof pokeSpriteAlt2))
log('attachSpriteCascade: ' + (typeof attachSpriteCascade))
log('buildPokeSources: ' + (typeof buildPokeSources))
log('POKE_IDS type: ' + (typeof POKE_IDS))
log('window.POKE_IDS type: ' + (typeof window.POKE_IDS))

if (typeof POKE_IDS !== 'undefined') {
  log('POKE_IDS.pikachu = ' + POKE_IDS['pikachu'])
  log('POKE_IDS.pichu = ' + POKE_IDS['pichu'])
  log('POKE_IDS.charmander = ' + POKE_IDS['charmander'])
  log('POKE_IDS entries: ' + Object.keys(POKE_IDS).length)
} else {
  log('ERROR: POKE_IDS is undefined!')
}

log('\n=== pokeSpriteAlt2 outputs ===')
if (typeof pokeSpriteAlt2 === 'function') {
  log('pikachu: ' + pokeSpriteAlt2('pikachu'))
  log('pichu: ' + pokeSpriteAlt2('pichu'))
  log('charmander: ' + pokeSpriteAlt2('charmander'))
} else {
  log('ERROR: pokeSpriteAlt2 is not a function!')
}

log('\n=== buildPokeSources outputs ===')
if (typeof buildPokeSources === 'function') {
  log('pikachu: ' + JSON.stringify(buildPokeSources('pikachu', null)))
  log('pichu: ' + JSON.stringify(buildPokeSources('pichu', null)))
} else {
  log('ERROR: buildPokeSources is not a function!')
}

// Test 3: attachSpriteCascade
log('\n=== attachSpriteCascade test ===')
const ct = document.getElementById('cascade-test')
const slugs = ['pikachu', 'pichu', 'charmander', 'bulbasaur']
slugs.forEach(slug => {
  const div = document.createElement('div')
  const img = document.createElement('img')
  img.style.cssText = 'width:60px;height:60px;background:#333'
  div.appendChild(img)
  div.appendChild(document.createTextNode(slug))
  ct.appendChild(div)
  
  if (typeof attachSpriteCascade === 'function' && typeof buildPokeSources === 'function') {
    const sources = buildPokeSources(slug, null)
    log('Cascade ' + slug + ': ' + JSON.stringify(sources))
    attachSpriteCascade(img, sources, '❓', function(el) {
      log('Cascade LOADED: ' + slug + ' → ' + el.src.substring(el.src.lastIndexOf('/') + 1))
    })
  } else {
    log('ERROR: cascade functions not available for ' + slug)
  }
})

// Test 4: Simulated family card (same HTML as openG13FamilySelector)
log('\n=== Family selector simulation ===')
const ft = document.getElementById('fam-test')
const pokeImg = (slug) => (typeof pokeSpriteAlt2 === 'function' && pokeSpriteAlt2(slug)) || 'https://img.pokemondb.net/sprites/home/normal/' + slug + '.png'
const testFams = [
  {label:'Pikachu (Ash)', icon:'⚡', color:'#FBBF24', player:{name:'Pichu',slug:'pichu'}, evolved:{name:'Pikachu',slug:'pikachu'}, evolved2:{name:'Raichu',slug:'raichu'}},
  {label:'Charizard (Ash)', icon:'🔥', color:'#F97316', player:{name:'Charmander',slug:'charmander'}, evolved:{name:'Charmeleon',slug:'charmeleon'}, evolved2:{name:'Charizard',slug:'charizard'}},
]
testFams.forEach(fam => {
  const src1 = pokeImg(fam.player.slug)
  const src2 = pokeImg(fam.evolved.slug)
  const src3 = pokeImg(fam.evolved2.slug)
  log('Card ' + fam.label + ': ' + src1 + ' | ' + src2 + ' | ' + src3)
  
  const card = document.createElement('div')
  card.style.cssText = 'background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.2);border-radius:14px;padding:12px;color:#fff;border-left:5px solid ' + fam.color
  card.innerHTML = `
    <div style="font-size:15px;font-weight:900;">${fam.icon} ${fam.label}</div>
    <div style="display:flex;gap:6px;align-items:center;margin-top:8px;">
      <img src="${src1}" alt="${fam.player.name}" style="width:38px;height:38px;background:rgba(0,0,0,0.25);border-radius:8px;padding:2px;object-fit:contain;" onerror="this.onerror=null;this.src='https://img.pokemondb.net/sprites/home/normal/${fam.player.slug}.png'">
      <span style="color:rgba(255,255,255,0.5);">→</span>
      <img src="${src2}" alt="${fam.evolved.name}" style="width:38px;height:38px;background:rgba(0,0,0,0.25);border-radius:8px;padding:2px;object-fit:contain;" onerror="this.onerror=null;this.src='https://img.pokemondb.net/sprites/home/normal/${fam.evolved.slug}.png'">
      <span style="color:rgba(255,255,255,0.5);">→</span>
      <img src="${src3}" alt="${fam.evolved2.name}" style="width:38px;height:38px;background:rgba(0,0,0,0.25);border-radius:8px;padding:2px;object-fit:contain;" onerror="this.onerror=null;this.src='https://img.pokemondb.net/sprites/home/normal/${fam.evolved2.slug}.png'">
    </div>
  `
  ft.appendChild(card)
})
</script>
</body></html>
