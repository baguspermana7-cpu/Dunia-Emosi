<!DOCTYPE html>
<html><head><title>Sprite Test</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:20px">
<h2>Direct WebP test</h2>
<div style="display:flex;gap:10px;flex-wrap:wrap">
  <div><img src="assets/Pokemon/pokemondb_hd_alt2/0025_pikachu.webp" style="width:80px;height:80px;background:#333" onerror="this.alt='FAIL'"><br>pikachu (local)</div>
  <div><img src="assets/Pokemon/pokemondb_hd_alt2/0172_pichu.webp" style="width:80px;height:80px;background:#333" onerror="this.alt='FAIL'"><br>pichu (local)</div>
  <div><img src="assets/Pokemon/pokemondb_hd_alt2/0004_charmander.webp" style="width:80px;height:80px;background:#333" onerror="this.alt='FAIL'"><br>charmander (local)</div>
  <div><img src="assets/Pokemon/pokemondb_hd_alt2/0001_bulbasaur.webp" style="width:80px;height:80px;background:#333" onerror="this.alt='FAIL'"><br>bulbasaur (local)</div>
</div>
<h2>CDN test</h2>
<div style="display:flex;gap:10px;flex-wrap:wrap">
  <div><img src="https://img.pokemondb.net/sprites/home/normal/pikachu.png" style="width:80px;height:80px;background:#333" onerror="this.alt='FAIL'"><br>pikachu (CDN)</div>
  <div><img src="https://img.pokemondb.net/sprites/home/normal/charmander.png" style="width:80px;height:80px;background:#333" onerror="this.alt='FAIL'"><br>charmander (CDN)</div>
</div>
<h2>SVG test</h2>
<div style="display:flex;gap:10px;flex-wrap:wrap">
  <div><img src="assets/Pokemon/svg/25.svg" style="width:80px;height:80px;background:#333" onerror="this.alt='FAIL'"><br>pikachu (SVG)</div>
  <div><img src="assets/Pokemon/svg/4.svg" style="width:80px;height:80px;background:#333" onerror="this.alt='FAIL'"><br>charmander (SVG)</div>
</div>
<h2>JS-generated (same as game code)</h2>
<div id="js-test" style="display:flex;gap:10px;flex-wrap:wrap"></div>
<script>
const slugs = ['pikachu','pichu','charmander','bulbasaur','squirtle','charizard'];
const ids = {pikachu:25,pichu:172,charmander:4,bulbasaur:1,squirtle:7,charizard:6};
const d = document.getElementById('js-test');
slugs.forEach(slug => {
  const id = ids[slug];
  const path = 'assets/Pokemon/pokemondb_hd_alt2/' + String(id).padStart(4,'0') + '_' + slug + '.webp';
  const div = document.createElement('div');
  const img = document.createElement('img');
  img.src = path;
  img.style.cssText = 'width:80px;height:80px;background:#333';
  img.onerror = function() { this.alt = 'FAIL: ' + path; document.getElementById('errors').textContent += 'FAIL: ' + path + '\\n'; };
  img.onload = function() { document.getElementById('success').textContent += 'OK: ' + path + '\\n'; };
  div.appendChild(img);
  div.appendChild(document.createTextNode(slug));
  d.appendChild(div);
});
</script>
<h3>Load results:</h3>
<pre id="success" style="color:#4ade80"></pre>
<pre id="errors" style="color:#ef4444"></pre>
</body></html>
