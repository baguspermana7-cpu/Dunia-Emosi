<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Pokemon Bawah Laut 🌊</title>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100svh;overflow:hidden;background:linear-gradient(180deg,#0077B6 0%,#00B4D8 60%,#023E8A 100%);font-family:'Fredoka One',Arial,sans-serif;touch-action:none}
#pixi-canvas{position:fixed;inset:0;width:100vw;height:100svh;display:block}

/* HUD */
#hud-top{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;gap:clamp(4px,1.5vw,10px);padding:max(14px,env(safe-area-inset-top)) clamp(14px,3vw,18px) 8px;background:linear-gradient(180deg,rgba(0,10,40,0.85) 0%,transparent 100%);pointer-events:none}
#btn-back{background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.22);border-radius:12px;color:#fff;padding:7px 12px;font-size:15px;cursor:pointer;font-family:inherit;pointer-events:all;flex-shrink:0}
#game-badge{background:rgba(0,0,0,0.45);border:1.5px solid rgba(0,180,216,0.55);border-radius:10px;padding:5px 10px;color:#7dd3fc;font-size:clamp(10px,3vw,13px);font-weight:700;flex-shrink:0;white-space:nowrap}
#hud-center{flex:1;text-align:center;min-width:0}
#level-text{font-size:12px;color:#7dd3fc;font-weight:700}
#status-text{font-size:clamp(13px,4vw,18px);font-weight:900;color:#fff}
#hud-lives{font-size:clamp(14px,4vw,20px);flex-shrink:0}
#pipe-progress{font-size:clamp(11px,3vw,14px);color:#86efac;font-weight:700;flex-shrink:0}

/* Quiz Panel */
#quiz-panel{position:fixed;bottom:0;left:0;right:0;z-index:200;display:none;flex-direction:column;align-items:center;padding:clamp(10px,3vh,16px) clamp(12px,4vw,20px) clamp(16px,5vh,26px);background:linear-gradient(0deg,rgba(0,5,30,0.98) 0%,rgba(0,15,55,0.96) 100%);border-top:3px solid #0ea5e9;backdrop-filter:blur(14px)}
#quiz-panel.show{display:flex}
#quiz-title{color:#0ea5e9;font-size:10px;font-weight:700;letter-spacing:3px;margin-bottom:4px;animation:dangerPulse .8s ease-in-out infinite}
@keyframes dangerPulse{50%{opacity:.4}}
#quiz-question{color:#fff;font-size:clamp(22px,6.5vw,34px);font-weight:900;text-align:center;margin-bottom:clamp(10px,3vh,16px);text-shadow:0 0 20px rgba(14,165,233,0.6)}
#quiz-choices{display:flex;gap:clamp(6px,2vw,12px);justify-content:center;width:100%;flex-wrap:wrap}
.choice-btn{flex:1;min-width:clamp(52px,15vw,80px);max-width:clamp(68px,24vw,120px);padding:clamp(10px,3.5vh,18px) 4px;border:2.5px solid rgba(255,255,255,0.35);border-radius:16px;background:linear-gradient(160deg,#0369A1,#0284C7);color:#fff;font-size:clamp(16px,5.5vw,26px);font-weight:900;cursor:pointer;transition:all .12s;font-family:inherit;-webkit-tap-highlight-color:transparent;box-shadow:0 5px 0 #075985}
.choice-btn:nth-child(2){background:linear-gradient(160deg,#E85A32,#C84020);border-color:#F07050;box-shadow:0 5px 0 #9A2A10}
.choice-btn:nth-child(3){background:linear-gradient(160deg,#2DBF7E,#1A9E66);border-color:#50E0A0;box-shadow:0 5px 0 #0A7A48}
.choice-btn:nth-child(4){background:linear-gradient(160deg,#F59E0B,#D97706);border-color:#FCD34D;box-shadow:0 5px 0 #92400E}
.choice-btn:active{transform:scale(.91) translateY(4px);box-shadow:0 1px 0 #075985}
.choice-btn.correct{border-color:#4ade80;background:rgba(74,222,128,0.3);animation:correctFlash .4s ease}
.choice-btn.wrong{border-color:#ef4444;background:rgba(239,68,68,0.3);animation:wrongShake .35s ease}
@keyframes correctFlash{0%{transform:scale(1.1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes wrongShake{0%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}100%{transform:translateX(0)}}

/* Flash */
#flash{position:fixed;inset:0;z-index:99;pointer-events:none;opacity:0;transition:opacity .08s}

/* Start Overlay */
#start-overlay{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,5,30,0.92);backdrop-filter:blur(8px)}
#start-overlay.hidden{display:none}
#start-icon{font-size:64px;filter:drop-shadow(0 4px 16px rgba(0,180,216,0.5))}
#start-title{font-size:clamp(22px,6.5vw,34px);font-weight:900;color:#7dd3fc}
#start-level{font-size:16px;color:#38bdf8}
#start-region{font-size:13px;color:#0ea5e9;background:rgba(14,165,233,0.15);border-radius:10px;padding:4px 12px}
#start-hint{font-size:16px;color:#86efac;animation:hintPulse 1.5s ease-in-out infinite}
@keyframes hintPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.96)}}

/* Pause Overlay */
#pause-overlay{position:fixed;inset:0;z-index:350;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,5,30,0.93);backdrop-filter:blur(8px)}

/* Bag Overlay */
#bag-overlay{position:fixed;inset:0;z-index:400;display:none;flex-direction:column;align-items:stretch;background:rgba(0,5,30,0.97);backdrop-filter:blur(12px)}
#bag-header{padding:max(18px,env(safe-area-inset-top)) 16px 0;text-align:center;font-size:20px;font-weight:900;color:#fbbf24;flex-shrink:0}
#bag-region-tabs{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#bag-region-tabs::-webkit-scrollbar{display:none}
.bag-tab{padding:7px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#9ca3af;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:all .15s}
.bag-tab.active{background:rgba(0,180,216,0.25);border-color:rgba(0,180,216,0.6);color:#7dd3fc}
.bag-tab.locked{opacity:.45;cursor:default}
#bag-grid{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:8px;padding:10px 12px;overflow-y:auto;align-content:start}
#bag-footer{padding:12px 16px max(16px,env(safe-area-inset-bottom));flex-shrink:0}

/* NPC sea creatures */
.sea-npc-wrap{position:fixed;z-index:38;pointer-events:none}
.sea-npc-inner{display:inline-block}

/* Magikarp micro-wiggle — rotate is independent of transform, no positioning conflict */
@keyframes swimWiggle{0%,100%{rotate:-5deg}25%,75%{rotate:0deg}50%{rotate:5deg}}
.swim-wiggle{animation:swimWiggle 0.44s ease-in-out infinite}
/* Upright-pose Pokemon (Buizel, Floatzel): rotate 90deg so they appear
   horizontal with head pointing right (swim direction). Pokemon Showdown
   sprites anchor the body in the LOWER half of the bounding box (transparent
   space at top), so we pivot around (50%, 75%) — the Pokemon body's actual
   center — to keep the visual center aligned with the player's anchor point. */
.swim-rotate{rotate:90deg;transform-origin:50% 75%}
@keyframes swimWiggleRot{0%,100%{rotate:85deg}25%,75%{rotate:90deg}50%{rotate:95deg}}
.swim-rotate.swim-wiggle{animation:swimWiggleRot 0.44s ease-in-out infinite}
/* Staryu/Starmie spinning star micro-animation */
@keyframes starSpin{0%{rotate:0deg}100%{rotate:360deg}}
.swim-starspin{animation:starSpin 4s linear infinite}
</style>
</head>

    <button onclick="togglePause()" style="padding:12px 24px;border-radius:14px;border:2px solid #4ade80;background:rgba(34,197,94,0.25);color:#4ade80;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit">▶ Lanjut</button>
    <button onclick="document.getElementById('pause-overlay').style.display='none';openBag()" style="padding:12px 24px;border-radius:14px;border:2px solid #fbbf24;background:rgba(251,191,36,0.15);color:#fbbf24;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit">🎒 Ganti Pokemon</button>

  </div>
</div>

<div id="start-overlay">

let audioCtx
function ensureAudio() { if (!audioCtx) try { audioCtx = new (window.AudioContext||window.webkitAudioContext)() } catch(_){} }
function playTone(freq, dur, type='sine', vol=0.12) {
  if (!audioCtx) return
  const o=audioCtx.createOscillator(), g=audioCtx.createGain()
  o.type=type; o.frequency.value=freq; g.gain.value=vol
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+dur/1000)
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur/1000)
}
function sfxSwim()    { playTone(350,60,'sine',0.08); setTimeout(()=>playTone(500,50,'sine',0.06),25) }

let lightRayGfx = null
function drawBackground() {
  // Gradient layers
  const sky = new PIXI.Graphics()
  sky.rect(0,0,W,H).fill(THEME.skyTop)
  sky.rect(0,H*0.3,W,H*0.7).fill({ color:THEME.skyMid, alpha:0.6 })
  sky.rect(0,H*0.6,W,H*0.4).fill({ color:THEME.skyBot, alpha:0.5 })
  bgContainer.addChild(sky)

  // Subtle light rays from top
  lightRayGfx = new PIXI.Graphics()
  const numRays = 6
  for (let i=0; i<numRays; i++) {
    const rx = (W/(numRays+1)) * (i+1) + (Math.random()-0.5)*60
    const rw = 24 + Math.random()*36
    const slant = (Math.random()-0.5)*0.22
    lightRayGfx.poly([
      rx-rw/2, 0,
      rx+rw/2, 0,
      rx+rw/2+H*slant, H*0.7,
      rx-rw/2+H*slant, H*0.7
    ]).fill({ color:THEME.lightColor, alpha:THEME.lightAlpha })
  }
  bgContainer.addChild(lightRayGfx)
}

const bubbles = []
function initBubbles() {
  for (let i=0; i<22; i++) {
    const r = 1.5 + Math.random()*4
    const b = {
      x: Math.random()*W,
      y: FLOOR_Y - Math.random()*H*0.8, // pre-scatter
      r, vy: 0.45 + Math.random()*1.1,
      swayPhase: Math.random()*Math.PI*2,
      swayAmp: 4 + Math.random()*9,
      alpha: 0.18 + Math.random()*0.35,
      gfx: new PIXI.Graphics()
    }
    b.gfx.circle(0,0,b.r).fill({ color:THEME.ambientBubble, alpha:b.alpha })
    b.gfx.circle(-b.r*0.3,-b.r*0.4,b.r*0.28).fill({ color:0xffffff, alpha:b.alpha*0.5 })
    bgContainer.addChild(b.gfx)
    bubbles.push(b)
  }
}
function updateBubbles(dt) {
  for (const b of bubbles) {
    b.y -= b.vy * dt
    b.swayPhase += 0.028
    b.x += Math.sin(b.swayPhase) * b.swayAmp * 0.08
    if (b.y < -20) { b.y = FLOOR_Y + 8; b.x = Math.random()*W }
    b.gfx.x = b.x; b.gfx.y = b.y
  }
}

function spawnNPC() {
  if (activeNPCs.length >= NPC_CAP) return
  const t = NPC_TYPES[Math.floor(Math.random()*NPC_TYPES.length)]
  const wrap = document.createElement('div'); wrap.className='sea-npc-wrap'
  const inner = document.createElement('div'); inner.className='sea-npc-inner'
  // Face direction: NPCs move LEFT, so flip default-right-facing emoji/sprite
  // to face LEFT via scaleX(-1). Showdown sprites already face LEFT — only flip emoji.
  if (t.img) {
    const imgEl = document.createElement('img')
    imgEl.src = t.img
    // No mix-blend-mode for transparent PNG/GIF (Showdown sprites have alpha)
    imgEl.style.cssText = `width:${t.sz}px;height:auto;display:block;pointer-events:none;opacity:0.92`
    imgEl.onerror = () => { inner.textContent='🐟'; inner.style.fontSize=t.sz+'px'; inner.style.transform='scaleX(-1)' }
    inner.appendChild(imgEl)
  } else {
    inner.textContent = t.e
    // Emojis face right by default — flip to face left (movement direction)
    inner.style.cssText = `font-size:${t.sz}px;line-height:1;transform:scaleX(-1);display:inline-block`
  }
  wrap.appendChild(inner)
  // Benthic creatures (crab) sit on the seafloor; others scatter mid-water
  const startY = t.benthic
    ? FLOOR_Y - t.sz * 0.7
    : 60 + Math.random()*(FLOOR_Y-130)
  wrap.style.cssText = `position:fixed;z-index:38;pointer-events:none;left:${W+50}px;top:${startY}px`
  document.body.appendChild(wrap)
  activeNPCs.push({
    el: wrap, x: W+50, baseY: startY,
    phase: Math.random()*Math.PI*2,
    speed: t.sp * (0.65+Math.random()*0.7),
    bobAmp: t.bAmp, bobFreq: t.bFq, type:t
  })
}

function updateNPCs(dt) {
  for (let i=activeNPCs.length-1; i>=0; i--) {
    const n=activeNPCs[i]
    n.x -= n.speed * dt
    n.phase += n.bobFreq
    const y = n.baseY + Math.sin(n.phase)*n.bobAmp
    n.el.style.left = n.x+'px'
    n.el.style.top  = y+'px'
    if (n.x < -70) { document.body.removeChild(n.el); activeNPCs.splice(i,1) }
  }
}

  wrap.appendChild(inner)
  const startY = H * 0.2 + Math.random() * (FLOOR_Y * 0.4)
  wrap.style.cssText = `position:fixed;z-index:37;pointer-events:none;left:${W+120}px;top:${startY}px`
  document.body.appendChild(wrap)
  activeMegaNPCs.push({
    el: wrap, inner, x: W+120, baseY: startY,
    phase: Math.random()*Math.PI*2,
    speed: 1.2,
    bobAmp: 12, bobFreq: 0.015, type:'whale',
    wakeX: [], wakePhases: Array.from({length:4},()=>Math.random()*Math.PI*2)
  })
}

function spawnDiver() {
  if (_diversInFlight() >= DIVER_INFLIGHT_MAX) return
  _diverSpawnCount++
  const wrap = document.createElement('div')
  wrap.className = 'sea-npc-wrap'
  const inner = document.createElement('div')
  // Use 🏊‍♂️ (person swimming) — has a full body, not just a mask.
  // Faces left (movement direction) via scaleX(-1).
  inner.style.cssText = 'font-size:42px;line-height:1;display:inline-block;transform:scaleX(-1)'
  inner.textContent = '🏊‍♂️'
  wrap.appendChild(inner)
  const startY = H * 0.25 + Math.random() * (FLOOR_Y * 0.35)
  wrap.style.cssText = `position:fixed;z-index:39;pointer-events:none;left:${W+60}px;top:${startY}px`
  document.body.appendChild(wrap)
  activeMegaNPCs.push({
    el: wrap, x: W+60, baseY: startY,
    phase: Math.random()*Math.PI*2,
    speed: 0.8 + Math.random()*0.5,
    bobAmp: 18, bobFreq: 0.025, type:'diver'
  })
}

function updateMegaNPCs(dt) {
  for (let i=activeMegaNPCs.length-1; i>=0; i--) {
    const n=activeMegaNPCs[i]
    n.x -= n.speed * dt   // ALL mega-NPCs now move LEFT (right-to-left)
    n.phase += n.bobFreq
    const y = n.baseY + Math.sin(n.phase)*n.bobAmp
    n.el.style.left = n.x+'px'
    n.el.style.top  = y+'px'
    // Whale needs more clearance on left exit (sz=72)
    const exitX = n.type === 'whale' ? -160 : -70
    if (n.x < exitX) { document.body.removeChild(n.el); activeMegaNPCs.splice(i,1) }
  }
}

let _npcTimer=0
function spawnNPCLoop() {
  if (S.gameOver) return
  // Mutually exclusive spawn (one per cycle) keeps screen calm.
  // Probabilities: whale 6%, diver 5%, ambient ~89%.
  const r = Math.random()
  if (r < 0.06) spawnWhale()
  else if (r < 0.11) spawnDiver()
  else spawnNPC()
  // Slower cadence — 5-9.5s between spawns (was 2.2-5.7s)
  const delay = 5000 + Math.random()*4500
  _npcTimer = setTimeout(spawnNPCLoop, delay)
}
function clearNPCs() {
  clearTimeout(_npcTimer)
  for (const n of activeNPCs) { try { document.body.removeChild(n.el) } catch(_){} }
  activeNPCs.length = 0
  for (const n of activeMegaNPCs) { try { document.body.removeChild(n.el) } catch(_){} }
  activeMegaNPCs.length = 0
  _whaleSpawnCount = 0
  _diverSpawnCount = 0
}

// ══════════════════════════════════════════════════════════════
//  CLIFFS — stalactite (top) + stalagmite (bottom)
// ══════════════════════════════════════════════════════════════
function buildCliffs() {
  const startX = W + 100
  let prevGapY = H * 0.42
  const maxShift = H * 0.17
  for (let i=0; i<CLIFF_COUNT; i++) {
    const x = startX + i*CLIFF_SPACE
    const minGY = 100 + GAP_SIZE/2
    const maxGY = FLOOR_Y - 60 - GAP_SIZE/2
    let gapY = prevGapY + (Math.random()-0.5)*maxShift*2
    gapY = Math.max(minGY, Math.min(maxGY, gapY))
    prevGapY = gapY

    const cliff = {
      x, gapY, passed:false, hit:false, removing:false, alpha:1,
      topGfx: new PIXI.Graphics(),
      botGfx: new PIXI.Graphics(),
    }
    drawCliff(cliff.topGfx, 0, gapY - GAP_SIZE/2, true)
    drawCliff(cliff.botGfx, gapY + GAP_SIZE/2, FLOOR_Y, false)
    cliff.topGfx.x = x; cliff.botGfx.x = x
    worldContainer.addChild(cliff.topGfx)
    worldContainer.addChild(cliff.botGfx)

    // Collectible pearl in gap
    const pearl = new PIXI.Graphics()
    // Outer glow ring
    pearl.circle(0,0,14).stroke({ color: i%3===0 ? 0xfbbf24 : 0x7dd3fc, width:2, alpha:0.7 })
    // Inner white body
    pearl.circle(0,0,9).fill({ color:0xffffff, alpha:0.95 })
    // Highlight
    pearl.circle(-3,-3,3.5).fill({ color:0xffffff, alpha:0.7 })
    pearl._pearlPhase = Math.random()*Math.PI*2
    pearl._pearlColor = i%3===0 ? 0xfbbf24 : 0x7dd3fc
    pearl.anchor = { x:0, y:0 }
    pearl.x = x+CLIFF_W/2; pearl.y = gapY
    worldContainer.addChild(pearl)
    cliff.star = pearl; cliff.starCollected = false

    S.cliffs.push(cliff)
  }
}

function drawCliff(g, fromY, toY, isTop) {
  const col = THEME.rock
  const drk = THEME.shadow
  const spike = Math.min(52, (toY-fromY)*0.42)
  const bodyH = (toY-fromY) - spike

  if (isTop) {
    // Main body (flat top pressing down)
    if (bodyH > 0) g.rect(0, fromY, CLIFF_W, bodyH).fill(col)
    // Multiple irregular stalactite spikes pointing down
    if (spike > 0) {
      const numSpikes = 2 + Math.floor(Math.random()*2)  // 2 or 3 spikes
      const tipOffsets = [0.25, 0.5, 0.75].slice(0, numSpikes)
      const tipVariance = 0.12
      tipOffsets.forEach((frac) => {
        const sx = frac * CLIFF_W + (Math.random() - 0.5) * CLIFF_W * tipVariance
        const tipLen = spike * (0.6 + Math.random() * 0.4)
        const halfW = (CLIFF_W * 0.18) * (0.7 + Math.random() * 0.6)
        g.poly([sx - halfW, fromY + bodyH, sx + halfW, fromY + bodyH, sx, fromY + bodyH + tipLen]).fill(col)
      })
    }
    // Side shading
    g.rect(2, fromY, 6, bodyH).fill({ color:0xffffff, alpha:0.09 })
    g.rect(CLIFF_W-8, fromY, 8, bodyH).fill({ color:drk, alpha:0.18 })
    // Stratification lines
    for (let ly=fromY+20; ly<fromY+bodyH-8; ly+=22) g.rect(3,ly,CLIFF_W-6,1.5).fill({ color:drk, alpha:0.09 })
    // Bubble texture on side surface
    g.circle(2 + Math.random() * (CLIFF_W - 4), fromY + bodyH * 0.3, 3).fill({ color:0xffffff, alpha:0.08 })
    g.circle(2 + Math.random() * (CLIFF_W - 4), fromY + bodyH * 0.7, 2).fill({ color:0xffffff, alpha:0.06 })
    // Moss/algae at tip area
    g.ellipse(CLIFF_W/2-6, fromY+bodyH-2, 6, 3).fill({ color:THEME.moss, alpha:0.35 })
    g.ellipse(CLIFF_W/2+8, fromY+bodyH-3, 5, 2.5).fill({ color:THEME.moss, alpha:0.3 })
  } else {
    // Multiple irregular stalagmite spikes pointing up
    if (spike > 0) {
      const numSpikes = 2 + Math.floor(Math.random()*2)  // 2 or 3 spikes
      const tipOffsets = [0.25, 0.5, 0.75].slice(0, numSpikes)
      const tipVariance = 0.12
      tipOffsets.forEach((frac) => {
        const sx = frac * CLIFF_W + (Math.random() - 0.5) * CLIFF_W * tipVariance
        const tipLen = spike * (0.6 + Math.random() * 0.4)
        const halfW = (CLIFF_W * 0.18) * (0.7 + Math.random() * 0.6)
        g.poly([sx - halfW, fromY + tipLen, sx + halfW, fromY + tipLen, sx, fromY]).fill(col)
      })
    }
    // Main body
    const bodyStart = fromY + spike
    const bH = toY - bodyStart
    if (bH > 0) g.rect(0, bodyStart, CLIFF_W, bH).fill(col)
    // Side shading
    g.rect(2, bodyStart, 6, bH).fill({ color:0xffffff, alpha:0.09 })
    g.rect(CLIFF_W-8, bodyStart, 8, bH).fill({ color:drk, alpha:0.18 })
    for (let ly=bodyStart+20; ly<toY-8; ly+=22) g.rect(3,ly,CLIFF_W-6,1.5).fill({ color:drk, alpha:0.09 })
    // Bubble texture on side surface
    g.circle(2 + Math.random() * (CLIFF_W - 4), bodyStart + bH * 0.3, 3).fill({ color:0xffffff, alpha:0.08 })
    g.circle(2 + Math.random() * (CLIFF_W - 4), bodyStart + bH * 0.7, 2).fill({ color:0xffffff, alpha:0.06 })
    // Algae at tip area
    g.ellipse(CLIFF_W/2-7, fromY+spike+4, 6, 3).fill({ color:THEME.moss, alpha:0.35 })
  }
}

// ══════════════════════════════════════════════════════════════
//  SWIMMER (player pokemon — DOM img for animated GIF)
// ══════════════════════════════════════════════════════════════
function createSwimmer() {
  swimContainer = new PIXI.Container()
  swimContainer.x = SWIM_X; swimContainer.y = S.swimY

  const initPoke = G24_POKEMON[selectedPokemon].evo[0]
  const swimImg = document.createElement('img')
  swimImg.id = 'swimmer-gif'
  const initSz = Math.round(SWIMMER_SZ * initPoke.scale)
  swimImg.src = initPoke.src
  // Rotated sprites use translate -75% Y to place the (50%,75%) point at the
  // player anchor — matches transform-origin from .swim-rotate CSS so the
  // Pokemon body center (not image geometric center) sits at the anchor.
  const initTrY = initPoke.rotate ? '-75%' : '-50%'
  const flipPart = (!initPoke.rotate && initPoke.flip) ? ' scaleX(-1)' : ''
  swimImg.style.cssText = `position:fixed;z-index:40;pointer-events:none;width:min(${initSz}px,${Math.round(initPoke.scale*16)}vw);height:auto;aspect-ratio:1;object-fit:contain;max-height:28vh;filter:drop-shadow(0 0 10px rgba(0,180,216,0.65));image-rendering:auto;transform:translate(-50%,${initTrY})${flipPart};`
  swimImg.onerror = () => {
    if (initPoke.hd && swimImg.src !== initPoke.hd) { swimImg.src = initPoke.hd; return }
    const em = initPoke.emoji || '🐟'
    swimImg.outerHTML = `<div id="swimmer-gif" style="position:fixed;z-index:40;pointer-events:none;font-size:${initSz}px;transform:translate(-50%,-50%);filter:drop-shadow(0 0 12px rgba(0,180,216,0.7))">${em}</div>`
    window._swimImg = document.getElementById('swimmer-gif')
  }
  document.body.appendChild(swimImg)
  if (initPoke.wiggle) swimImg.classList.add('swim-wiggle')
  if (initPoke.spin)   swimImg.classList.add('swim-starspin')
  if (initPoke.rotate) swimImg.classList.add('swim-rotate')
  window._swimImg = swimImg

  // Invisible anchor
  swimGfx = new PIXI.Graphics()
  swimGfx.circle(0,0,2).fill({ color:0xffffff, alpha:0 })

  // Glow ring (steady)
  const ring = new PIXI.Graphics()
  ring.circle(0,0,SWIMMER_SZ/2+4).stroke({ color:0x7dd3fc, width:1.5, alpha:0.22 })
  swimContainer.addChild(ring)

  // Ripple rings — 3 concentric expanding rings (underwater current effect)
  window._ripples = [
    { g: new PIXI.Graphics(), phase: 0 },
    { g: new PIXI.Graphics(), phase: Math.PI*0.66 },
    { g: new PIXI.Graphics(), phase: Math.PI*1.33 },
  ]
  for (const r of window._ripples) { swimContainer.addChild(r.g) }

  // Wake trail — 4 small bubble puffs trailing behind swimmer
  window._wakeParticles = Array.from({length:6}, ()=>({
    g: new PIXI.Graphics(), phase: Math.random()*Math.PI*2, life:0, maxLife:40+Math.random()*30
  }))
  for (const w of window._wakeParticles) {
    const sz = 1.5 + Math.random()*3
    w.sz = sz; w.offX = -(SWIMMER_SZ/3 + Math.random()*20); w.offY = (Math.random()-0.5)*14
    w.g.circle(0,0,sz).fill({ color:0xbfefff, alpha:0.5 })
    swimContainer.addChild(w.g)
  }

  swimContainer.addChild(swimGfx)
  worldContainer.addChild(swimContainer)
}

// ══════════════════════════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════════════════════════
function gameLoop(ticker) {
  S.frame++
  if (!S.running || S.paused || S.gameOver) {
    // Idle bob on start screen
    if (!S.started && swimContainer) {
      const bobY = S.swimY + Math.sin(S.frame*0.055)*9
      swimContainer.y = bobY
      syncSwimmerPos(bobY)
    }
    return
  }

  const dt = ticker.deltaTime

  // Physics
  S.swimVY += GRAVITY * dt
  S.swimVY  = Math.min(S.swimVY, MAX_FALL)
  S.swimY  += S.swimVY * dt
  S.swimY   = Math.max(S.swimY, 22)

  if (swimContainer) swimContainer.y = S.swimY

  // Sync DOM image
  syncSwimmerPos(S.swimY)

  // Light ray pulse
  if (lightRayGfx) lightRayGfx.alpha = 0.75 + Math.sin(S.frame*0.012)*0.25

  // Scroll cliffs + floor pebbles
  for (const c of S.cliffs) {
    if (c.removing) {
      c.alpha -= 0.035*dt
      c.topGfx.alpha = c.botGfx.alpha = c.alpha
      if (c.alpha <= 0) { c.topGfx.visible = false; c.botGfx.visible = false }
      continue
    }
    c.x -= CLIFF_SPEED*dt
    c.topGfx.x = c.botGfx.x = c.x
    if (c.star && !c.starCollected) c.star.x = c.x + CLIFF_W/2
  }
  for (const t of floorTiles) {
    t.x -= CLIFF_SPEED*dt
    if (t.x < -30) t.x += W*2
  }

  // Animate background
  updateBubbles(dt)
  updateSeaweed()
  updateNPCs(dt)
  updateMegaNPCs(dt)

  // Floor collision (gentle bounce — kid-friendly)
  if (S.swimY > FLOOR_Y - 14) {
    S.swimY = FLOOR_Y - 14
    S.swimVY = FLAP_POWER * 0.55
    flashScreen('#fbbf24')
  }

  // Evolution check
  const poke = G24_POKEMON[selectedPokemon]
  const maxEvo = poke.evo.length - 1
  const progress = S.cliffsPassed / S.totalCliffs
  const nextEvoAt = maxEvo >= 2 ? (S.evoStage===0 ? 0.33 : 0.66) : 0.5
  if (S.evoStage < maxEvo && progress >= nextEvoAt && !S.evolveTriggered && S.totalCliffs > 2) {
    S.evolveTriggered = true
    triggerEvolution()
  }

  // Ripple rings — expand outward, fade, reset
  if (window._ripples) {
    for (const r of window._ripples) {
      r.phase = (r.phase + 0.045) % (Math.PI * 2)
      const t = (Math.sin(r.phase) * 0.5 + 0.5) // 0→1 cycle
      const radius = (SWIMMER_SZ / 2 + 6) + t * 28
      const alpha = (1 - t) * 0.32
      r.g.clear()
      if (alpha > 0.01) r.g.circle(0, 0, radius).stroke({ color: THEME.lightColor, width: 1.5, alpha })
    }
  }
  // Wake trail particles — small bubbles drifting behind swimmer
  if (window._wakeParticles && S.running) {
    for (const w of window._wakeParticles) {
      w.life = (w.life + 1) % w.maxLife
      const t = w.life / w.maxLife
      w.g.x = w.offX - t * 18 + Math.sin(w.phase + t * Math.PI * 2) * 5
      w.g.y = w.offY - t * 8
      w.g.alpha = Math.sin(t * Math.PI) * 0.55
    }
  }

  // Pearl pulse animation
  if (S.running) {
    for (const c of S.cliffs) {
      if (!c.star || c.starCollected) continue
      c.star._pearlPhase = (c.star._pearlPhase||0) + 0.06
      const ps = 0.88 + Math.sin(c.star._pearlPhase)*0.12
      c.star.scale.set(ps)
    }
  }

  checkCollisions()

  // Win check
  const allDone = S.cliffs.every(c => c.passed || c.removing || !c.topGfx.visible || c.x < -200)
  if (allDone || S.cliffsPassed >= S.totalCliffs) showWin()

  updateHUD()
}

function syncSwimmerPos(y) {
  const img = window._swimImg
  if (!img) return
  const poke = G24_POKEMON[selectedPokemon]
  const stage = Math.min(S.evoStage||0, poke.evo.length-1)
  const evo = poke.evo[stage]
  // Per-Pokemon visual Y offset compensates for sprite weight asymmetry
  // (e.g., Eternatus' tall serpentine body sits low in its bounding box).
  // Hitbox unchanged — visual only.
  const offY = evo.centerOffsetY || 0
  img.style.left = SWIM_X + 'px'
  img.style.top  = (y + offY) + 'px'
  // Rotated sprites (Buizel/Floatzel) use transform-origin:50% 75% (.swim-rotate
  // CSS) so rotation pivots around the Pokemon body, not the image center.
  // Translate must match: -75% Y places the image's (50%,75%) point at the
  // player anchor — same point the rotation pivots around → Pokemon stays
  // centered. Non-rotated sprites use standard -50% (image center).
  const translateY = evo.rotate ? '-75%' : '-50%'
  // Skip scaleX flip for rotated sprites — rotation alone handles direction;
  // double-flipping a rotated sprite inverts the orientation back to wrong way.
  const _flipPart = (!evo.rotate && evo.flip) ? ' scaleX(-1)' : ''
  img.style.transform = `translate(-50%,${translateY})${_flipPart}`
}

// ══════════════════════════════════════════════════════════════
//  COLLISION
// ══════════════════════════════════════════════════════════════
function checkCollisions() {
  const bx=SWIM_X, by=S.swimY, br=SWIMMER_SZ/2-8
  for (const c of S.cliffs) {
    if (c.passed || c.hit || c.removing || !c.topGfx.visible) continue

    // Collect star when swimmer overlaps
    if (c.star && !c.starCollected) {
      if (Math.abs(bx-c.star.x)<22 && Math.abs(by-c.star.y)<22) {
        c.starCollected=true; S.correctAnswers++; c.star.visible=false; sfxScore()
        spawnFloatingText('💎',c.x+CLIFF_W/2,c.gapY-20,0xfbbf24)
      }
    }

    // Clean pass
    if (bx-br > c.x+CLIFF_W && !c.passed) {
      c.passed=true; S.cliffsPassed++; S.score++; sfxScore()
      spawnFloatingText('+1', c.x+CLIFF_W/2, c.gapY, 0x4ade80)
      continue
    }

    // Hit check
    if (bx+br > c.x && bx-br < c.x+CLIFF_W) {
      const activeGap = S.evolved ? GAP_EVO : GAP_SIZE
      const gapTop = c.gapY - activeGap/2
      const gapBot = c.gapY + activeGap/2
      if (by-br < gapTop || by+br > gapBot) {
        c.hit=true; S.paused=true; sfxHit(); flashScreen('#ef4444')
        S.currentCliff=c; showQuiz(c); return
      }
    }
  }
}

// ══════════════════════════════════════════════════════════════
//  QUIZ
// ══════════════════════════════════════════════════════════════
function showQuiz(cliff) {
  const q = S.questions[S.qIdx % S.questions.length]; S.qIdx++
  document.getElementById('quiz-question').textContent = q.q
  const ch = [q.ans, ...q.wrong].sort(()=>Math.random()-0.5)
  const el = document.getElementById('quiz-choices'); el.innerHTML=''
  let answered=false
  ch.forEach(c=>{
    const btn=document.createElement('button'); btn.className='choice-btn'; btn.textContent=c
    btn.onclick=()=>{
      if(answered) return; answered=true
      if(c===q.ans) {
        btn.classList.add('correct'); sfxCorrect(); S.correctAnswers++; S.score++
        cliff.removing=true; cliff.passed=true; S.cliffsPassed++
        setTimeout(()=>{
          document.getElementById('quiz-panel').classList.remove('show')
          S.paused=false; S.swimY=cliff.gapY; S.swimVY=0
          if(swimContainer) swimContainer.y=S.swimY
          spawnFloatingText('Benar! ⭐', SWIM_X, S.swimY-30, 0x4ade80)
          updateHUD()
        }, 600)
      } else {
        btn.classList.add('wrong'); sfxWrong(); S.wrongAnswers++
        el.querySelectorAll('.choice-btn').forEach(b=>{ if(b.textContent===q.ans) b.classList.add('correct') })
        setTimeout(()=>{
          document.getElementById('quiz-panel').classList.remove('show')
          S.paused=false; S.swimY=cliff.gapY; S.swimVY=0
          if(swimContainer) swimContainer.y=S.swimY
          cliff.removing=true; cliff.passed=true; S.cliffsPassed++
          spawnFloatingText('Coba lagi!', SWIM_X, S.swimY-30, 0xfbbf24)
          updateHUD()
        }, 1200)
      }
    }
    el.appendChild(btn)
  })
  document.getElementById('quiz-panel').classList.add('show')
  document.getElementById('status-text').textContent='Jawab Soal!'
}

// ══════════════════════════════════════════════════════════════
//  FLOATING TEXT
// ══════════════════════════════════════════════════════════════
function spawnFloatingText(text, x, y, color) {
  const t=new PIXI.Text({ text, style:{ fontSize:window.RZ?window.RZ.fontScale(22):22, fontWeight:'900', fontFamily:'Fredoka One', fill:color } })
  t.anchor.set(0.5); t.x=x; t.y=y; worldContainer.addChild(t)
  let life=42
  const tick=()=>{ life--; t.y-=1.4; t.alpha=life/42; if(life<=0){ worldContainer.removeChild(t); app.ticker.remove(tick) } }
  app.ticker.add(tick)
}

// ══════════════════════════════════════════════════════════════
//  EVOLUTION
// ══════════════════════════════════════════════════════════════
function triggerEvolution() {
  S.paused=true; S.evolved=true
  const themeHex = '#'+THEME.lightColor.toString(16).padStart(6,'0')
  flashScreen(themeHex)
  document.getElementById('status-text').textContent='Berevolusi...!'
  sfxCorrect(); setTimeout(sfxCorrect,200); setTimeout(sfxCorrect,400)

  S.evoStage = (S.evoStage||0) + 1
  setTimeout(()=>{
    applyPokemon(S.evoStage)
    spawnFloatingText('EVOLUSI! 🌊', SWIM_X, S.swimY-44, THEME.lightColor)
    flashScreen('#fbbf24')
    setTimeout(()=>{
      S.paused=false; S.evolveTriggered=false
      CLIFF_SPEED = CLIFF_SPEED * 0.87
      const eName = G24_POKEMON[selectedPokemon]?.evo[S.evoStage||0]?.name||'Pokemon'
      document.getElementById('status-text').textContent=eName+' Berevolusi!'
    }, 800)
  }, 1500)
}

// ══════════════════════════════════════════════════════════════
//  WIN
// ══════════════════════════════════════════════════════════════
function calcStars() {
  return GameScoring.calc({ correct:S.correctAnswers, total:S.correctAnswers+S.wrongAnswers, wrong:S.wrongAnswers, lives:S.lives, maxLives:3 })
}
function showWin() {
  if (S.gameOver) return
  S.running=false; S.gameOver=true; clearNPCs()
  try { const bgm=document.getElementById('game-bgm'); bgm.pause(); bgm.currentTime=0 } catch(_){}
  const stars=calcStars()
  try { sessionStorage.setItem('g24Result', JSON.stringify({ stars, level:S.level })) } catch(_){}
  if (typeof window.saveLevelProgress==='function') {
    window.saveLevelProgress('g24', S.level, stars)
  }
  // No fallback: save-engine.js MUST load. Writing slot-0 legacy key bypasses
  // the avatar-keyed scheme and corrupts progress for the active avatar.
  document.getElementById('status-text').textContent='Level Selesai!'
  sfxCorrect(); setTimeout(()=>sfxCorrect(),200)
  try { if(app&&app.ticker) app.ticker.stop() } catch(_){}

  setTimeout(()=>{
    const maxLevel = 40
    const nextLevel = S.level < maxLevel ? ()=>{
      try { sessionStorage.setItem('g24Config', JSON.stringify({ level:S.level+1 })) } catch(_){}
      location.reload()
    } : null
    const info = `${S.cliffsPassed}/${S.totalCliffs} rintangan | ⭐ ${S.correctAnswers} benar`
    const title = stars>=5?'Sempurna!':stars>=4?'Hebat!':stars>=3?'Bagus!':stars>=1?'Coba Lagi':'Gagal!'
    const emoji = stars>=5?'🏆':stars>=4?'🌟':stars>=3?'⭐':stars>=1?'💪':'😞'
    const msg = (stars>=5?`Luar biasa! Kamu penyelam terbaik! ${info}`:
                 stars>=4?`Kerja bagus! ${info}`:
                 stars>=3?`Lumayan, terus berlatih! ${info}`:
                 `Jangan menyerah, ayo coba lagi! ${info}`)
    GameModal.show({ emoji, title, stars, msg, onNext:nextLevel, onAgain:()=>location.reload(), onBack:()=>goBack() })
  }, 850)
}

// ══════════════════════════════════════════════════════════════
//  APPLY POKEMON (evo stage change)
// ══════════════════════════════════════════════════════════════
function refreshStartIcon() {
  const sp = G24_POKEMON[selectedPokemon].evo[0]
  const si = document.getElementById('start-icon')
  si.style.fontSize = ''
  si.innerHTML = ''
  const img = document.createElement('img')
  img.src = sp.hd || sp.src   // HD WebP always available; GIF only if hd missing
  // Upright-pose Pokemon (Buizel/Floatzel): rotate 90deg pivoting at (50%,75%)
  // for proper centering. Skip scaleX flip — rotation alone handles direction.
  const _rot = sp.rotate ? 'rotate:90deg;transform-origin:50% 75%;' : ''
  const _flip = (!sp.rotate && sp.flip) ? 'transform:scaleX(-1);' : ''
  img.style.cssText = `width:120px;height:120px;object-fit:contain;filter:drop-shadow(0 4px 24px rgba(0,180,216,0.7));${_rot}${_flip}`
  img.onerror = () => { si.textContent = '🌊' }
  si.appendChild(img)
}

function applyPokemon(evoStage) {
  const p = G24_POKEMON[selectedPokemon]
  const stage = Math.min(evoStage, p.evo.length-1)
  const evo = p.evo[stage]
  const img = document.getElementById('swimmer-gif')
  if (!img) return
  img.src = evo.src
  img.classList.toggle('swim-wiggle',   !!evo.wiggle)
  img.classList.toggle('swim-starspin', !!evo.spin)
  img.classList.toggle('swim-rotate',   !!evo.rotate)
  img.onerror = () => {
    if (evo.hd && img.src !== evo.hd) { img.src = evo.hd; return }
    const em = evo.emoji||'🐟'
    img.outerHTML = `<div id="swimmer-gif" style="position:fixed;z-index:40;pointer-events:none;font-size:${Math.round(SWIMMER_SZ*evo.scale)}px;transform:translate(-50%,-50%)${evo.flip?' scaleX(-1)':''};filter:drop-shadow(0 0 12px rgba(0,180,216,0.7))">${em}</div>`
    window._swimImg = document.getElementById('swimmer-gif')
  }
  const sz = Math.round(SWIMMER_SZ*evo.scale)
  img.style.width = `min(${sz}px,${Math.round(evo.scale*16)}vw)`
  img.style.filter = evoStage>0 ? 'drop-shadow(0 0 14px rgba(0,220,255,0.8))' : 'drop-shadow(0 0 10px rgba(0,180,216,0.65))'
  window._swimImg = img
}

// ══════════════════════════════════════════════════════════════
//  INPUT — tap to swim
// ══════════════════════════════════════════════════════════════
function swim() {
  if (S.gameOver) return
  ensureAudio()
  if (!S.started) {
    S.started=true; S.running=true
    document.getElementById('start-overlay').classList.add('hidden')
    document.getElementById('status-text').textContent='Berenang!'
    try {
      const bgm=document.getElementById('game-bgm')
      bgm.src = cfg.level%2===1 ? '../assets/Pokemon/sound/bgm-odd.mp3' : '../assets/Pokemon/sound/bgm-even.mp3'
      bgm.volume = ((document.getElementById('vol-master')?.value||80)/100) * ((document.getElementById('vol-bgm')?.value||50)/100)
      bgm.play().catch(()=>{})
    } catch(_){}
  }
  if (S.paused) return
  S.swimVY = FLAP_POWER
  sfxSwim()
}

document.addEventListener('pointerdown', e=>{
  if (e.target.closest('#quiz-panel')||e.target.closest('#hud-top')||e.target.closest('#btn-back')) return
  swim()
}, { passive:true })
window.addEventListener('keydown', e=>{
  if (e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); swim() }
})

// ══════════════════════════════════════════════════════════════
//  BAG — region tabs + grid
// ══════════════════════════════════════════════════════════════
let _bagTabActive = -1 // -1 = ALL tab; 0-3 = region tabs. Default: ALL
const REGION_LABELS = ['🌊 Semua','🏖 Kanto','🌊 Johto','🌊 Hoenn','❄️ Sinnoh']

function _g24HasPendingQuiz() { return !!(S.currentCliff && !S.currentCliff.passed) }

function openBag() {
  if (S.gameOver || _g24HasPendingQuiz()) return
  if (S.started && !S.paused) {
    S.paused=true; S.running=false
    document.getElementById('btn-pause').textContent='▶'
  }
  renderBagTabs()
  renderBagGrid()
  document.getElementById('bag-overlay').style.display='flex'
}
function closeBag() {
  document.getElementById('bag-overlay').style.display='none'
  if (_g24HasPendingQuiz()) {
    document.getElementById('quiz-panel').classList.add('show')
    document.getElementById('status-text').textContent='Jawab Soal!'
    S.paused=true; S.running=false
  } else if (S.started && !S.gameOver) {
    S.paused=false; S.running=true
    document.getElementById('btn-pause').textContent='⏸'
  }
}
function renderBagTabs() {
  const bar=document.getElementById('bag-region-tabs'); bar.innerHTML=''
  // Tab indices: -1=ALL, 0=Kanto, 1=Johto, 2=Hoenn, 3=Sinnoh
  const tabDefs = [
    { id:-1, lbl:'🌊 Semua', locked:false },
    { id:0,  lbl:'🏖 Kanto', locked:false },
    { id:1,  lbl:'🌊 Johto', locked:false },
    { id:2,  lbl:'🌊 Hoenn', locked:false },
    { id:3,  lbl:'❄️ Sinnoh', locked:!cfg.allUnlocked && cfg.level < 31 },
  ]
  tabDefs.forEach(({id, lbl, locked})=>{
    const t=document.createElement('button')
    t.className='bag-tab'+(id===_bagTabActive?' active':'')+(locked?' locked':'')
    t.textContent = locked ? '🔒 '+(lbl.split(' ')[1]||lbl) : lbl
    if (!locked) t.onclick=()=>{ _bagTabActive=id; renderBagTabs(); renderBagGrid() }
    bar.appendChild(t)
  })
}
function renderBagGrid() {
  const grid=document.getElementById('bag-grid'); grid.innerHTML=''
  const showAll = _bagTabActive === -1
  const pokes = showAll ? G24_POKEMON : G24_POKEMON.filter(p=>p.region===_bagTabActive)
  pokes.forEach(p=>{
    const idx = G24_POKEMON.indexOf(p)
    const regionUnlock = [1,11,21,31][p.region]
    const locked = !cfg.allUnlocked && cfg.level < regionUnlock
    const evo0 = p.evo[0]
    const isSelected = idx === selectedPokemon
    const card = document.createElement('div')
    card.style.cssText = `position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 6px;border-radius:14px;border:2px solid ${isSelected?'#fbbf24':'rgba(255,255,255,0.12)'};background:${isSelected?'rgba(251,191,36,0.12)':locked?'rgba(0,0,0,0.3)':'rgba(255,255,255,0.04)'};cursor:${locked?'default':'pointer'};opacity:${locked?'.55':'1'}`

    const img = document.createElement('img')
    // Always use HD WebP for bag display — looks great, always available
    img.src = evo0.hd || evo0.src
    // For rotate-pose Pokemon (Buizel/Floatzel): apply 90deg via `rotate` CSS property
    // pivoting at (50%,75%) so the Pokemon body (anchored bottom in Showdown sprites)
    // stays centered. Skip scaleX flip when rotated — rotation alone handles direction.
    const _rot = evo0.rotate ? 'rotate:90deg;transform-origin:50% 75%;' : ''
    const _flip = (!evo0.rotate && evo0.flip) ? 'scaleX(-1)' : 'none'
    img.style.cssText = `width:60px;height:60px;object-fit:contain;${_rot}transform:${_flip}`
    // Cascade fallback chain: hd → src (Showdown URL) → emoji
    img.onerror = () => {
      if (evo0.src && img.src !== evo0.src) { img.src = evo0.src; return }
      img.outerHTML = `<div style="font-size:36px;width:60px;height:60px;display:flex;align-items:center;justify-content:center">${evo0.emoji}</div>`
    }

    const nm = document.createElement('div')
    nm.style.cssText = 'font-size:10px;color:#e9d5ff;font-weight:700;text-align:center;word-break:break-word'
    nm.textContent = p.name

    const ev = document.createElement('div')
    ev.style.cssText = 'font-size:8px;color:#7dd3fc'
    ev.textContent = p.evo.length>2?'3x Evo':p.evo.length>1?'2x Evo':'Tetap'

    card.append(img, nm, ev)

    if (locked) {
      // Overlay lock badge — still show the Pokemon image
      const lkBadge = document.createElement('div')
      lkBadge.style.cssText = 'position:absolute;inset:0;border-radius:12px;background:rgba(0,0,0,0.55);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px'
      lkBadge.innerHTML = `<span style="font-size:22px">🔒</span><span style="font-size:8px;color:#9ca3af">Lv${regionUnlock}+</span>`
      card.appendChild(lkBadge)
    } else {
      card.onclick = () => {
        selectedPokemon=idx; S.evoStage=0; S.evolveTriggered=false; S.evolved=false
        applyPokemon(0)
        if (!S.started) refreshStartIcon()
        try { sessionStorage.setItem('g24Config', JSON.stringify({ level:cfg.level, pokemon:idx })) } catch(_){}
        closeBag()
      }
    }
    grid.appendChild(card)
  })
}

// ══════════════════════════════════════════════════════════════
//  PAUSE / NAVIGATION
// ══════════════════════════════════════════════════════════════
function togglePause() {
  if (S.gameOver || _g24HasPendingQuiz()) return
  if (S.paused) {
    S.paused=false; S.running=true
    document.getElementById('pause-overlay').style.display='none'
    document.getElementById('btn-pause').textContent='⏸'
  } else {
    S.paused=true; S.running=false
    document.getElementById('pause-overlay').style.display='flex'
    document.getElementById('btn-pause').textContent='▶'
  }
}
function goBack() {
  clearNPCs()
  S.currentCliff = null   // prevents stale _g24HasPendingQuiz() guard after navigation
  try { if(app&&app.ticker) app.ticker.stop() } catch(_){}
  history.back()
}

// HUD level + start text
document.getElementById('level-text').textContent=`Level ${cfg.level}`
</script>
