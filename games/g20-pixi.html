<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Ducky Volley 🏐</title>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100svh;overflow:hidden;background:#38bdf8;font-family:'Fredoka One',Arial,sans-serif;touch-action:none}
#pixi-canvas{position:fixed;inset:0;width:100vw;height:100svh;display:block}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;gap:8px;padding:max(14px,env(safe-area-inset-top)) 16px 8px;background:linear-gradient(180deg,rgba(0,0,0,0.55) 0%,transparent 100%);pointer-events:none}
#btn-back{background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.25);border-radius:12px;color:#fff;padding:6px 10px;font-size:14px;cursor:pointer;font-family:inherit;pointer-events:all;flex-shrink:0}
#game-badge{background:rgba(0,0,0,0.4);border:1.5px solid rgba(251,191,36,0.4);border-radius:10px;padding:4px 10px;color:#fbbf24;font-size:12px;font-weight:700;flex-shrink:0}
#hud-center{flex:1;text-align:center}
#score-display{font-size:clamp(20px,6vw,32px);font-weight:900;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,0.5)}
#level-text{font-size:10px;color:#bfdbfe}
#round-text{font-size:11px;color:#fbbf24;font-weight:700;flex-shrink:0}

/* ── Controls ── */
#controls{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;padding:8px 12px 16px;pointer-events:none}
.ctrl-zone{width:46%;height:80px;display:flex;gap:5px;pointer-events:all}
.ctrl-btn{flex:1;border-radius:18px;border:2.5px solid rgba(196,181,253,0.4);background:linear-gradient(160deg,rgba(139,92,246,0.3),rgba(167,139,250,0.2));color:#e9d5ff;font-size:20px;font-weight:900;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);box-shadow:0 3px 0 rgba(91,33,182,0.2)}
.ctrl-btn:active{background:rgba(139,92,246,0.5);transform:scale(0.93)}
#btn-jump{background:rgba(251,191,36,0.4);border-color:rgba(251,191,36,0.5);font-size:16px}

/* ── Quiz ── */
#quiz-panel{position:fixed;bottom:0;left:0;right:0;z-index:200;display:none;flex-direction:column;align-items:center;padding:12px 16px 24px;background:linear-gradient(0deg,rgba(10,2,25,0.97),rgba(26,5,53,0.95));border-top:3px solid #fbbf24;backdrop-filter:blur(14px)}
#quiz-panel.show{display:flex}
#quiz-question{color:#fff;font-size:clamp(20px,6vw,30px);font-weight:900;text-align:center;margin-bottom:12px;text-shadow:0 0 16px rgba(251,191,36,0.5)}
#quiz-choices{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.qbtn{min-width:60px;padding:12px 8px;border:2.5px solid rgba(255,255,255,0.3);border-radius:14px;background:linear-gradient(160deg,#7C3AED,#6D28D9);color:#fff;font-size:clamp(16px,5vw,24px);font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 4px 0 #4C1D95;-webkit-tap-highlight-color:transparent}
.qbtn:nth-child(2){background:linear-gradient(160deg,#E85A32,#C84020);box-shadow:0 4px 0 #9A2A10}
.qbtn:nth-child(3){background:linear-gradient(160deg,#2DBF7E,#1A9E66);box-shadow:0 4px 0 #0A7A48}
.qbtn:nth-child(4){background:linear-gradient(160deg,#F59E0B,#D97706);box-shadow:0 4px 0 #92400E}
.qbtn.correct{border-color:#4ade80;background:rgba(74,222,128,0.3);animation:pop .4s ease}
.qbtn.wrong{border-color:#ef4444;background:rgba(239,68,68,0.3);animation:shake .35s ease}
@keyframes pop{0%{transform:scale(1.1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes shake{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── Round Banner ── */
#round-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:150;display:none;flex-direction:column;align-items:center;gap:6px;background:rgba(0,0,0,0.85);border:3px solid #fbbf24;border-radius:24px;padding:24px 40px;backdrop-filter:blur(12px);color:#fff;font-weight:900}
#round-banner.show{display:flex}
#round-banner .rb-title{font-size:28px;color:#fbbf24}
#round-banner .rb-score{font-size:20px;color:#bfdbfe}

/* ── Start Overlay ── */
#start-overlay{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,30,60,0.92);backdrop-filter:blur(8px)}
#start-overlay.hidden{display:none}
.start-icon{font-size:72px}
.start-title{font-size:clamp(26px,8vw,40px);font-weight:900;color:#fbbf24}
.start-sub{font-size:16px;color:#bfdbfe}
.start-hint{font-size:15px;color:#86efac;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{50%{opacity:.5;transform:scale(.96)}}
</style>
</head>
<body>

<canvas id="pixi-canvas"></canvas>
<audio id="game-bgm" src="../assets/Pokemon/sound/01 ~Opening~（１９９７－１９９８｜Ｍ０１） - Satoshi Sakai No Masta - SoundLoadMate.com.mp3" loop preload="auto" style="display:none"></audio>
<audio id="sfx-whoosh" src="../assets/sfx/whoosh.mp3?v=20260422a" preload="auto"></audio>
<audio id="sfx-swoosh" src="../assets/sfx/swoosh.mp3?v=20260422a" preload="auto"></audio>

<div id="hud">
  <button id="btn-back" onclick="goBack()">◀</button>
  <button id="btn-pause" onclick="togglePause()" style="pointer-events:all;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.25);border-radius:10px;color:#fff;padding:5px 8px;font-size:14px;cursor:pointer;font-family:inherit;flex-shrink:0">⏸</button>
  <div id="game-badge">🏐 Ducky Volley</div>
  <div id="hud-center">
    <div id="level-text"></div>
    <div id="score-display">0 — 0</div>

<!-- Screen zone controls — drag to move, swipe up or tap button to jump -->
<div id="controls" style="position:fixed;bottom:8px;left:0;right:0;z-index:45;display:flex;justify-content:center;pointer-events:none;opacity:0.5">
  <div style="font-size:11px;color:#bfdbfe;background:rgba(0,0,0,0.3);padding:4px 16px;border-radius:20px;backdrop-filter:blur(4px)">Geser = Gerak | Swipe ⬆ atau Tombol = Lompat</div>
</div>
<!-- Jump button — visible on touch devices for explicit jump input -->
<button id="btn-jump" aria-label="Lompat" style="position:fixed;right:18px;bottom:54px;z-index:46;width:72px;height:72px;border-radius:50%;background:rgba(251,191,36,0.35);border:2px solid rgba(251,191,36,0.7);color:#fff;font-size:28px;font-weight:900;font-family:inherit;cursor:pointer;backdrop-filter:blur(4px);display:none;touch-action:manipulation">⬆</button>
<!-- Hidden buttons for keyboard/fallback -->
<button id="btn-left" style="display:none"></button>
<button id="btn-right" style="display:none"></button>
<script>if('ontouchstart' in window){var _bj=document.getElementById('btn-jump');if(_bj)_bj.style.display='block'}</script>

<div id="quiz-panel">
  <div id="quiz-question"></div>
  <div id="quiz-choices"></div>
</div>

<div id="round-banner"><div class="rb-title"></div><div class="rb-score"></div></div>

<!-- Pokemon character sprites (DOM overlay) -->
<img id="player-sprite" style="position:fixed;z-index:35;pointer-events:none;height:80px;width:auto;image-rendering:auto;display:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4))">
<img id="cpu-sprite" style="position:fixed;z-index:35;pointer-events:none;height:80px;width:auto;image-rendering:auto;display:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4));transform:scaleX(-1)">

<!-- Pause Overlay -->
<div id="pause-overlay" style="position:fixed;inset:0;z-index:350;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,30,60,0.92);backdrop-filter:blur(8px)">
  <div style="font-size:36px">⏸</div>
  <div style="font-size:24px;font-weight:900;color:#fbbf24">PAUSE</div>
  <div style="width:80%;max-width:300px;display:flex;flex-direction:column;gap:10px;margin:10px 0">
    <label style="color:#bfdbfe;font-size:13px;display:flex;align-items:center;gap:8px">🔊 Master<input type="range" id="vol-master" min="0" max="100" value="80" style="flex:1;accent-color:#38bdf8" oninput="updateG20Vol()"></label>
  </div>
  <div id="poke-selector" style="display:none;width:85%;max-width:360px;max-height:30vh;overflow-y:auto;margin:8px 0">
    <div style="font-size:12px;color:#fbbf24;font-weight:700;margin-bottom:6px">🎒 Ganti Pokemon:</div>
    <div id="poke-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px"></div>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
    <button onclick="togglePause()" style="padding:12px 24px;border-radius:14px;border:2px solid #4ade80;background:rgba(34,197,94,0.3);color:#4ade80;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit">▶ Lanjut</button>
    <button onclick="showPokeSelector()" style="padding:12px 24px;border-radius:14px;border:2px solid #fbbf24;background:rgba(251,191,36,0.2);color:#fbbf24;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit">🎒 Pokemon</button>
    <button onclick="goBack()" style="padding:12px 24px;border-radius:14px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:#bfdbfe;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit">🏠 Keluar</button>
  </div>
</div>

<div id="start-overlay">
  <div class="start-icon">🦆🏐</div>
  <div class="start-title">Ducky Volley</div>
  <div class="start-sub" id="start-level"></div>
  <div class="start-hint">Memuat game... ⏳</div>
  <div id="pc-hint" style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:8px;display:none">Arrow Keys = Gerak | Space = Lompat | 1-4 = Jawab Quiz</div>
  <div id="mobile-hint" style="font-size:12px;color:rgba(255,255,255,0.65);margin-top:8px;display:none;text-align:center;line-height:1.5;max-width:320px;padding:0 12px">👆 Geser kiri/kanan = Gerak<br>⬆ Tombol kuning atau Swipe ke atas = Lompat<br>🔢 Tap angka = Jawab Quiz</div>
</div>
<script>
if(!('ontouchstart' in window)){
  document.getElementById('pc-hint').style.display='block'
} else {
  var _mh=document.getElementById('mobile-hint'); if(_mh) _mh.style.display='block'
}
</script>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
<script src="game-modal.js?v=20260424h"></script>
<script src="../shared/rz-responsive.js?v=20260422i"></script>
<script src="data/poke-sprite-cdn.js?v=20260427d"></script>
<script src="data/poke-sprite-loader.js?v=20260502r"></script>
<script src="data/freeze-watchdog.js?v=20260428a"></script>
<script src="data/save-engine.js?v=20260501h"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const _rz = window.RZ
const cfg = { level: 1, playerPoke: 0, cpuPoke: 1 }
try { const s = sessionStorage.getItem('g20Config'); if (s) Object.assign(cfg, JSON.parse(s)) } catch(_){}
document.getElementById('level-text').textContent = `Level ${cfg.level}`
document.getElementById('start-level').textContent = `Level ${cfg.level}`

// Pokemon roster for volleyball
const G20_POKEMON = [
  { name:'Pikachu', slug:'pikachu', scale:0.9 },
  { name:'Machamp', slug:'machamp', scale:1.1 },
  { name:'Snorlax', slug:'snorlax', scale:1.3 },
  { name:'Eevee', slug:'eevee', scale:0.8 },
  { name:'Jigglypuff', slug:'jigglypuff', scale:0.85 },
  { name:'Lucario', slug:'lucario', scale:1.0 },
  { name:'Hitmonchan', slug:'hitmonchan', scale:1.0 },
  { name:'Primeape', slug:'primeape', scale:0.95 },
  { name:'Psyduck', slug:'psyduck', scale:0.9 },
  { name:'Mewtwo', slug:'mewtwo', scale:1.2 },
]
let playerPokeIdx = cfg.playerPoke || 0
let cpuPokeIdx = cfg.cpuPoke || Math.floor(Math.random() * G20_POKEMON.length)

// Questions
const QS = [
  {q:'1+1=?',ans:'2',w:['3','4','1']},{q:'3+2=?',ans:'5',w:['4','6','7']},{q:'5-2=?',ans:'3',w:['2','4','1']},
  {q:'4+4=?',ans:'8',w:['7','9','6']},{q:'2+3=?',ans:'5',w:['4','6','3']},{q:'6-3=?',ans:'3',w:['2','4','5']},
  {q:'3x2=?',ans:'6',w:['4','8','5']},{q:'10-4=?',ans:'6',w:['5','7','4']},{q:'7+2=?',ans:'9',w:['8','10','11']},
  {q:'Warna 🔴?',ans:'MERAH',w:['BIRU','HIJAU','KUNING']},{q:'Warna 🔵?',ans:'BIRU',w:['MERAH','HIJAU','UNGU']},
  {q:'🐱 Huruf awal?',ans:'K',w:['A','M','B']},{q:'🍎 Huruf awal?',ans:'A',w:['I','U','E']},
]
function pickQ(){return QS[Math.floor(Math.random()*QS.length)]}

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
let W, H, GROUND_Y, NET_X, NET_TOP, NET_H
const GRAVITY = 0.28 // very light for kids
const BALL_R = 20 // bigger ball — easier to see and hit
const DUCK_R = 30
const JUMP_POWER = -9.5
const MOVE_SPD = 4.2 // smoother, more controlled movement for kids
const POINTS_TO_WIN = 3 // faster rounds for kids (was 5)
const TOTAL_ROUNDS = 3

const S = {
  running:false, paused:false, started:false, gameOver:false,
  pScore:0, cScore:0, pRounds:0, cRounds:0, round:1,
  quizActive:false, correctQ:0, wrongQ:0,
  // Ball
  bx:0, by:0, bvx:0, bvy:0, bSpin:0, lastHitter:'none',
  // Player duck
  px:0, py:0, pvx:0, pvy:0, pGnd:true, pSet:false, pHasCrown:false,
  // CPU duck
  cx:0, cy:0, cvx:0, cvy:0, cGnd:true, cHasCrown:false,
  // Powerup
  crabX:-100, crabDir:1, crabActive:false, crabTimer:0,
  powerup:null, powerupTimer:0,
  // FX
  shakeX:0, shakeY:0, shakeTimer:0, frame:0,
  // Physics variation
  gravMod:1, bounceMod:1,
  // Input
  moveL:false, moveR:false, jump:false,
}

function randomizePhysics(){
  S.gravMod = 0.95 + Math.random()*0.1 // ±5% (more consistent)
  S.bounceMod = 0.80 + Math.random()*0.08 // 0.80–0.88: always lossy (no energy-gain bug)
  NET_H = H*0.2 + Math.random()*H*0.06 // slight variation
  NET_TOP = GROUND_Y - NET_H
}

// ═══════════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════════
let ac
function ea(){if(!ac)try{ac=new(window.AudioContext||window.webkitAudioContext)()}catch(_){}}
function tone(f,d,t='sine',v=0.12){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.linearRampToValueAtTime(0,ac.currentTime+d/1000);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d/1000)}
function sfxHit(){tone(600,70);setTimeout(()=>tone(800,50),25)}
function sfxSmash(){tone(200,120,'square',0.15);setTimeout(()=>tone(400,80),40)}
function sfxScore(){tone(900,100);setTimeout(()=>tone(1100,120),80)}
function sfxBounce(){tone(350,40,'triangle',0.08)}
function sfxWhistle(){tone(1200,200);setTimeout(()=>tone(1000,150),120)}
function sfxPowerup(){tone(600,80);setTimeout(()=>tone(900,100),60);setTimeout(()=>tone(1200,120),120)}
function sfxThud(){tone(100,150,'triangle',0.15);setTimeout(()=>tone(60,100,'sine',0.1),40)}
// Motion SFX (Task #33): whoosh for ball-leaves-player, swoosh for jump/flap. Rate-limited.
let _lastWhoosh=0, _lastSwoosh=0
function playSfx(id, vol){
  try{
    const a=document.getElementById(id)
    if(!a)return
    a.currentTime=0
    a.volume=vol!=null?vol:0.5
    a.play().catch(()=>{})
  }catch(_){}
}
function sfxWhoosh(vol){const n=Date.now();if(n-_lastWhoosh<120)return;_lastWhoosh=n;playSfx('sfx-whoosh',vol!=null?vol:0.5)}
function sfxSwoosh(vol){const n=Date.now();if(n-_lastSwoosh<140)return;_lastSwoosh=n;playSfx('sfx-swoosh',vol!=null?vol:0.4)}

// ═══════════════════════════════════════════════════════════
//  PIXI INIT
// ═══════════════════════════════════════════════════════════
let app, bgLayer, courtLayer, entityLayer, fxLayer
const particles = [], trails = []

;(async function init(){
  app = new PIXI.Application()
  await app.init({
    canvas: document.getElementById('pixi-canvas'),
    width: window.innerWidth, height: window.innerHeight,
    backgroundAlpha:1, backgroundColor:0x38bdf8,
    antialias:true, resolution: Math.min(window.devicePixelRatio,2)
  })
  W = app.screen.width; H = app.screen.height
  GROUND_Y = H * 0.75; NET_X = W / 2; NET_H = H * 0.22; NET_TOP = GROUND_Y - NET_H

  bgLayer = new PIXI.Container(); app.stage.addChild(bgLayer)
  courtLayer = new PIXI.Container(); app.stage.addChild(courtLayer)
  entityLayer = new PIXI.Container(); app.stage.addChild(entityLayer)
  fxLayer = new PIXI.Container(); app.stage.addChild(fxLayer)

  drawBackground()
  drawCourt()
  createEntities()
  resetRound('player')
  app.ticker.add(gameLoop)
  document.querySelector('.start-hint').textContent='Tap untuk Mulai!'
})().catch(e=>{
  console.error('G20 init failed:',e)
  document.querySelector('.start-hint').textContent='Gagal memuat. Muat ulang halaman.'
})

// ═══════════════════════════════════════════════════════════
//  BACKGROUND (parallax beach)
// ═══════════════════════════════════════════════════════════
let clouds=[], waveOffset=0, palmTrees=[]
function drawBackground(){
  // Sky — deep blue at top fading to warm cyan at horizon
  const sky = new PIXI.Graphics()
  sky.rect(0,0,W,H*0.12).fill(0x0369a1) // deep sky blue
  sky.rect(0,H*0.08,W,H*0.12).fill({color:0x0284c7,alpha:0.8})
  sky.rect(0,H*0.16,W,H*0.12).fill({color:0x0ea5e9,alpha:0.7})
  sky.rect(0,H*0.24,W,H*0.14).fill({color:0x38bdf8,alpha:0.7})
  sky.rect(0,H*0.34,W,H*0.14).fill({color:0x7dd3fc,alpha:0.6})
  sky.rect(0,H*0.44,W,H*0.12).fill({color:0xbae6fd,alpha:0.5})
  // Warm tint near horizon
  sky.rect(0,H*0.5,W,H*0.08).fill({color:0xfef3c7,alpha:0.15})
  bgLayer.addChild(sky)

  // Sun with layered glow + rays
  const sunX=W*0.82, sunY=H*0.1
  const sun = new PIXI.Graphics()
  sun.circle(sunX,sunY,55).fill({color:0xfef9c3,alpha:0.15}) // outer glow
  sun.circle(sunX,sunY,42).fill({color:0xfef08a,alpha:0.25})
  sun.circle(sunX,sunY,32).fill({color:0xfef08a,alpha:0.6})
  sun.circle(sunX,sunY,22).fill(0xfefce8)
  // Sun rays
  for(let r=0;r<8;r++){
    const a=r*Math.PI/4
    const rx1=sunX+Math.cos(a)*28, ry1=sunY+Math.sin(a)*28
    const rx2=sunX+Math.cos(a)*75, ry2=sunY+Math.sin(a)*75
    const rx3=sunX+Math.cos(a+0.12)*70, ry3=sunY+Math.sin(a+0.12)*70
    sun.moveTo(rx1,ry1).lineTo(rx2,ry2).lineTo(rx3,ry3).closePath().fill({color:0xfef08a,alpha:0.08})
  }
  bgLayer.addChild(sun)

  // Ocean horizon band
  const oceanTop = GROUND_Y - 50
  const ocean = new PIXI.Graphics()
  ocean.rect(0,oceanTop,W,50).fill({color:0x0ea5e9,alpha:0.25})
  ocean.rect(0,oceanTop+10,W,40).fill({color:0x38bdf8,alpha:0.15})
  // Horizon line
  ocean.rect(0,oceanTop,W,2).fill({color:0x0284c7,alpha:0.2})
  // Distant wave ripples
  for(let w=0;w<8;w++){
    const wx=w*(W/8)+Math.random()*30, wy=oceanTop+8+Math.random()*30
    ocean.ellipse(wx,wy,25+Math.random()*20,2).fill({color:0xffffff,alpha:0.1})
  }
  bgLayer.addChild(ocean)

  // Clouds — larger, puffier, more variety
  for(let i=0;i<7;i++){
    const cl=new PIXI.Graphics()
    const cw=40+Math.random()*55
    cl.ellipse(0,0,cw,cw*0.35).fill({color:0xffffff,alpha:0.7})
    cl.ellipse(cw*0.45,-cw*0.12,cw*0.6,cw*0.3).fill({color:0xffffff,alpha:0.55})

//  DUCK DRAWING
// ═══════════════════════════════════════════════════════════
function drawDuck(g, x, y, color, darkColor, facing, hasCrown, squash=1){
  g.clear()
  g.alpha = 0.15 // fade PixiJS duck — Pokemon sprite shows on top
  const sw=1/squash, sh=squash // squash/stretch

  // Shadow
  g.ellipse(x,GROUND_Y+3,DUCK_R*0.8,5).fill({color:0x000000,alpha:0.15})

  // Body
  g.ellipse(x,y-DUCK_R*0.5*sh,DUCK_R*sw,DUCK_R*0.6*sh).fill(color)
  // Belly
  g.ellipse(x,y-DUCK_R*0.4*sh,DUCK_R*0.7*sw,DUCK_R*0.4*sh).fill(0xfef3c7)
  // Wing
  const wingFlap=Math.sin(S.frame*0.25)*3
  g.ellipse(x-facing*10,y-DUCK_R*0.5*sh,8*sw,(12+wingFlap)*sh).fill(darkColor)

  // Head
  const hx=x+facing*16, hy=y-DUCK_R*sh
  g.circle(hx,hy,14*Math.min(sw,sh)).fill(color)
  // Eye
  g.circle(hx+facing*7,hy-2,4).fill(0x1c1917)
  g.circle(hx+facing*8,hy-3,2).fill(0xffffff)
  // Beak
  g.poly([hx+facing*12,hy+1, hx+facing*22,hy+4, hx+facing*12,hy+7]).fill(0xf97316)
  // Blush
  g.circle(hx+facing*3,hy+6,4).fill({color:0xfca5a5,alpha:0.35})

  // Feet
  g.roundRect(x-10,y-3,8,4,2).fill(0xf97316)
  g.roundRect(x+3,y-3,8,4,2).fill(0xf97316)

  // Crown
  if(hasCrown){
    g.poly([hx-8,hy-16, hx-5,hy-22, hx-2,hy-16, hx+1,hy-24, hx+4,hy-16, hx+7,hy-22, hx+10,hy-16]).fill(0xfbbf24)
    g.poly([hx-8,hy-16, hx-5,hy-22, hx-2,hy-16, hx+1,hy-24, hx+4,hy-16, hx+7,hy-22, hx+10,hy-16]).stroke({color:0xf59e0b,width:1})
    g.circle(hx+1,hy-20,2).fill(0xef4444)
  }
}

function spawnTrail(){

  const g=new PIXI.Graphics()

function tickParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]
    p.vy+=p.grav*dt; p.g.x+=p.vx*dt; p.g.y+=p.vy*dt
    p.life-=p.decay*dt; p.g.alpha=p.life
    if(p.life<=0){fxLayer.removeChild(p.g);particles.splice(i,1)}
  }
  for(let i=trails.length-1;i>=0;i--){
    const t=trails[i]
    t.life-=t.decay*dt; t.g.alpha=t.life*0.3; t.g.scale.set(t.life)
    if(t.life<=0){fxLayer.removeChild(t.g);trails.splice(i,1)}
  }
}

// ═══════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════
function gameLoop(ticker){
  S.frame++
  const dt=ticker.deltaTime
  if(!S.running||S.paused||S.quizActive||S.gameOver) return

  // Screen shake decay
  if(S.shakeTimer>0){
    S.shakeTimer-=dt
    S.shakeX=Math.sin(S.shakeTimer*2)*4*(S.shakeTimer/10)
    S.shakeY=Math.cos(S.shakeTimer*1.5)*3*(S.shakeTimer/10)
    app.stage.x=S.shakeX; app.stage.y=S.shakeY
  } else { app.stage.x*=0.8; app.stage.y*=0.8 }

  // Clouds scroll
  for(const cl of clouds){cl.x-=cl._speed*dt; if(cl.x<-80)cl.x=W+80}

  // Player movement — lerp-smoothed horizontal with damping
  const spd = MOVE_SPD * (S.powerup==='speed'?1.5:1)
  // Task #56 fix: drag target only applies while finger is actively tracking.
  // When _touchActive goes false on touchend, pTargetX is nulled by the handler
  // so the duck does NOT keep drifting (previously caused auto-slide after jump).
  if(S.pTargetX!=null){
    const diff=S.pTargetX-S.px
    if(Math.abs(diff)>2){ const tv=Math.max(-spd,Math.min(spd,diff*0.22)); S.pvx=S.pvx*0.78+tv*0.22 }
    else { S.pvx*=0.82; S.pTargetX=null }
  } else if(S.moveL){ S.pvx=S.pvx*0.78 + (-spd)*0.22 }
    else if(S.moveR){ S.pvx=S.pvx*0.78 + (spd)*0.22 }
    else {
      // Stronger friction on ground, lighter in-air (preserves jump arc feel).
      S.pvx *= S.pGnd ? 0.80 : 0.94
      if(Math.abs(S.pvx) < 0.08) S.pvx = 0 // snap to rest, kills micro-drift
    }
  // Jump — explicit user input ONLY (no auto-jump assist). Spacebar/tap/jump-btn.
  if(S.jump&&S.pGnd){
    S.pvy=JUMP_POWER*(S.powerup==='jump'?1.4:1); S.pGnd=false
    spawnSand(S.px,GROUND_Y,4)
    sfxSwoosh(0.4) // Task #33: duck flap/jump swoosh
  }
  S.jump=false

  // Player physics — soft rise damping for smoother arc
  S.pvy+=GRAVITY*S.gravMod*dt
  if(S.pvy<0) S.pvy*=0.985 // light damping on rise → gentler apex
  S.px+=S.pvx*dt; S.py+=S.pvy*dt
  S.px=Math.max(DUCK_R,Math.min(NET_X-DUCK_R-6,S.px))
  if(S.py>=GROUND_Y){S.py=GROUND_Y;if(S.pvy>2)spawnSand(S.px,GROUND_Y,3);S.pvy=0;S.pGnd=true}

  // CPU AI
  updateCPU(dt)

  // Ball physics — smoother arc w/ light air resistance
  const ballSpd=S.powerup==='slow'?0.6:1
  S.bvy+=GRAVITY*S.gravMod*0.50*dt*ballSpd // lighter gravity for more hang time (0.60 → 0.50 on 2026-04-24)
  // Air resistance (drag) — gentle, feels natural vs arcade-jank
  S.bvx*=Math.pow(0.995, dt)
  S.bvy*=Math.pow(0.998, dt)
  S.bx+=S.bvx*dt*ballSpd; S.by+=S.bvy*dt*ballSpd
  // Cap max ball speed — very slow for kids (raised 3.8→5.0 to match 1.5× hit impulse)
  const MAX_BALL_V = 6.5 // 5.0 → 6.5 on 2026-04-24 to allow higher arcs without clipping impulse
  if(Math.abs(S.bvx)>MAX_BALL_V) S.bvx=Math.sign(S.bvx)*MAX_BALL_V
  if(Math.abs(S.bvy)>MAX_BALL_V) S.bvy=Math.sign(S.bvy)*MAX_BALL_V
  S.bSpin+=S.bvx*0.04*dt // faster visible spin

  const br=BALL_R*(S.powerup==='big'?1.5:1)

  // Wall bounces
  if(S.bx<br){S.bx=br;S.bvx=Math.abs(S.bvx)*S.bounceMod;sfxBounce()}
  if(S.bx>W-br){S.bx=W-br;S.bvx=-Math.abs(S.bvx)*S.bounceMod;sfxBounce()}
  if(S.by<br+50){S.by=br+50;S.bvy=Math.abs(S.bvy)*0.60;sfxBounce()} // 60% energy kept

  // Net collision (narrower zone for easier play)
  if(S.by>NET_TOP&&Math.abs(S.bx-NET_X)<8){
    if(S.bx<NET_X){S.bvx=Math.min(S.bvx,-2);S.bx=NET_X-8}
    else{S.bvx=Math.max(S.bvx,2);S.bx=NET_X+8}
    S.bvy*=-0.65; sfxBounce() // 65% energy kept
  }

  // Duck-ball collision (player)
  checkHit(S.px,S.py,S.pvx,S.pvy,S.pGnd,'player')
  // Duck-ball collision (CPU)
  checkHit(S.cx,S.cy,S.cvx,S.cvy,S.cGnd,'cpu')

  // Ball trail
  spawnTrail()

  // Ball hits ground
  if(S.by>GROUND_Y-br){
    sfxThud()
    spawnSand(S.bx,GROUND_Y,8)
    const server=S.bx<NET_X?'player':'cpu'
    if(S.bx<NET_X){
      S.cScore++; sfxWhistle()
      spawnConfetti(W*0.75,GROUND_Y-60)
    } else {
      S.pScore++; sfxScore()
      spawnConfetti(W*0.25,GROUND_Y-60)
    }
    updateHUD()
    // Hold ball above ground during quiz to prevent instant re-score
    S.bx=server==='player'?W*0.25:W*0.75; S.by=GROUND_Y-120; S.bvx=0; S.bvy=0
    checkRoundEnd()
    if(!S.gameOver&&!S.quizActive) resetRound(server)
  }

  // Crab powerup
  updateCrab(dt)

  // Powerup timer
  if(S.powerup&&S.powerupTimer>0){
    S.powerupTimer-=dt/60
    if(S.powerupTimer<=0){S.powerup=null}
  }

  // Draw everything
  tickParticles(dt)

  // Dolphin spawn + animation
  if(Math.random()<0.003*dt && dolphins.length<2) spawnDolphin()
  for(let i=dolphins.length-1;i>=0;i--){
    const d=dolphins[i]; d.phase+=d.speed*dt*60
    if(d.phase>Math.PI){dolphins.splice(i,1);continue}
    const jumpY=-Math.sin(d.phase)*40
    // Draw dolphin (simple arc shape)
    const dg=new PIXI.Graphics()
    dg.ellipse(0,0,12,6).fill({color:0x64748b,alpha:0.7})
    dg.moveTo(10,0).lineTo(16,-4).lineTo(16,4).fill({color:0x64748b,alpha:0.5})
    dg.x=d.x; dg.y=d.y+jumpY; dg.rotation=-d.phase*0.5
    fxLayer.addChild(dg)
    setTimeout(()=>{try{fxLayer.removeChild(dg)}catch(_){}},20)
  }

  const pFacing=S.pvx>0.5?1:S.pvx<-0.5?-1:1
  const pSquash=S.pGnd?1:S.pvy<0?0.85:1.15
  drawDuck(playerGfx,S.px,S.py,0xfbbf24,0xf59e0b,pFacing,S.pHasCrown,pSquash)
  const cFacing=S.cvx>0.5?1:S.cvx<-0.5?-1:-1
  const cSquash=S.cGnd?1:S.cvy<0?0.85:1.15
  drawDuck(cpuGfx,S.cx,S.cy,0xef4444,0xdc2626,cFacing,S.cHasCrown,cSquash)
  drawBall()

  // Sync Pokemon DOM sprites to PixiJS duck positions
  const pSpr=document.getElementById('player-sprite')
  const cSpr=document.getElementById('cpu-sprite')
  if(pSpr&&pSpr.style.display!=='none'){
    pSpr.style.left=(S.px-pSpr.offsetWidth/2)+'px'
    pSpr.style.top=(S.py-DUCK_R-pSpr.offsetHeight/2)+'px'
    pSpr.style.transform=pFacing<0?'scaleX(-1)':''
  }
  if(cSpr&&cSpr.style.display!=='none'){
    cSpr.style.left=(S.cx-cSpr.offsetWidth/2)+'px'
    cSpr.style.top=(S.cy-DUCK_R-cSpr.offsetHeight/2)+'px'
    cSpr.style.transform=cFacing>0?'':'scaleX(-1)'
  }
  drawCrab()
}

// ═══════════════════════════════════════════════════════════
//  HIT MECHANICS (SET / SHOT / SMASH)
// ═══════════════════════════════════════════════════════════
function checkHit(dx,dy,dvx,dvy,onGnd,who){
  const br=BALL_R*(S.powerup==='big'?1.5:1)
  const ddx=S.bx-dx, ddy=S.by-(dy-DUCK_R*0.5)
  const dist=Math.sqrt(ddx*ddx+ddy*ddy)
  if(dist>br+DUCK_R+12)return // +12px hitbox for easier play
  if(S.lastHitter===who&&S.frame%10!==0)return // debounce
  S.lastHitter=who

  const angle=Math.atan2(ddy,ddx)
  let power, hitType
  if(onGnd){
    // SET: gentle lob upward — bumped 3.2 → 4.0 for easier net clearance on first touch
    power=4.0; hitType='set'
    if(who==='player')S.pSet=true
  } else if(who==='player'&&S.pSet){
    // SMASH: powerful spike after set — bumped 5 → 6.2
    power=6.2; hitType='smash'
    S.pSet=false
    S.shakeTimer=10
    sfxSmash()
    sfxWhoosh(0.6)
  } else {
    // SHOT: jump first-touch — bumped 4.4 → 5.4
    power=5.4; hitType='shot'
  }

  // Upward impulse tuning (2026-04-24 P2 — user: "masih sangat sulit bounce ke atasnya"):
  // Base: -2.7 → -3.8 (41% stronger up-kick). Min: -2.1 → -3.2 (easier sailing).
  // Combined with higher power values + lighter gravity (see ball update), ball now
  // clears net comfortably even on weak upward hits.
  S.bvx=Math.cos(angle)*power+dvx*0.22
  S.bvy=Math.sin(angle)*power-3.8
  S.bvy=Math.min(S.bvy,-3.2)

  if(hitType==='set') sfxHit()
  else if(hitType==='shot'){ sfxHit(); sfxWhoosh(0.45) } // Task #33: shot = medium whoosh

  // Hit effect — spawn colored particles at ball position
  const hitColors = {set:0x4ade80, shot:0x3b82f6, smash:0xfbbf24}
  const hc = hitColors[hitType] || 0xffffff
  for(let i=0;i<6;i++){
    const g=new PIXI.Graphics()
    g.circle(0,0,2+Math.random()*3).fill(hc)
    g.x=S.bx; g.y=S.by
    fxLayer.addChild(g)
    particles.push({g, vx:(Math.random()-0.5)*6, vy:-Math.random()*5-1, grav:0.2, life:1, decay:0.04})
  }
  // Type emoji burst
  const typeEmoji = {set:'🌿', shot:'💧', smash:'⚡'}
  const te = new PIXI.Text({text:typeEmoji[hitType]||'💥', style:{fontSize: _rz ? _rz.fontScale(20) : 20}})
  te.anchor.set(0.5); te.x=S.bx; te.y=S.by-15
  fxLayer.addChild(te)
  particles.push({g:te, vx:0, vy:-2, grav:0, life:1, decay:0.03})
}

// ═══════════════════════════════════════════════════════════
//  CPU AI — Task #56 rewrite (2026-04-22)
//  Previous AI: reactive-only, chased current ball X, never predicted landing
//  when ball was on player's side. User reported: "cukup lempar ke area musuh,
//  pasti musuhnya g bisa balikin, menang mudah" — lobs to open side were never
//  defended because CPU camped at W*0.75 until ball crossed the net.
//
//  New AI:
//    1. Always predicts ball-landing X using physics integration (gravity + drag).
//    2. Proactively moves to landing spot BEFORE ball crosses net.
//    3. Reaction-quality scales with level: lv1=coarse/laggy, lv5+=crisp.
//    4. Randomized jump timing (not every frame deterministic).
//    5. Missed-read frequency gives player a fair chance even at high levels.
// ═══════════════════════════════════════════════════════════
function predictBallLandingX(){
  // Simulate ball flight forward until it hits ground or the right wall.
  // Approximation: use current pos/vel + gravity w/ ball-scaling used in main loop.
  let bx=S.bx, by=S.by, bvx=S.bvx, bvy=S.bvy
  const gAccel=GRAVITY*S.gravMod*0.50 // matches line ~762 ball-gravity factor (kept in sync)
  const ballSpd=S.powerup==='slow'?0.6:1
  const maxSteps=180 // ~3s at 60fps; enough for any lob
  const br=BALL_R*(S.powerup==='big'?1.5:1)
  for(let i=0;i<maxSteps;i++){
    bvy+=gAccel*ballSpd
    bvx*=0.995; bvy*=0.998
    bx+=bvx*ballSpd; by+=bvy*ballSpd
    if(by>=GROUND_Y-br) return bx
    if(bx<br||bx>W-br) return bx // wall bounce — good enough proxy
  }
  return bx
}
function updateCPU(dt){
  // Hotfix #112-I: bot smarter — user "masih bodoh, cuma lompat2 nggak jelas".
  // Difficulty tier (easy/medium/hard) overrides level scaling for clearer behavior.
  const _diff = (typeof state !== 'undefined' && state.selectedLevel) || 'easy'
  const _diffMul = _diff === 'hard' ? 1.4 : _diff === 'medium' ? 1.15 : 1.0
  const accuracy = Math.min(0.70 + cfg.level * 0.030 * _diffMul, 0.96)
  const spd = MOVE_SPD * (0.95 + cfg.level * 0.012 * _diffMul)
  const reactJitter = Math.max(0.04, 0.18 - cfg.level * 0.015 * _diffMul)
  // Reaction delay: higher levels commit sooner. Misreads scale down with level.
  const misread=Math.random()>accuracy

  // Predict where ball will land — works even when ball is on player's side.
  let target
  if(S.bx>NET_X || S.bvx>0.3){
    // Ball on CPU side OR moving toward CPU — predict landing.
    const predX=predictBallLandingX()
    // Clamp to CPU half so CPU doesn't teleport across net.
    const clampedPredX=Math.max(NET_X+DUCK_R+10, Math.min(W-DUCK_R-4, predX))
    // Low-level CPU adds a "misread" offset, higher-level aims cleaner.
    const aimJitter=misread ? (Math.random()-0.5)*120*(1-cfg.level*0.08) : 0
    target=clampedPredX+aimJitter
  } else {
    // Ball on player side, not incoming — take anticipatory position.
    // Level 1-3: camp at safe center. Level 4+: shade toward expected landing.
    const anticipate=cfg.level>=4 ? predictBallLandingX() : W*0.75
    const clamped=Math.max(NET_X+DUCK_R+10, Math.min(W-DUCK_R-4, anticipate))
    target=clamped*0.5 + W*0.75*0.5 // blend between prediction and neutral court center
  }

  // Reaction idle — occasional "hesitation" so CPU isn't robotic.
  const hesitating=Math.random()<reactJitter
  if(!hesitating){
    if(S.cx<target-12)S.cvx=S.cvx*0.6 + spd*0.4
    else if(S.cx>target+12)S.cvx=S.cvx*0.6 + (-spd)*0.4
    else S.cvx*=0.78
  } else {
    S.cvx*=0.88 // glide briefly
  }

  // Jump logic:
  //   - Only when ball is on CPU side and close.
  //   - Ball descending AND within strike range → jump-hit.
  //   - Ball rising toward CPU but high enough to clear duck → also jump (block).
  //   - Slight random timing variation so jumps don't feel scripted.
  const ballOnCpuSide=S.bx>NET_X
  const ballClose=Math.abs(S.bx-S.cx)<100
  const ballHigh=S.by<GROUND_Y-50 && S.by>NET_TOP-10
  // Hotfix #112-I: jump is smarter — only when ball will land near bot AND
  // within reachable height. No more random idle-jumps.
  const jumpRoll = Math.random() < (0.75 + cfg.level * 0.025 * _diffMul)
  const willLandNear = Math.abs(predictBallLandingX() - S.cx) < 80
  if (S.cGnd && ballOnCpuSide && ballClose && ballHigh && jumpRoll && willLandNear) {
    // Hit when descending OR rising-but-mid-court.
    if (S.bvy > 0 || (S.bvy < 0 && S.by < GROUND_Y - 90)) {
      S.cvy = JUMP_POWER * (0.92 + Math.random() * 0.06)
      S.cGnd = false
      spawnSand(S.cx, GROUND_Y, 3)
    }
  }

  S.cvy+=GRAVITY*S.gravMod*dt; S.cx+=S.cvx*dt; S.cy+=S.cvy*dt
  S.cx=Math.max(NET_X+DUCK_R+6,Math.min(W-DUCK_R,S.cx))
  if(S.cy>=GROUND_Y){S.cy=GROUND_Y;if(S.cvy>2)spawnSand(S.cx,GROUND_Y,2);S.cvy=0;S.cGnd=true}
}

// ═══════════════════════════════════════════════════════════
//  CRAB POWERUP
// ═══════════════════════════════════════════════════════════
function updateCrab(dt){
  S.crabTimer+=dt/60
  if(!S.crabActive&&S.crabTimer>12+Math.random()*8){
    S.crabActive=true; S.crabX=-30; S.crabDir=1; S.crabTimer=0
  }
  if(S.crabActive){
    S.crabX+=S.crabDir*1.2*dt
    if(S.crabX>W+30){S.crabActive=false;S.crabTimer=0}
    // Player touches crab
    if(Math.abs(S.px-S.crabX)<30&&S.py>GROUND_Y-10){
      S.crabActive=false; S.crabTimer=0
      const types=['big','speed','jump','slow']
      S.powerup=types[Math.floor(Math.random()*types.length)]
      S.powerupTimer=10
      sfxPowerup()
    }
  }
}
let crabQMark = null
function drawCrab(){
  crabGfx.clear()
  if(crabQMark){crabQMark.visible=false}
  if(!S.crabActive)return
  const cx=S.crabX, cy=GROUND_Y+2
  // Body
  crabGfx.ellipse(cx,cy,12,8).fill(0xef4444)
  crabGfx.ellipse(cx,cy-1,10,6).fill({color:0xf87171,alpha:0.5})
  // Claws (animated pinch)
  const pinch=Math.sin(S.frame*0.15)*2
  crabGfx.circle(cx-16-pinch,cy-2,5).fill(0xf87171)
  crabGfx.circle(cx-18-pinch,cy-4,3).fill(0xfca5a5)
  crabGfx.circle(cx+16+pinch,cy-2,5).fill(0xf87171)
  crabGfx.circle(cx+18+pinch,cy-4,3).fill(0xfca5a5)
  // Eyes on stalks
  crabGfx.rect(cx-5,cy-12,2,5).fill(0xef4444)
  crabGfx.rect(cx+3,cy-12,2,5).fill(0xef4444)
  crabGfx.circle(cx-4,cy-13,3).fill(0x1c1917)
  crabGfx.circle(cx+4,cy-13,3).fill(0x1c1917)
  crabGfx.circle(cx-3,cy-14,1.5).fill(0xffffff)
  crabGfx.circle(cx+5,cy-14,1.5).fill(0xffffff)
  // Legs (walking animation)
  for(let i=-2;i<=2;i++){
    if(i===0)continue
    const legY=Math.sin(S.frame*0.3+i)*2
    crabGfx.rect(cx+i*5,cy+3+legY,2,5).fill({color:0xdc2626,alpha:0.6})
  }
  // Powerup bubble
  const bobY=Math.sin(S.frame*0.1)*3
  crabGfx.circle(cx,cy-24+bobY,9).fill({color:0xfbbf24,alpha:0.85})
  crabGfx.circle(cx,cy-24+bobY,9).stroke({color:0xf59e0b,width:1.5})
  crabGfx.circle(cx,cy-24+bobY,4).fill(0xffffff)
  // Use separate Text for ?
  if(!crabQMark){
    crabQMark=new PIXI.Text({text:'?',style:{fontSize: _rz ? _rz.fontScale(11) : 11,fontWeight:'900',fill:0x92400e,fontFamily:'Arial'}})
    crabQMark.anchor.set(0.5)
    entityLayer.addChild(crabQMark)
  }
  crabQMark.x=cx; crabQMark.y=cy-25+bobY; crabQMark.visible=true
}

// ═══════════════════════════════════════════════════════════
//  ROUND + MATCH LOGIC
// ═══════════════════════════════════════════════════════════
function checkRoundEnd(){
  if(S.pScore>=POINTS_TO_WIN||S.cScore>=POINTS_TO_WIN){
    if(S.pScore>=POINTS_TO_WIN){S.pRounds++;S.pHasCrown=true;S.cHasCrown=false}
    else{S.cRounds++;S.cHasCrown=true;S.pHasCrown=false}

    if(S.pRounds>=2||S.cRounds>=2||S.round>=TOTAL_ROUNDS){
      // Match over
      endMatch()
    } else {
      // Next round + quiz
      S.round++; S.pScore=0; S.cScore=0
      showRoundBanner()
      showQuiz()
    }
  }
}

function showRoundBanner(){
  const rb=document.getElementById('round-banner')
  rb.querySelector('.rb-title').textContent=`Round ${S.round}`
  rb.querySelector('.rb-score').textContent=`${S.pRounds} — ${S.cRounds}`
  rb.classList.add('show')
  setTimeout(()=>rb.classList.remove('show'),2000)
  document.getElementById('round-text').textContent=`Round ${S.round}/${TOTAL_ROUNDS}`
}

function endMatch(){
  S.running=false; S.gameOver=true
  try{document.getElementById('game-bgm').pause()}catch(_){}
  const won=S.pRounds>S.cRounds
  const stars=GameScoring.calc({correct:S.correctQ,total:S.correctQ+S.wrongQ,wrong:S.wrongQ,bonus:won?1:0})
  try{sessionStorage.setItem('g20Result',JSON.stringify({stars,level:cfg.level}))}catch(_){}
  saveG20Progress(stars)

  // Hotfix #102-C (2026-04-27): stop Pixi ticker so 60fps callback doesn't keep
  // firing after game-end. See games/g15-pixi.html for canonical pattern.
  try { if (app && app.ticker) app.ticker.stop() } catch(_){}

  setTimeout(()=>{
    const next=won&&cfg.level<30?()=>{
      try{sessionStorage.setItem('g20Config',JSON.stringify({level:cfg.level+1}))}catch(_){}
      location.reload()
    }:null
    const roundInfo = `Rounds: ${S.pRounds}—${S.cRounds} | Quiz: ${S.correctQ}✅`
    const emoji = stars >= 5 ? '🏆' : stars >= 4 ? '🌟' : stars >= 3 ? '⭐' : stars >= 1 ? '💪' : '😞'
    const title = stars >= 5 ? 'Sempurna!' : stars >= 4 ? 'Hebat!' : stars >= 3 ? 'Bagus!' : stars >= 1 ? 'Coba Lagi' : 'Gagal! Coba Lagi'
    const msg = stars >= 5 ? `Wow, kamu hebat! ${roundInfo}` :
      stars >= 4 ? `Kerja bagus! ${roundInfo}` :
      stars >= 3 ? `Lumayan, terus berlatih! ${roundInfo}` :
      stars >= 1 ? `Kamu bisa lebih baik lagi! ${roundInfo}` :
      `Jangan menyerah, ayo coba lagi! ${roundInfo}`
    GameModal.show({
      emoji, title, stars, msg,
      onNext:next, onAgain:()=>location.reload(), onBack:()=>goBack()
    })
  },800)
}

// ═══════════════════════════════════════════════════════════
//  QUIZ
// ═══════════════════════════════════════════════════════════
function showQuiz(){
  S.quizActive=true
  const q=pickQ()
  document.getElementById('quiz-question').textContent=q.q
  const ch=document.getElementById('quiz-choices'); ch.innerHTML=''
  const opts=[q.ans,...q.w].sort(()=>Math.random()-0.5)
  let done=false
  opts.forEach(c=>{
    const b=document.createElement('button'); b.className='qbtn'; b.textContent=c
    b.onclick=()=>{
      if(done)return; done=true
      if(c===q.ans){b.classList.add('correct');S.correctQ++;sfxScore()}
      else{b.classList.add('wrong');S.wrongQ++;ch.querySelectorAll('.qbtn').forEach(x=>{if(x.textContent===q.ans)x.classList.add('correct')})}
      setTimeout(()=>{
        document.getElementById('quiz-panel').classList.remove('show')
        S.quizActive=false
        // Reset round positions after quiz so ball doesn't score instantly
        resetRound(S.bx<NET_X?'player':'cpu')
        updateHUD()
      },900)
    }
    ch.appendChild(b)
  })
  document.getElementById('quiz-panel').classList.add('show')
}

// ═══════════════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════════════
function updateHUD(){
  document.getElementById('score-display').textContent=`${S.pScore} — ${S.cScore}`
  const pwMap={big:'🔴 Bola Besar',speed:'🔵 Turbo',jump:'🟢 Super Lompat',slow:'🟡 Slow Ball'}
  const rt=document.getElementById('round-text')
  if(S.powerup) rt.textContent=`${pwMap[S.powerup]} ${Math.ceil(S.powerupTimer)}s`
  else rt.textContent=`Round ${S.round}/${TOTAL_ROUNDS}`
}

// ═══════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════
function loadPokeSprite(imgId, slug, mirror) {
  const el = document.getElementById(imgId)
  if (!el) return
  // Hotfix 2026-04-28: route through shared attachSpriteCascade — terminating
  // dedup loader replaces 3-step inline onerror chain.
  const id = {pikachu:25,machamp:68,snorlax:143,eevee:133,jigglypuff:39,lucario:448,hitmonchan:107,primeape:57,psyduck:54,mewtwo:150}[slug]
  const svgUrl = id ? `../assets/Pokemon/svg/${id}.svg` : null
  const cdnUrl = `https://img.pokemondb.net/sprites/home/normal/${slug}.png`
  const hdUrl = (typeof pokeSpriteAlt2 === 'function' ? pokeSpriteAlt2(slug) : null)
  if (typeof attachSpriteCascade === 'function') {
    attachSpriteCascade(el, [hdUrl, svgUrl, cdnUrl], '⚡')
  } else {
    el.src = hdUrl || svgUrl || cdnUrl
    el.onerror = null
  }
  el.style.display = 'block'
  if (mirror) el.style.transform = 'scaleX(-1)'
}

function startGame(){
  if(S.started)return; ea()
  S.started=true; S.running=true
  document.getElementById('start-overlay').classList.add('hidden')
  try{const bgm=document.getElementById('game-bgm');bgm.volume=0.2;bgm.play().catch(()=>{})}catch(_){}
  // Load Pokemon sprites
  const pPoke = G20_POKEMON[playerPokeIdx]
  const cPoke = G20_POKEMON[cpuPokeIdx]
  const pEl = document.getElementById('player-sprite')
  const cEl = document.getElementById('cpu-sprite')
  if (pEl) { pEl.style.height = Math.round(80 * pPoke.scale) + 'px'; loadPokeSprite('player-sprite', pPoke.slug, false) }
  if (cEl) { cEl.style.height = Math.round(80 * cPoke.scale) + 'px'; loadPokeSprite('cpu-sprite', cPoke.slug, true) }
  resetRound('player'); updateHUD()
  document.getElementById('round-text').textContent=`Round 1/${TOTAL_ROUNDS}`
}

// Touch — delta drag control: finger slide moves the duck smoothly.
// Jump requires EXPLICIT input: swipe up (>40px upward) OR the jump button.
// No more auto-jump on tap.
let _touchActive = false, _touchX = 0, _touchY = 0, _touchStartY = 0, _swipeJumped = false
document.addEventListener('touchstart', e => {
  if (!S.started || S.paused || S.gameOver || S.quizActive) return
  if (e.target.closest('#hud') || e.target.closest('#pause-overlay') || e.target.closest('#quiz-panel') || e.target.closest('#start-overlay') || e.target.closest('#poke-selector')) return
  e.preventDefault()
  _touchActive = true
  _touchX = e.touches[0].clientX
  _touchY = e.touches[0].clientY
  _touchStartY = _touchY
  _swipeJumped = false
  S.pTargetX = S.px // anchor drag origin to current player X
}, {passive:false})
document.addEventListener('touchmove', e => {
  if (!_touchActive) return
  e.preventDefault()
  const cur = e.touches[0].clientX
  const curY = e.touches[0].clientY
  const dx = cur - _touchX
  _touchX = cur
  _touchY = curY
  const scale = W / window.innerWidth
  S.pTargetX = (S.pTargetX ?? S.px) + dx * scale * 1.1
  S.pTargetX = Math.max(DUCK_R, Math.min(NET_X - DUCK_R - 6, S.pTargetX))
  // Swipe-up gesture = jump (one-shot per touch)
  if(!_swipeJumped && (_touchStartY - curY) > 40 && S.pGnd){
    S.jump = true
    _swipeJumped = true
  }
}, {passive:false})
document.addEventListener('touchend', e => {
  _touchActive = false
  _swipeJumped = false
  // Task #56 fix: clear drag target so duck stops drifting after finger lift.
  // Without this, pTargetX from the last drag frame kept pulling pvx even mid-air,
  // producing a "backward slide" after jump (user feedback 2026-04-22).
  S.pTargetX = null
})
document.addEventListener('touchcancel', e => {
  _touchActive = false
  _swipeJumped = false
  S.pTargetX = null
})

// Button fallback (still works if visible)
const bL=document.getElementById('btn-left'), bR=document.getElementById('btn-right'), bJ=document.getElementById('btn-jump')
if(bL){bL.addEventListener('touchstart',e=>{e.preventDefault();S.moveL=true});bL.addEventListener('touchend',e=>{e.preventDefault();S.moveL=false})}
if(bR){bR.addEventListener('touchstart',e=>{e.preventDefault();S.moveR=true});bR.addEventListener('touchend',e=>{e.preventDefault();S.moveR=false})}
if(bJ){bJ.addEventListener('touchstart',e=>{e.preventDefault();S.jump=true})}
// Mouse fallback
if(bL){bL.addEventListener('mousedown',()=>S.moveL=true);bL.addEventListener('mouseup',()=>S.moveL=false)}
if(bR){bR.addEventListener('mousedown',()=>S.moveR=true);bR.addEventListener('mouseup',()=>S.moveR=false)}
if(bJ){bJ.addEventListener('mousedown',()=>S.jump=true);bJ.addEventListener('mouseup',()=>S.jump=false)}
// Keyboard
window.addEventListener('keydown',e=>{
  // Start game with Enter or Space
  if(!S.started && (e.code==='Space'||e.code==='Enter')){e.preventDefault();startGame();return}
  // Quiz answer with number keys 1-4
  if(S.quizActive && e.code.startsWith('Digit')){
    const n=parseInt(e.key)
    if(n>=1&&n<=4){
      const btns=document.querySelectorAll('#quiz-choices .qbtn')
      if(btns[n-1])btns[n-1].click()
    }
    return
  }
  if(e.code==='ArrowLeft'||e.code==='KeyA')S.moveL=true
  if(e.code==='ArrowRight'||e.code==='KeyD')S.moveR=true
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();S.jump=true}
})
window.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')S.moveL=false
  if(e.code==='ArrowRight'||e.code==='KeyD')S.moveR=false
})
document.getElementById('start-overlay').addEventListener('pointerdown',startGame)

// Save level progress — Hotfix #115: prefer shared save-engine (avatar-keyed).
// Fallback to legacy slot-0 path if not loaded.
function saveG20Progress(stars) {
  const lv = (typeof cfg !== 'undefined' ? cfg.level : (typeof S !== 'undefined' ? S.level : 1)) || 1
  if (typeof window.saveLevelProgress === 'function') {
    window.saveLevelProgress('g20', lv, stars)
    return
  }
  try {
    const key = 'dunia-0-progress'
    const prog = JSON.parse(localStorage.getItem(key) || '{}')
    if (!prog.g20) prog.g20 = { completed: [], stars: {} }
    if (!prog.g20.completed.includes(lv)) prog.g20.completed.push(lv)
    if ((prog.g20.stars[lv] || 0) < stars) prog.g20.stars[lv] = stars
    localStorage.setItem(key, JSON.stringify(prog))
  } catch(_) {}
}
function goBack(){
  try{document.getElementById('game-bgm').pause()}catch(_){}
  // Hotfix #102-C (2026-04-27): stop Pixi ticker so 60fps callback doesn't keep
  // firing after game-end. See games/g15-pixi.html for canonical pattern.
  try { if (app && app.ticker) app.ticker.stop() } catch(_){}
  history.back()
}
function togglePause(){
  S.paused=!S.paused
  document.getElementById('btn-pause').textContent=S.paused?'▶':'⏸'
  document.getElementById('pause-overlay').style.display=S.paused?'flex':'none'
  try{const bgm=document.getElementById('game-bgm');S.paused?bgm.pause():bgm.play().catch(()=>{})}catch(_){}
}
function showPokeSelector(){
  const grid=document.getElementById('poke-grid')
  const sel=document.getElementById('poke-selector')
  if(sel.style.display==='none'){
    grid.innerHTML=''
    G20_POKEMON.forEach((p,i)=>{
      const card=document.createElement('div')
      card.style.cssText='display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px;border-radius:10px;cursor:pointer;border:2px solid '+(i===playerPokeIdx?'#fbbf24':'rgba(255,255,255,0.1)')+';background:'+(i===playerPokeIdx?'rgba(251,191,36,0.15)':'rgba(255,255,255,0.05)')
      const img=document.createElement('img')
      img.style.cssText='width:40px;height:40px;object-fit:contain'
      const _hdT=(typeof pokeSpriteAlt2==='function'?pokeSpriteAlt2(p.slug):null)
      const _cdnT=`https://img.pokemondb.net/sprites/home/normal/${p.slug}.png`
      if(typeof attachSpriteCascade==='function'){attachSpriteCascade(img,[_hdT,_cdnT],'⚡')}
      else{img.src=_hdT||_cdnT;img.onerror=()=>{img.src=_cdnT;img.onerror=null}}
      card.appendChild(img)
      const nm=document.createElement('div')
      nm.style.cssText='font-size:8px;color:#bfdbfe;font-weight:700'
      nm.textContent=p.name
      card.appendChild(nm)
      card.onclick=()=>{
        playerPokeIdx=i
        cpuPokeIdx=(i+1+Math.floor(Math.random()*(G20_POKEMON.length-1)))%G20_POKEMON.length
        loadPokeSprite('player-sprite',G20_POKEMON[playerPokeIdx].slug,false)
        loadPokeSprite('cpu-sprite',G20_POKEMON[cpuPokeIdx].slug,true)
        document.getElementById('player-sprite').style.height=Math.round(80*G20_POKEMON[playerPokeIdx].scale)+'px'
        document.getElementById('cpu-sprite').style.height=Math.round(80*G20_POKEMON[cpuPokeIdx].scale)+'px'
        sel.style.display='none'
      }
      grid.appendChild(card)
    })
    sel.style.display='block'
  } else sel.style.display='none'
}

function updateG20Vol(){
  const m=document.getElementById('vol-master').value/100
  // Apply to any future audio elements
  window._g20MasterVol=m
}
window.addEventListener('resize',()=>{if(app)app.renderer.resize(Math.min(window.innerWidth,1400),Math.min(window.innerHeight,1000))})
</script>
