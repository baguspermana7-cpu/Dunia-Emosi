      if (tex && tex.source) tex.source.scaleMode = 'nearest'
      out[key] = tex
    } catch (e) {
      console.warn('[g21] sprite load fail:', key, e)
      out[key] = null  // explicit null — checked before use
    }
  }
  // Alias MARIO_TEXTURES for convenience in placeTile / entity renderers
  MARIO_TEXTURES = out
  return out
}

// ═══════════════════════════════════════════════════════════════════
//  PIXI INIT
// ═══════════════════════════════════════════════════════════════════
// Hotfix #112: canvas height uses bottom-margin CSS var (96px footer for
// mobile controls). _gameH() reads it from document and falls back to 96.
function _gameMarginPx() {
  try {
    const v = getComputedStyle(document.documentElement).getPropertyValue('--g21-bottom-margin').trim()
    const n = parseInt(v, 10)
    return Number.isFinite(n) ? n : 96
  } catch (_) { return 96 }
}
function _gameH() { return Math.max(120, window.innerHeight - _gameMarginPx()) }

async function initPixi() {
  const PIXI = window.PIXI
  app = new PIXI.Application()
  await app.init({
    canvas: document.getElementById('pixi-canvas'),
    width: window.innerWidth,
    height: _gameH(),
    backgroundAlpha: 0,
    antialias: true,
    resolution: window.devicePixelRatio || 1,
    autoDensity: true,
  })
  window._g21App = app

  textures = await loadAssets()

  // Layer setup
  bgLayer = new PIXI.Container()
  parallaxFar = new PIXI.Container()
  parallaxMid = new PIXI.Container()
  world = new PIXI.Container()
  fgLayer = new PIXI.Container()
  hudParticles = new PIXI.Container()
  app.stage.addChild(bgLayer, parallaxFar, parallaxMid, world, fgLayer, hudParticles)

  buildBackground()
  loadLevel(S.level)
  attachInput()

  document.getElementById('loading').classList.add('hide')

  // Ticker
  app.ticker.add(gameLoop)
  S.running = true
  S.startTime = performance.now()

  window.addEventListener('resize', onResize)

  // Start BGM on first user interaction (autoplay policy)
  const startMusic = () => {
    startBGM()
    document.removeEventListener('pointerdown', startMusic)
    document.removeEventListener('keydown', startMusic)
  }
  document.addEventListener('pointerdown', startMusic, { once: false })
  document.addEventListener('keydown', startMusic, { once: false })
}

// ═══════════════════════════════════════════════════════════════════
//  BACKGROUND (parallax: sky gradient via DOM, clouds via Pixi)
// ═══════════════════════════════════════════════════════════════════
function buildBackground() {
  // Hotfix #109: theme-specific parallax (cave/sky/castle/desert/ice/lava/final).
  const PIXI = window.PIXI
  parallaxFar.removeChildren()
  parallaxMid.removeChildren()
  const theme = (levelData && levelData.theme) || 'default'
  buildFarLayer(theme, PIXI)
  buildMidLayer(theme, PIXI)
}

function buildFarLayer(theme, PIXI) {
  // Far layer = atmospheric (clouds/stalactites/lanterns/etc).
  if (theme === 'cave') {
    // Stalactites hanging from top
    for (let i = 0; i < 16; i++) {
      const s = new PIXI.Graphics()
      const len = 40 + (i % 4) * 30
      s.poly([0, 0, 24, 0, 12, len]).fill(0x4B5563).stroke({ width: 2, color: 0x1F2937 })
      s.poly([2, 0, 22, 0, 12, len*0.85]).fill(0x6B7280).alpha = 0.6
      s.x = i * 130 + 50; s.y = 0
      parallaxFar.addChild(s)
    }
  } else if (theme === 'lava') {
    // Falling embers / flame puffs
    for (let i = 0; i < 18; i++) {
      const f = new PIXI.Graphics()
      f.circle(0, 0, 18 + (i % 3) * 8).fill(0xF97316).alpha = 0.5
      f.circle(-3, -3, 10).fill(0xFCD34D)
      f.x = i * 160 + 80; f.y = 80 + (i % 5) * 60
      parallaxFar.addChild(f)
    }
  } else if (theme === 'ice') {
    // Snowflakes
    for (let i = 0; i < 24; i++) {
      const s = new PIXI.Graphics()
      const r = 6 + (i % 3) * 3
      for (let a = 0; a < 6; a++) {
        const ang = (a * Math.PI) / 3
        s.moveTo(0, 0).lineTo(Math.cos(ang) * r, Math.sin(ang) * r)
      }
      s.stroke({ width: 2, color: 0xFFFFFF })
      s.x = i * 90 + 30; s.y = 60 + (i % 6) * 50
      s.alpha = 0.85
      parallaxFar.addChild(s)
    }
  } else if (theme === 'desert') {
    // Sun + heat haze
    const sun = new PIXI.Graphics()
    sun.circle(0, 0, 60).fill(0xFCD34D).stroke({ width: 4, color: 0xF59E0B })
    for (let r = 70; r <= 120; r += 12) {
      sun.circle(0, 0, r).stroke({ width: 2, color: 0xFCD34D })
    }
    sun.x = 200; sun.y = 120; sun.alpha = 0.7
    parallaxFar.addChild(sun)
    // Pyramid silhouettes
    for (let i = 0; i < 8; i++) {
      const p = new PIXI.Graphics()
      p.poly([-80, 0, 80, 0, 0, -100]).fill(0xB45309).stroke({ width: 3, color: 0x78350F })
      p.x = i * 280 + 350; p.y = 220
      parallaxFar.addChild(p)
    }
  } else if (theme === 'castle') {
    // Castle tower silhouettes
    for (let i = 0; i < 6; i++) {
      const t = new PIXI.Graphics()
      t.rect(-30, -180, 60, 180).fill(0x1F2937).stroke({ width: 2, color: 0x4B5563 })
      // Battlements
      for (let b = -28; b < 30; b += 14) {
        t.rect(b, -200, 8, 20).fill(0x1F2937).stroke({ width: 2, color: 0x4B5563 })
      }
      // Window
      t.rect(-8, -120, 16, 24).fill(0xFCD34D).alpha = 0.8
      t.x = i * 260 + 100; t.y = 280
      parallaxFar.addChild(t)
    }
  } else if (theme === 'sky') {
    // Floating islands + extra clouds
    for (let i = 0; i < 8; i++) {
      const isl = new PIXI.Graphics()
      isl.ellipse(0, 0, 70, 22).fill(0x16A34A).stroke({ width: 3, color: 0x166534 })
      isl.ellipse(0, 6, 60, 14).fill(0x854D0E)
      isl.x = i * 320 + 150; isl.y = 100 + (i % 3) * 80
      parallaxFar.addChild(isl)
    }
    drawClouds(PIXI, 18, 0xFFFFFF, 0xDBEAFE)
  } else if (theme === 'final') {
    // Stars + nebula
    for (let i = 0; i < 40; i++) {
      const s = new PIXI.Graphics()
      s.circle(0, 0, 1 + Math.random() * 2).fill(0xFFFFFF)
      s.x = Math.random() * 4000; s.y = Math.random() * 400
      s.alpha = 0.5 + Math.random() * 0.5
      parallaxFar.addChild(s)
    }
    // Nebula clouds (purple/pink)
    for (let i = 0; i < 6; i++) {
      const n = new PIXI.Graphics()
      n.circle(0, 0, 60).fill(0x7C3AED).alpha = 0.3
      n.circle(-30, 0, 50).fill(0xBE185D).alpha = 0.25
      n.x = i * 500 + 200; n.y = 100 + (i % 3) * 60
      parallaxFar.addChild(n)
    }
  } else {
    // Default — clouds
    drawClouds(PIXI, 14, 0xFFFFFF, 0xDBEAFE)
  }
}

function drawClouds(PIXI, count, fill, stroke) {
  // Hotfix #118: use SMB1 ref-cloud sprite if available, fall back to Graphics
  const cloudTex = MARIO_TEXTURES && MARIO_TEXTURES.ref_cloud
  for (let i = 0; i < count; i++) {
    if (cloudTex) {
      const c = new PIXI.Sprite(cloudTex)
      // ref-cloud.png is 48×24 native → scale up for parallax bg
      const scale = 3 + (i % 3)
      c.width = 48 * scale; c.height = 24 * scale
      c.x = i * 220 + 80; c.y = 35 + (i % 4) * 55
      c.alpha = 0.92
      parallaxFar.addChild(c)
    } else {
      const c = new PIXI.Graphics()
      c.circle(0, 0, 28).fill(fill).stroke({ width: 2, color: stroke })
      c.circle(-22, 6, 22).fill(fill).stroke({ width: 2, color: stroke })
      c.circle(22, 6, 22).fill(fill).stroke({ width: 2, color: stroke })
      c.circle(-12, -12, 18).fill(fill)
      c.circle(12, -12, 18).fill(fill)
      c.x = i * 220 + 80; c.y = 50 + (i % 4) * 60
      c.alpha = 0.92
      parallaxFar.addChild(c)
    }
  }
}

function buildMidLayer(theme, PIXI) {
  // Mid layer = ground silhouettes (hills/dunes/snow piles/lava pools).
  const groundY = _gameH() - 30
  if (theme === 'lava') {
    for (let i = 0; i < 10; i++) {
      const lv = new PIXI.Graphics()
      const w = 180 + (i % 3) * 60
      lv.ellipse(0, 0, w, 50).fill(0xDC2626).stroke({ width: 3, color: 0x7F1D1D })
      lv.ellipse(-w*0.2, -10, w*0.4, 18).fill(0xFCD34D)
      lv.x = i * 380 + 150; lv.y = groundY
      parallaxMid.addChild(lv)
    }
  } else if (theme === 'ice') {
    for (let i = 0; i < 10; i++) {
      const sn = new PIXI.Graphics()
      const w = 180 + (i % 3) * 60
      sn.ellipse(0, 0, w, 70).fill(0xE0F2FE).stroke({ width: 3, color: 0x7DD3FC })
      sn.ellipse(-w*0.25, -20, w*0.4, 30).fill(0xFFFFFF)
      sn.x = i * 380 + 150; sn.y = groundY
      parallaxMid.addChild(sn)
    }
  } else if (theme === 'desert') {
    for (let i = 0; i < 10; i++) {
      const d = new PIXI.Graphics()
      const w = 200 + (i % 3) * 80
      d.ellipse(0, 0, w, 60).fill(0xFBBF24).stroke({ width: 3, color: 0x92400E })
      d.ellipse(-w*0.3, -10, w*0.4, 22).fill(0xFEF3C7)
      d.x = i * 400 + 150; d.y = groundY
      parallaxMid.addChild(d)
      // Cactus
      if (i % 2 === 0) {
        const cact = new PIXI.Graphics()
        cact.rect(-6, -60, 12, 60).fill(0x16A34A).stroke({ width: 2, color: 0x166534 })
        cact.rect(-18, -40, 12, 22).fill(0x16A34A).stroke({ width: 2, color: 0x166534 })
        cact.rect(6, -50, 12, 22).fill(0x16A34A).stroke({ width: 2, color: 0x166534 })
        cact.x = i * 400 + 220; cact.y = groundY - 20
        parallaxMid.addChild(cact)
      }
    }
  } else if (theme === 'cave') {
    for (let i = 0; i < 10; i++) {
      const r = new PIXI.Graphics()
      const w = 160 + (i % 3) * 50
      r.ellipse(0, 0, w, 70).fill(0x44403C).stroke({ width: 3, color: 0x1C1917 })
      r.ellipse(-w*0.2, -15, w*0.35, 20).fill(0x57534E)
      r.x = i * 360 + 150; r.y = groundY
      parallaxMid.addChild(r)
    }
  } else if (theme === 'castle' || theme === 'final') {
    for (let i = 0; i < 8; i++) {
      const r = new PIXI.Graphics()
      const w = 200 + (i % 3) * 60
      r.rect(-w/2, -50, w, 50).fill(0x1F2937).stroke({ width: 3, color: 0x111827 })
      // Battlements top
      for (let b = -w/2; b < w/2 - 10; b += 30) {
        r.rect(b, -65, 16, 18).fill(0x1F2937)
      }
      r.x = i * 460 + 150; r.y = groundY
      parallaxMid.addChild(r)
    }
  } else {
    // Default — Hotfix #118: use SMB1 hill sprite if available, else Graphics
    const hillTex = MARIO_TEXTURES && MARIO_TEXTURES.ref_hill
    for (let i = 0; i < 10; i++) {
      if (hillTex) {
        const h = new PIXI.Sprite(hillTex)
        // ref-hill.png is 128×128 native — scale for mid parallax bg
        const sc = 2 + (i % 2)
        h.width = 128 * sc; h.height = 128 * sc
        h.anchor.set(0.5, 1)
        h.x = i * 380 + 150; h.y = groundY
        parallaxMid.addChild(h)
      } else {
        const b = new PIXI.Graphics()
        const w = 180 + (i % 3) * 60
        const h = 70 + (i % 4) * 25
        b.ellipse(0, 0, w, h).fill(0x16A34A).stroke({ width: 3, color: 0x166534 })
        b.ellipse(-w*0.3, -h*0.3, w*0.5, h*0.4).fill(0x22C55E)
        b.x = i * 380 + 150; b.y = groundY
        parallaxMid.addChild(b)
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
//  LEVEL LOADER
// ═══════════════════════════════════════════════════════════════════
function loadLevel(lvNum) {
  const PIXI = window.PIXI
  const idx = Math.max(0, Math.min(LEVELS.length - 1, lvNum - 1))
  levelData = LEVELS[idx]
  S.level = lvNum

  // Reset state (keep lives/coins for momentum)
  S.x = levelData.spawn.x
  S.y = levelData.spawn.y
  S.vx = 0; S.vy = 0
  S.facing = 1; S.onGround = false; S.jumpFrames = 0
  S.invincible = 0; S.starMode = 0; S.hitFrames = 0
  S.camX = 0; S.gameOver = false; S.won = false; S.paused = false
  S.goombaHitsThisLevel = 0; S.perfectMath = 0
  S.walkFrame = 0; S.walkT = 0

  // Clear world
  world.removeChildren()
  solidTiles.length = 0
  S.goombas.length = 0; S.coinList.length = 0; S.mushrooms.length = 0; S.bolts.length = 0
  S.stars.length = 0; S.spikes.length = 0; S.qBlocks.length = 0

  // Ground tiles + pit edge warnings (Hotfix #112)
  const _pits = levelData.pits || []
  const _isPitCol = (tx) => _pits.some(p => tx >= p[0] && tx < p[0] + p[1])
  const _isPitEdge = (tx) => !_isPitCol(tx) && (_isPitCol(tx-1) || _isPitCol(tx+1))
  for (const seg of levelData.ground) {
    for (let i = 0; i < seg.len; i++) {
      const tx = seg.x + i
      if (_isPitCol(tx)) continue
      const kind = _isPitEdge(tx) ? 'block-edge' : 'block'
      placeTile(kind, tx, 10)
      placeTile('block', tx, 11)
    }
  }
  // Pit overlay graphics — red gradient warning visible from afar so player
  // doesn't "tiba-tiba jatuh". Pixi Graphics, GPU rendered, no per-frame cost.
  const PIXI_ = window.PIXI
  for (const p of _pits) {
    const startTx = p[0], len = p[1]
    const ov = new PIXI_.Graphics()
    const w = len * TILE
    // Red gradient stripes
    ov.rect(0, 0, w, _gameH()).fill({ color: 0x991b1b, alpha: 0.15 })
    // Top edge danger band
    ov.rect(0, 9*TILE, w, 4).fill({ color: 0xef4444, alpha: 0.85 })
    ov.rect(0, 9*TILE + 6, w, 2).fill({ color: 0xfca5a5, alpha: 0.6 })
    // Diagonal hash lines
    for (let i = 0; i < w + _gameH(); i += 28) {
      ov.poly([i, 9*TILE+10, i+12, 9*TILE+10, i-12, _gameH(), i-24, _gameH()]).fill({ color: 0x7f1d1d, alpha: 0.18 })
    }
    ov.x = startTx * TILE; ov.y = 0
    world.addChild(ov)
  }
  // Platforms (suspended)
  for (const p of levelData.platforms) {
    for (let i = 0; i < p.len; i++) placeTile('brick', p.x + i, p.y)
  }
  // Q-blocks
  for (const q of levelData.qBlocks) {
    const sp = placeTile('qblock', q[0], q[1])
    sp._g21Type = 'qblock'
    sp._g21Reward = q[2]
    sp._g21Hit = false
    S.qBlocks.push(sp)
  }
  // ── Coins (Hotfix #118: SMB1 ref-coin sprite; Graphics fallback) ──
  const _coinTex = MARIO_TEXTURES.ref_coin0 || MARIO_TEXTURES.coin
  for (const c of levelData.coins) {
    let g
    if (_coinTex) {
      g = new PIXI.Sprite(_coinTex)
      g.width = TILE * 0.55; g.height = TILE * 0.55
      g.anchor.set(0.5, 0.5)
    } else {
      g = new PIXI.Graphics()
      g.circle(0, 0, 18).fill(0xFCD34D).stroke({ width: 3, color: 0xB45309 })
      g.circle(-4, -4, 4).fill(0xFEF3C7)
      g.rect(-2, -10, 4, 20).fill(0xB45309)
    }
    g.x = c[0] * TILE + TILE/2; g.y = c[1] * TILE + TILE/2
    g._g21Bob = Math.random() * 6.28
    g._g21CoinFrames = [
      MARIO_TEXTURES.ref_coin0, MARIO_TEXTURES.ref_coin1, MARIO_TEXTURES.ref_coin2,
    ].filter(Boolean)
    g._g21CoinFrameT = 0
    world.addChild(g)
    S.coinList.push(g)
  }
  // ── Goombas (Hotfix #118: SMB1 ref-goomba sprite; Graphics fallback) ──
  const _goomTex0 = MARIO_TEXTURES.ref_goomba0
  const _goomTex1 = MARIO_TEXTURES.ref_goomba1
  for (const goom of levelData.goombas) {
    let g
    if (_goomTex0) {
      g = new PIXI.Sprite(_goomTex0)
      g.width = TILE; g.height = TILE
      g.anchor.set(0.5, 1)
      g._g21GoomFrames = [_goomTex0, _goomTex1 || _goomTex0]
      g._g21GoomFrameT = 0
    } else {
      g = new PIXI.Graphics()
      g.ellipse(0, -14, 24, 16).fill(0x8B4513).stroke({ width: 2, color: 0x4A2C0F })
      g.ellipse(0, -4, 22, 14).fill(0xC68442).stroke({ width: 2, color: 0x4A2C0F })
      g.ellipse(-12, 4, 8, 5).fill(0x2D1A0A)
      g.ellipse(12, 4, 8, 5).fill(0x2D1A0A)
      g.circle(-7, -16, 4).fill(0xFFFFFF)
      g.circle(7, -16, 4).fill(0xFFFFFF)
      g.circle(-7, -15, 2).fill(0x000000)
      g.circle(7, -15, 2).fill(0x000000)
      g.poly([-12,-22, -2,-19, -12,-19]).fill(0x2D1A0A)
      g.poly([12,-22, 2,-19, 12,-19]).fill(0x2D1A0A)
    }
    g.x = goom[0] * TILE + TILE/2; g.y = goom[1] * TILE + TILE
    g._g21Vx = (Math.random() > 0.5 ? 1 : -1) * (1.2 + Math.random() * 0.6)
    g._g21Alive = true
    g._g21BaseY = g.y
    g._g21WalkT = Math.random() * Math.PI * 2
    world.addChild(g)
    S.goombas.push(g)
  }
  // ── Mushrooms (Hotfix #118: SMB1 ref-mushroom sprite; Graphics fallback) ──
  const _mushroomTex = MARIO_TEXTURES.ref_mushroom || MARIO_TEXTURES.mushroom
  for (const m of levelData.mushrooms) {
    let g
    if (_mushroomTex) {
      g = new PIXI.Sprite(_mushroomTex)
      g.width = TILE * 0.75; g.height = TILE * 0.75
      g.anchor.set(0.5, 1)
      g.x = m[0] * TILE + TILE/2; g.y = m[1] * TILE + TILE
      g._g21Bob = Math.random() * 6.28
      world.addChild(g)
      S.mushrooms.push(g)
      continue
    }
    g = new PIXI.Graphics()
    g.ellipse(0, -16, 22, 14).fill(0xDC2626).stroke({ width: 2, color: 0x7F1D1D })
    g.circle(-10, -16, 4).fill(0xFFFFFF)
    g.circle(10, -16, 4).fill(0xFFFFFF)
    g.circle(0, -20, 4).fill(0xFFFFFF)
    g.rect(-8, -8, 16, 14).fill(0xFEF3C7).stroke({ width: 2, color: 0x92400E })
    // Eyes
    g.circle(-3, -2, 2).fill(0x000000)
    g.circle(3, -2, 2).fill(0x000000)
    g.x = m[0] * TILE + TILE/2; g.y = m[1] * TILE + TILE
    g._g21Bob = Math.random() * 6.28
    world.addChild(g)
    S.mushrooms.push(g)
  }
  // ── Stars (Hotfix #118: SMB1 starman sprite; Graphics fallback) ──
  const _starTex = MARIO_TEXTURES.ref_starman || MARIO_TEXTURES.star
  for (const st of levelData.stars) {
    let g
    if (_starTex) {
      g = new PIXI.Sprite(_starTex)
      g.width = TILE * 0.85; g.height = TILE * 0.85
      g.anchor.set(0.5, 1)
    } else {
      g = new PIXI.Graphics()
      const pts = []
      for (let i = 0; i < 10; i++) {
        const r = i % 2 === 0 ? 22 : 10
        const a = (i * Math.PI) / 5 - Math.PI/2
        pts.push(Math.cos(a) * r, Math.sin(a) * r - 14)
      }
      g.poly(pts).fill(0xFCD34D).stroke({ width: 3, color: 0xD97706 })
      g.circle(-6, -16, 3).fill(0x000000)
      g.circle(6, -16, 3).fill(0x000000)
      g.circle(-5, -17, 1).fill(0xFFFFFF)
      g.circle(7, -17, 1).fill(0xFFFFFF)
    }
    g.x = st[0] * TILE + TILE/2; g.y = st[1] * TILE + TILE
    g._g21Bob = Math.random() * 6.28
    world.addChild(g)
    S.stars.push(g)
  }
  // Spikes (drawn as red triangles via Graphics)
  for (const sp of levelData.spikes) {
    const g = new PIXI.Graphics()
    // Multiple spikes in a row
    for (let i = 0; i < 3; i++) {
      const x = i * 22 + 8
      g.poly([x-10,0, x+10,0, x,-26])
      g.fill(0xEF4444)
      g.stroke({ width: 2, color: 0x7F1D1D })
    }
    // Base bar
    g.rect(0, -2, TILE, 6).fill(0x4B5563).stroke({ width: 2, color: 0x1F2937 })
    g.x = sp[0] * TILE; g.y = sp[1] * TILE + TILE
    world.addChild(g)
    S.spikes.push(g)
  }
  // Goal flag — animated checkered banner with pole
  const flag = new PIXI.Graphics()
  // Pole (gradient brown → light brown)
  flag.rect(-6, -TILE*3.5, 12, TILE*3.5).fill(0x6B7280).stroke({ width: 2, color: 0x374151 })
  flag.rect(-6, -TILE*3.5, 4, TILE*3.5).fill(0xD1D5DB) // highlight
  // Top ball
  flag.circle(0, -TILE*3.5, 9).fill(0xFCD34D).stroke({ width: 2, color: 0x92400E })
  // Banner — checkered pattern
  flag.poly([6,-TILE*3.4, 76,-TILE*3.15, 76,-TILE*2.45, 6,-TILE*2.7]).fill(0xFEF3C7).stroke({width:2,color:0x92400E})
  // Checker squares
  for (let i = 0; i < 4; i++) {
    for (let j = 0; j < 2; j++) {
      if ((i+j) % 2 === 0) {
        flag.rect(10 + i*16, -TILE*3.35 + j*16, 14, 14).fill(0x4ade80)
      }
    }
  }
  // Trophy emoji on banner
  flag.poly([28,-TILE*3.2, 56,-TILE*3.2, 56,-TILE*2.8, 42,-TILE*2.7, 28,-TILE*2.8]).fill(0xFCD34D).alpha = 0.7
  flag.x = levelData.goal.x; flag.y = levelData.goal.y
  flag._g21IsGoal = true
  world.addChild(flag)
  S._goalFlag = flag

  // Player rendered as DOM <img> overlay (id=pikachu-sprite) — preserves
  // GIF animation natively. We DON'T add to world; we sync its CSS
  // left/top each frame in syncPikachuSprite().
  // Hotfix #106: removed buggy Pixi sprite-sheet slicing that caused
  // "termutilasi" (mutilated body parts) when the assumed grid layout
  // didn't match the actual sprite sheet.
  setPikachuAnim('idle')

  // Apply theme background — body gradient + Pixi parallax both swap
  document.body.className = ''
  if (levelData.theme) document.body.classList.add('theme-' + levelData.theme)
  buildBackground()  // rebuild Pixi parallax for new theme
  // Hotfix #112-#9: world-level decorations (non-collision props in world layer)
  // for that "extra Mario detail" — bushes, signs, torches, etc.
  try { buildWorldDecorations(levelData.theme || 'default') } catch (e) { console.warn('[g21] decorations:', e) }
  document.getElementById('level-text').textContent = `LEVEL ${lvNum} • ${(S.difficulty||'easy').toUpperCase()}`
  document.getElementById('status-text').textContent = 'Ayo lompat! ⚡'
  _rebuildSolidTiles()
  updateHUD()
}
function _rebuildSolidTiles() {
  solidTiles.length = 0
  for (const c of world.children) { if (c._g21Solid) solidTiles.push(c) }
}

// Hotfix #112-#9: theme-aware world decorations (non-collision Pixi
// Graphics props placed on the GROUND row — bushes, flowers, signposts,
// torches, etc). Adds Mario-feel without affecting gameplay.
const _g21Decorations = []
function buildWorldDecorations(theme) {
  const PIXI = window.PIXI
  // Clear previous decorations
  for (const d of _g21Decorations) { try { world.removeChild(d) } catch (_) {} }
  _g21Decorations.length = 0
  if (!levelData) return
  const groundTopY = 10 * TILE  // top of ground tile row
  const widthTiles = levelData.width
  const isPit = (tx) => (levelData.pits || []).some(p => tx >= p[0] && tx < p[0] + p[1])
  // Place 1 decoration roughly every 4-7 tiles, skip pits + spawn area + goal
  for (let tx = 4; tx < widthTiles - 3; tx += 4 + Math.floor(Math.random() * 3)) {
    if (isPit(tx)) continue
    const x = tx * TILE + TILE / 2
    const y = groundTopY  // top of ground = decoration baseline
    const d = makeDecoration(theme, PIXI, x, y, tx)
    if (d) {
      world.addChild(d)
      _g21Decorations.push(d)
    }
  }
}

function makeDecoration(theme, PIXI, x, y, seed) {
  const g = new PIXI.Graphics()
  g.x = x; g.y = y
  if (theme === 'cave') {
    // Glowing crystal cluster
    const c = (seed % 3 === 0) ? 0x60a5fa : (seed % 3 === 1) ? 0xa78bfa : 0x34d399
    g.poly([0,-12, 6,-4, 4,8, -4,8, -6,-4]).fill(c).stroke({ width: 2, color: 0x1e293b })
    g.poly([10,-8, 14,-2, 12,6, 6,4, 6,-4]).fill({ color: c, alpha: 0.7 })
  } else if (theme === 'lava') {
    // Glowing crack with embers
    g.ellipse(0, -2, 14, 4).fill(0xfb923c).alpha = 0.7
    g.circle(0, -2, 3).fill(0xfde047)
    for (let i = 0; i < 3; i++) {
      g.circle((i-1)*4, -10 - i*3, 1.5).fill(0xfca5a5)
    }
  } else if (theme === 'ice') {
    // Snowman or pine tree
    if (seed % 2 === 0) {
      // Pine tree
      g.poly([0,-40, 10,-20, -10,-20]).fill(0x166534).stroke({ width: 2, color: 0x14532d })
      g.poly([0,-26, 12,-6, -12,-6]).fill(0x16a34a).stroke({ width: 2, color: 0x14532d })
      g.rect(-3, -6, 6, 8).fill(0x6b3410)
    } else {
      // Snowman
      g.circle(0, -8, 8).fill(0xffffff).stroke({ width: 1, color: 0x93c5fd })
      g.circle(0, -22, 6).fill(0xffffff).stroke({ width: 1, color: 0x93c5fd })
      g.circle(-2, -23, 1).fill(0x000)
      g.circle(2, -23, 1).fill(0x000)
      g.poly([0,-21, 4,-19, 0,-18]).fill(0xf97316)
    }
  } else if (theme === 'desert') {
    // Small cactus or rock pile
    if (seed % 2 === 0) {
      g.rect(-3, -22, 6, 22).fill(0x16a34a).stroke({ width: 2, color: 0x166534 })
      g.rect(-9, -16, 6, 10).fill(0x16a34a).stroke({ width: 2, color: 0x166534 })
      // Spikes (white dots)
      for (let i = 0; i < 4; i++) g.circle(0, -4 - i*5, 0.8).fill(0xfef3c7)
    } else {
      g.ellipse(0, -3, 12, 6).fill(0x78350f).stroke({ width: 2, color: 0x451a03 })
      g.ellipse(-6, -7, 6, 4).fill(0x92400e)
    }
  } else if (theme === 'castle' || theme === 'final') {
    // Wall torch with animated flame
    g.rect(-2, -16, 4, 16).fill(0x4b5563).stroke({ width: 1, color: 0x1f2937 })  // bracket
    const flame = new PIXI.Graphics()
    flame.poly([0,-30, 6,-22, 4,-14, -4,-14, -6,-22]).fill(0xfbbf24)
    flame.poly([0,-26, 3,-22, 2,-16, -2,-16, -3,-22]).fill(0xf97316)
    flame.poly([0,-22, 1,-18, -1,-18]).fill(0xfef3c7)
    g.addChild(flame)
    g._g21Flame = flame  // for animation
    g._g21Anim = 'torch'
  } else if (theme === 'sky') {
    // Cloud puff (small, sits on platform)
    g.circle(0, -8, 8).fill(0xffffff)
    g.circle(-6, -6, 6).fill(0xffffff)
    g.circle(6, -6, 6).fill(0xffffff)
  } else {
    // Default theme — Hotfix #118: use SMB1 ref-bush sprite for even tiles,
    // Pixi Graphics flower for odd tiles (no bush sprite for flowers).
    const bushTex = MARIO_TEXTURES && MARIO_TEXTURES.ref_bush
    if (seed % 2 === 0 && bushTex) {
      // SMB1 bush sprite — ref-bush.png is 48×16 native
      const bs = new PIXI.Sprite(bushTex)
      bs.width = 96; bs.height = 32   // 2× native for in-world visibility
      bs.anchor.set(0.5, 1)
      bs.x = x; bs.y = y
      return bs
    } else if (seed % 2 === 0) {
      // Bush fallback Graphics
      g.circle(0, -6, 8).fill(0x16a34a).stroke({ width: 2, color: 0x14532d })
      g.circle(-7, -4, 6).fill(0x16a34a).stroke({ width: 2, color: 0x14532d })
      g.circle(7, -4, 6).fill(0x16a34a).stroke({ width: 2, color: 0x14532d })
      g.circle(-3, -10, 5).fill(0x22c55e)
      g.circle(3, -10, 5).fill(0x22c55e)
    } else {
      // Flower (red petals + yellow center) — no SMB1 equivalent, keep Graphics
      const stemH = 16
      g.rect(-1, -stemH, 2, stemH).fill(0x16a34a)
      g.circle(-4, -stemH-2, 3).fill(0xef4444)
      g.circle(4, -stemH-2, 3).fill(0xef4444)
      g.circle(-4, -stemH+4, 3).fill(0xef4444)
      g.circle(4, -stemH+4, 3).fill(0xef4444)
      g.circle(0, -stemH-6, 3).fill(0xef4444)
      g.circle(0, -stemH+1, 3).fill(0xfbbf24)
      g.ellipse(-4, -8, 4, 2).fill(0x22c55e)
    }
  }
  return g
}

// Animate torches — flame flicker each frame
function _g21AnimateDecorations() {
  for (const d of _g21Decorations) {
    if (d._g21Anim === 'torch' && d._g21Flame) {
      d._g21Flame.scale.y = 1 + Math.sin(performance.now() * 0.012 + d.x * 0.01) * 0.15
      d._g21Flame.scale.x = 1 + Math.cos(performance.now() * 0.014 + d.x * 0.013) * 0.08
    }
  }
}

// Hotfix #118: placeTile uses authentic SMB1 sprites from MARIO_TEXTURES
// when available. Falls back to Pixi Graphics if texture is null (graceful
// degradation so game never breaks). Sprites are scaled to TILE×TILE (64px).
function placeTile(kind, tx, ty) {
  const PIXI = window.PIXI
  let node = null

  if (kind === 'block' || kind === 'block-edge') {
    const tex = MARIO_TEXTURES.ref_ground || MARIO_TEXTURES.ref_block
    if (tex) {
      // Ground: tile ref_ground.png (16×16 native → scaled to TILE×TILE)
      // For ty===10 (top ground row) use ground sprite; ty===11 use block sprite
      const t = (ty === 11) ? (MARIO_TEXTURES.ref_block || tex) : tex
      if (ty === 10) {
        // Top ground tile — use TilingSprite for perfect repeat
        const ts = new PIXI.TilingSprite({ texture: t, width: TILE, height: TILE })
        ts.x = tx * TILE; ts.y = ty * TILE
        ts._g21Tx = tx; ts._g21Ty = ty
        ts._g21Solid = true
        ts._g21Type = kind
        world.addChild(ts)
        // Pit-edge visual overlay on top
        if (kind === 'block-edge') {
          const ov = new PIXI.Graphics()
          ov.rect(0, 0, TILE, 8).fill({ color: 0xef4444, alpha: 0.85 })
          ov.x = tx * TILE; ov.y = ty * TILE
          world.addChild(ov)
        }
        return ts
      } else {
        const sp = new PIXI.Sprite(t)
        sp.width = TILE; sp.height = TILE
        sp.x = tx * TILE; sp.y = ty * TILE
        sp._g21Tx = tx; sp._g21Ty = ty
        sp._g21Solid = true
        sp._g21Type = kind
        world.addChild(sp)
        return sp
      }
    }
    // Fallback: legacy Graphics block
    node = _placeTileLegacy(kind, tx, ty, PIXI)
    world.addChild(node)
    return node

  } else if (kind === 'brick') {
    const tex = MARIO_TEXTURES.ref_brick
    if (tex) {
      const sp = new PIXI.Sprite(tex)
      sp.width = TILE; sp.height = TILE
      sp.x = tx * TILE; sp.y = ty * TILE
      sp._g21Tx = tx; sp._g21Ty = ty
      sp._g21Solid = true
      sp._g21Type = kind
      world.addChild(sp)
      return sp
    }
    node = _placeTileLegacy(kind, tx, ty, PIXI)
    world.addChild(node)
    return node

  } else if (kind === 'qblock') {
    const tex = MARIO_TEXTURES.ref_qblock
    if (tex) {
      const sp = new PIXI.Sprite(tex)
      sp.width = TILE; sp.height = TILE
      sp.x = tx * TILE; sp.y = ty * TILE
      sp._g21Tx = tx; sp._g21Ty = ty
      sp._g21Solid = true
      sp._g21Type = kind
      world.addChild(sp)
      return sp
    }
    node = _placeTileLegacy(kind, tx, ty, PIXI)
    world.addChild(node)
    return node
  }

  // Unknown kind — legacy
  node = _placeTileLegacy(kind, tx, ty, PIXI)
  world.addChild(node)
  return node
}

// Legacy Pixi Graphics tile renderer (Hotfix #107 original code).
// Used as fallback when MARIO_TEXTURES are not loaded.
function _placeTileLegacy(kind, tx, ty, PIXI) {
  const g = new PIXI.Graphics()
  if (kind === 'block' || kind === 'block-edge') {
    g.rect(0, 0, TILE, TILE).fill(0x8B6F47)
    g.rect(0, 0, TILE, 5).fill(0xA8835C)
    g.rect(0, TILE-5, TILE, 5).fill(0x5C4A33)
    g.rect(0, 0, TILE, TILE).stroke({ width: 2, color: 0x5C4A33 })
    if (ty === 10) {
      g.rect(0, 0, TILE, 10).fill(0x4ade80).stroke({ width: 1, color: 0x166534 })
      for (let tx2 = 8; tx2 < TILE - 8; tx2 += 16) {
        g.circle(tx2, 4, 3).fill(0x166534)
        g.rect(tx2 - 1, 1, 2, 4).fill(0x16A34A)
      }
    }
    g.rect(8, 18, TILE-16, 3).fill(0x6E5638).alpha = 0.6
    g.rect(8, 38, TILE-16, 3).fill(0x6E5638).alpha = 0.6
    if (kind === 'block-edge') {
      g.rect(0, 0, TILE, 8).fill(0xef4444)
      for (let s = -TILE; s < TILE * 2; s += 12) {
        g.poly([s, 0, s+8, 0, s-TILE+8, TILE, s-TILE, TILE]).fill({ color: 0x991b1b, alpha: 0.4 })
      }
    }
  } else if (kind === 'brick') {
    g.rect(0, 0, TILE, TILE).fill(0xC53030)
    g.stroke({ width: 2, color: 0x7B2D2D })
    g.rect(0, 0, TILE, TILE/2).stroke({ width: 2, color: 0x7B2D2D })
    g.rect(TILE/2, TILE/2, TILE/2, TILE/2).stroke({ width: 2, color: 0x7B2D2D })
    g.rect(0, TILE/2, TILE/2, TILE/2).stroke({ width: 2, color: 0x7B2D2D })
    g.rect(2, 2, 8, TILE-4).fill(0xE8676B).alpha = 0.4
  } else if (kind === 'qblock') {
    g.rect(0, 0, TILE, TILE).fill(0xF59E0B).stroke({ width: 3, color: 0x92400E })
    g.rect(4, 4, TILE-8, TILE-8).stroke({ width: 2, color: 0xFCD34D })
    const cx = TILE/2, cy = TILE/2
    g.circle(cx, cy-8, 9).stroke({ width: 4, color: 0xFFFFFF })
    g.rect(cx-3, cy-2, 6, 10).fill(0xFFFFFF)
    g.circle(cx, cy+14, 4).fill(0xFFFFFF)
  }
  g.x = tx * TILE; g.y = ty * TILE
  g._g21Tx = tx; g._g21Ty = ty
  g._g21Solid = (kind === 'block' || kind === 'brick' || kind === 'qblock')
  g._g21Type = kind
  return g
}

// Hotfix #106: Pikachu rendered as DOM <img> with animated GIF.
// 4 anim states map to 4 GIF files in assets/mario-pokemon/sprites/.
const PIKA_ANIMS = {
  idle:    '../assets/mario-pokemon/sprites/pikachu-idle.gif',
  running: '../assets/mario-pokemon/sprites/pikachu-running.gif',
  jump:    '../assets/mario-pokemon/sprites/pikachu-jump.gif',
  happy:   '../assets/mario-pokemon/sprites/pikachu-happy.gif',
}
let _pikaCurrentAnim = null
function setPikachuAnim(name) {
  if (_pikaCurrentAnim === name) return
  const el = document.getElementById('pikachu-sprite')
  if (!el) return
  const src = PIKA_ANIMS[name] || PIKA_ANIMS.idle
  // Only swap src if changed (force GIF reload only on transition)
  if (!el.src.endsWith(src.split('/').pop())) el.src = src
  _pikaCurrentAnim = name
}

function syncPikachuSprite() {
  const wrap = document.getElementById('pikachu-wrap')
  const el = document.getElementById('pikachu-sprite')
  const aura = document.getElementById('pikachu-aura')
  if (!wrap || !el) return
  const screenX = S.x - S.camX
  const screenY = S.y
  // Hotfix #112: state-aware anchor — big mode wrap is 118×118 (was hardcoded
  // -84 → big sprite floated 34px into the platform). Match collision body.
  const wrapH = S.pikachuState === 'big' ? 118 : 84
  const wrapW = S.pikachuState === 'big' ? 80 : 60
  // Hotfix #118: haloFudge compensates for remaining glow/padding in the GIF
  // files (idle/running/jump/happy). The static PNGs are now cropped via
  // process-mario-sprites.py, but GIFs cannot be cropped without losing
  // animation. The glow halo in GIFs adds ~12px transparent space at bottom,
  // making Pikachu appear to hover. We add haloFudge to move sprite DOWN by
  // that amount, so feet visually sit on the platform.
  // For static PNG states (pikachu-small-cropped / pikachu-big-cropped) the
  // crop already removed the halo, so fudge = 0.
  const _pikaGIFStates = ['idle', 'running', 'jump', 'happy']
  const haloFudge = _pikaGIFStates.includes(_pikaCurrentAnim) ? 10 : 0
  // GPU-composited transform — single inline transform combining translate3d
  // (for position, GPU layer) and scaleX (for facing flip). Replaces left/top
  // layout reflow to keep 60fps stable.
  const flip = S.facing >= 0 ? 1 : -1
  wrap.style.transform = `translate3d(${screenX - wrapW/2}px, ${screenY - wrapH + haloFudge}px, 0)`
  const glow = S.electricMode > 0 ? 'drop-shadow(0 0 14px #fbbf24) drop-shadow(0 0 22px #fde047)' : 'drop-shadow(0 4px 6px rgba(0,0,0,0.4))'
  el.style.filter = glow + (S.hitFrames > 0 && Math.floor(S.hitFrames/4)%2 === 0 ? ' brightness(2.3)' : '')
  el.style.transform = `scaleX(${flip})`
  el.style.opacity = (S.hitFrames > 0 && Math.floor(S.hitFrames/4)%2===0) ? '0.45' : '1'
  if (aura) aura.style.opacity = S.electricMode > 0 ? '1' : '0'
}

// ═══════════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════════
function attachInput() {
  // Keyboard
  window.addEventListener('keydown', e => {
    if (S.gameOver || S.paused || S.pendingMath) return
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') S.input.left = true
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') S.input.right = true
    if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
      if (!S.input.jump) S.input.jumpPressed = true
      S.input.jump = true
    }
    if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') togglePause()
    if (e.key === 'x' || e.key === 'X' || e.key === 'j' || e.key === 'J') tryFireBolt()
  })
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') S.input.left = false
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') S.input.right = false
    if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') S.input.jump = false
  })
  // Touch buttons
  const wireBtn = (id, key) => {
    const el = document.getElementById(id); if (!el) return
    const press = e => { e.preventDefault(); el.classList.add('held'); if (key === 'jump' && !S.input.jump) S.input.jumpPressed = true; S.input[key] = true }
    const release = e => { e.preventDefault(); el.classList.remove('held'); S.input[key] = false }
    el.addEventListener('pointerdown', press)
    el.addEventListener('pointerup', release)
    el.addEventListener('pointercancel', release)
    el.addEventListener('pointerleave', release)
  }
  wireBtn('btn-left', 'left')
  wireBtn('btn-right', 'right')
  wireBtn('btn-jump', 'jump')
  // Tap-anywhere to jump (outside buttons/HUD)
  const skipJumpTap = e => e.target.closest('#mobile-controls,#hud-top,#math-quiz,.mc-btn,#btn-bolt,button')
  document.addEventListener('pointerdown', e => {
    if (skipJumpTap(e)) return
    if (!S.input.jump) S.input.jumpPressed = true
    S.input.jump = true
  })
  document.addEventListener('pointerup', e => {
    if (skipJumpTap(e)) return
    S.input.jump = false
  })
  // Bolt button (electric mode)
  const boltEl = document.getElementById('btn-bolt')
  if (boltEl) {
    boltEl.addEventListener('pointerdown', e => { e.preventDefault(); tryFireBolt() })
  }
}

// ═══════════════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════════════
function gameLoop() {
  if (!S.running || S.paused || S.pendingMath) return
  if (S.gameOver) return

  // Horizontal velocity from input
  const speed = S.starMode > 0 ? STAR_SPEED : RUN_SPEED
  if (S.input.left) { S.vx = -speed; S.facing = -1 }
  else if (S.input.right) { S.vx = speed; S.facing = 1 }
  else S.vx *= 0.78

  // Jump
  if (S.input.jumpPressed && S.onGround) {
    S.vy = S.starMode > 0 ? STAR_JUMP : JUMP_FORCE
    S.onGround = false
    S.jumpFrames = JUMP_HOLD_FRAMES
    sfx('sfx-jump')
    spawnParticles(S.x, S.y, 'dust', 4)
  }
  S.input.jumpPressed = false
  if (S.input.jump && S.jumpFrames > 0 && S.vy < 0) {
    S.vy -= 0.7
    S.jumpFrames--
  } else {
    S.jumpFrames = 0
  }

  // Gravity
  S.vy += GRAVITY
  if (S.vy > 18) S.vy = 18

  // Apply movement w/ collision (axis-separated AABB)
  movePlayer(S.vx, 0)
  movePlayer(0, S.vy)

  // Pit fall
  if (S.y > WORLD_H + 200) {
    onDeath('pit')
  }

  // Update entities
  updateGoombas()
  updateCoins()
  updateMushrooms()
  updateStars()
  updateQBlockBounce()
  checkSpikes()
  checkGoal()

  // Counters
  if (S.invincible > 0) S.invincible--
  if (S.starMode > 0) S.starMode--
  if (S.hitFrames > 0) S.hitFrames--

  // Animation state — drive DOM <img> GIF via setPikachuAnim()
  if (!S.onGround) setPikachuAnim('jump')
  else if (Math.abs(S.vx) > 0.5) setPikachuAnim('running')
  else setPikachuAnim('idle')
  if (S.electricMode > 0) {
    S.electricMode--
    if (S.electricMode === 0) {
      const b = document.getElementById('btn-bolt'); if (b) b.style.display = 'none'
    }
  }
  // Combo timer countdown — reset chain if no stomp within window
  if (S.comboTimer > 0) {
    S.comboTimer--
    if (S.comboTimer === 0) S.comboCount = 0
  }

  // Camera with lookahead — Hotfix #112: see pits earlier, snappier lerp.
  // Lookahead bias 100px to facing direction so player sees jurang ahead.
  const lookAhead = S.facing * 100
  const targetCamX = Math.max(0, Math.min(levelData.width * TILE - window.innerWidth, S.x - window.innerWidth/2 + lookAhead))
  S.camX += (targetCamX - S.camX) * 0.20
  world.x = -S.camX
  parallaxMid.x = -S.camX * 0.45
  parallaxFar.x = -S.camX * 0.18

  // Sync DOM Pikachu position
  syncPikachuSprite()

  // Update bolts (electric projectiles)
  updateBolts()

  // Animate torch flames (Hotfix #112-#9)
  if (typeof _g21AnimateDecorations === 'function') _g21AnimateDecorations()
}

// ═══════════════════════════════════════════════════════════════════
//  COLLISION (axis-separated AABB)
// ═══════════════════════════════════════════════════════════════════
function movePlayer(dx, dy) {
  // Hotfix #112: hBig 110 → 118 to match visual wrap height (was 8px
  // discrepancy causing big Pikachu to clip through platform top).
  const w = 52, hSmall = 80, hBig = 118
  const h = S.pikachuState === 'small' ? hSmall : hBig
  S.x += dx
  S.y += dy
  // Clamp horizontal
  S.x = Math.max(w/2, Math.min(levelData.width * TILE - w/2, S.x))
  // Build player AABB (anchor 0.5, 1 → x = center, y = bottom)
  const px = S.x - w/2, py = S.y - h, pw = w, ph = h
  // Check tile collisions
  for (const c of solidTiles) {
    if (px + pw <= c.x || px >= c.x + TILE) continue
    if (py + ph <= c.y || py >= c.y + TILE) continue
    // Skip elevated platform bricks for lateral collision — player walks under them
    if (dy === 0 && (c._g21Type === 'brick' || c._g21Type === 'qblock') && (c.y + TILE) <= S.y + 2) continue
    // Resolve based on movement axis
    if (dy > 0) { // falling — land on top
      S.y = c.y; S.vy = 0; S.onGround = true
    } else if (dy < 0) { // rising — bonk head
      S.y = c.y + TILE + ph; S.vy = 0
      // Q-block hit — bounce + reward
      if (c._g21Type === 'qblock' && !c._g21Hit) {
        c._g21Hit = true
        c._g21Bounce = 1 // start bounce animation
        sfx('sfx-bump')
        if (c._g21Reward === 'coin') {
          S.coins++ ; S.score += 10
          spawnScorePopup(c.x + TILE/2, c.y - 30, '+10', 'coin')
          spawnParticles(c.x + TILE/2, c.y, 'spark', 6)
          checkLifeFromCoins()
        } else if (c._g21Reward === 'mushroom') {
          // Spawn mushroom rising from Q-block (Hotfix #118: sprite or Graphics fallback)
          const PIXI = window.PIXI
          const _mTex = MARIO_TEXTURES.ref_mushroom || MARIO_TEXTURES.mushroom
          let m
          if (_mTex) {
            m = new PIXI.Sprite(_mTex)
            m.width = TILE * 0.75; m.height = TILE * 0.75
            m.anchor.set(0.5, 1)
          } else {
            m = new PIXI.Graphics()
            m.ellipse(0, -16, 22, 14).fill(0xDC2626).stroke({ width: 2, color: 0x7F1D1D })
            m.circle(-10, -16, 4).fill(0xFFFFFF)
            m.circle(10, -16, 4).fill(0xFFFFFF)
            m.circle(0, -20, 4).fill(0xFFFFFF)
            m.rect(-8, -8, 16, 14).fill(0xFEF3C7).stroke({ width: 2, color: 0x92400E })
            m.circle(-3, -2, 2).fill(0x000000)
            m.circle(3, -2, 2).fill(0x000000)
          }
          m.x = c.x + TILE/2; m.y = c.y - 4
          m._g21Bob = 0; m._g21FromBlock = true
          world.addChild(m)
          S.mushrooms.push(m)
          sfx('sfx-powerup')
          showMilestone('POWER UP! 🍄', '#fbbf24')
        }
      }
    } else if (dx > 0) {
      S.x = c.x - w/2
    } else if (dx < 0) {
      S.x = c.x + TILE + w/2
    }
  }
  if (dy === 0) return
  if (dy > 0 && S.vy === 0) S.onGround = true
}

// ═══════════════════════════════════════════════════════════════════
//  ENTITIES UPDATE
// ═══════════════════════════════════════════════════════════════════
function updateGoombas() {
  for (const g of S.goombas) {
    if (!g._g21Alive) {
      // Squish death — flatten + fade
      g.scale.y *= 0.85
      g.scale.x *= 1.04
      g.alpha -= 0.04
      g.y += 1.2
      if (g.alpha <= 0) { world.removeChild(g); g._g21Removed = true }
      continue
    }
    g.x += g._g21Vx
    g.scale.x = g._g21Vx > 0 ? -1 : 1
    g._g21WalkT = (g._g21WalkT || 0) + 0.18
    g.rotation = Math.sin(g._g21WalkT) * 0.08
    g.scale.y = 1 + Math.abs(Math.sin(g._g21WalkT)) * 0.06
    // Sprite walk animation — alternate frames every ~10 ticks
    if (g._g21GoomFrames && g._g21GoomFrames.length > 1) {
      g._g21GoomFrameT = (g._g21GoomFrameT || 0) + 1
      if (g._g21GoomFrameT % 10 === 0) {
        const fi = Math.floor(g._g21GoomFrameT / 10) % g._g21GoomFrames.length
        g.texture = g._g21GoomFrames[fi]
      }
    }
    // Edge turn — reverse at pit edges and walls
    const dir = Math.sign(g._g21Vx)
    const aheadX = Math.floor((g.x + dir * 30) / TILE)
    const groundCheckY = Math.floor((g.y + 4) / TILE)
    const wallCheckY = Math.floor((g.y - 16) / TILE)
    let hasGroundAhead = false, wallAhead = false
    for (const c of solidTiles) {
      if (c._g21Tx === aheadX) {
        if (c._g21Ty === groundCheckY) hasGroundAhead = true
        if (c._g21Ty === wallCheckY) wallAhead = true
      }
    }
    if (!hasGroundAhead || wallAhead) g._g21Vx *= -1
    // Goomba-goomba separation — each goomba nudges only itself (no other.x mutation)
    let pushX = 0
    for (const other of S.goombas) {
      if (other === g || !other._g21Alive) continue
      const dx = g.x - other.x
      if (Math.abs(dx) < TILE * 0.7 && Math.abs(g.y - other.y) < TILE) {
        const half = (TILE * 0.7 - Math.abs(dx)) / 2
        pushX += dx > 0 ? half : -half
      }
    }
    if (pushX !== 0) g.x += pushX
    // Player collision
    if (collides(g, S, 28, 70)) onGoombaCollide(g)
  }
  S.goombas = S.goombas.filter(g => !g._g21Removed)
}

function updateCoins() {
  for (let i = S.coinList.length - 1; i >= 0; i--) {
    const c = S.coinList[i]
    if (c._g21BaseY === undefined) c._g21BaseY = c.y
    c._g21Bob = (c._g21Bob || 0) + 0.06
    c.y = c._g21BaseY + Math.sin(c._g21Bob) * 3
    // Sprite animation — rotate through coin frames for spin effect
    if (c._g21CoinFrames && c._g21CoinFrames.length > 1) {
      c._g21CoinFrameT = (c._g21CoinFrameT || 0) + 1
      if (c._g21CoinFrameT % 7 === 0) {
        const fi = Math.floor(c._g21CoinFrameT / 7) % c._g21CoinFrames.length
        c.texture = c._g21CoinFrames[fi]
      }
    } else {
      c.rotation = Math.sin(c._g21Bob * 0.5) * 0.6
    }
    if (collides(c, S, 36, 70)) {
      sfx('sfx-coin')
      S.coins++; S.score += 10
      spawnScorePopup(c.x, c.y, '+10', 'coin')
      spawnParticles(c.x, c.y, 'spark', 5)
      world.removeChild(c)
      S.coinList.splice(i, 1)
      checkLifeFromCoins()
      updateHUD()
    }
  }
}

function updateMushrooms() {
  for (let i = S.mushrooms.length - 1; i >= 0; i--) {
    const m = S.mushrooms[i]
    m._g21Bob = (m._g21Bob || 0) + 0.12
    if (m._g21FromBlock && m._g21Bob < 1.0) m.y -= 1.5
    if (collides(m, S, 36, 70)) {
      sfx('sfx-powerup')
      if (S.pikachuState === 'small') {
        S.pikachuState = 'big'
        showMilestone('GROW! 🍄', '#dc2626')
        spawnParticles(S.x, S.y - 50, 'spark', 12)
        // Apply growth to DOM wrap (1.4× scale, 1 hit shield)
        const wrap = document.getElementById('pikachu-wrap')
        if (wrap) {
          wrap.style.transition = 'transform 0.4s cubic-bezier(.34,1.56,.64,1)'
          wrap.style.width = '118px'
          wrap.style.height = '118px'
          setTimeout(() => { if (wrap) wrap.style.transition = '' }, 450)
        }
      } else {
        S.score += 1000
        spawnScorePopup(m.x, m.y, '+1000', 'coin')
      }
      world.removeChild(m); S.mushrooms.splice(i, 1)
      updateHUD()
    }
  }
}

function updateStars() {
  for (let i = S.stars.length - 1; i >= 0; i--) {
    const st = S.stars[i]
    st._g21Bob = (st._g21Bob || 0) + 0.15
    st.rotation = st._g21Bob
    st.y += Math.sin(st._g21Bob) * 0.6
    if (collides(st, S, 36, 70)) {
      sfx('sfx-powerup')
      S.starMode = 600     // 10s invincibility (existing)
      S.electricMode = 600 // 10s ELECTRIC MODE — can fire bolts
      S.score += 500
      showMilestone('⚡ ELECTRIC! ⚡', '#fde047')
      spawnScorePopup(st.x, st.y, '+500', 'heal')
      spawnParticles(st.x, st.y, 'lightning', 14)
      spawnParticles(st.x, st.y, 'spark', 8)
      // Show bolt button on mobile
      const boltBtn = document.getElementById('btn-bolt')
      if (boltBtn) boltBtn.style.display = 'flex'
      showToast('⚡ ELECTRIC MODE 10s — Tekan ⚡ untuk tembak!', 3500)
      world.removeChild(st); S.stars.splice(i, 1)
    }
  }
}

// Q-block bounce animation — pop up briefly when hit, then darken to "used".
function updateQBlockBounce() {
  for (const q of S.qBlocks) {
    if (!q._g21Bounce) continue
    if (q._g21Bounce === 1) { q._g21BaseY = q._g21BaseY || q.y; q._g21Bounce = 2 }
    q._g21BounceT = (q._g21BounceT || 0) + 0.3
    const offset = Math.sin(q._g21BounceT) * 14
    q.y = q._g21BaseY - Math.max(0, offset)
    if (q._g21BounceT > Math.PI) {
      q.y = q._g21BaseY
      q._g21Bounce = 0
      q.tint = 0x666666 // mark as used
    }
  }
}

function checkSpikes() {
  if (S.invincible > 0 || S.starMode > 0) return
  for (const s of S.spikes) {
    if (collides(s, S, 28, 70, true)) {
      // instant -1 life (not math)
      S.lives -= 1
      sfx('sfx-damage')
      screenShake()
      S.invincible = 90
      S.hitFrames = 60
      knockback()
      if (S.lives <= 0) onDeath('spike')
      updateHUD()
    }
  }
}

function checkGoal() {
  if (!S._goalFlag) return
  if (Math.abs(S._goalFlag.x - S.x) < 50 && Math.abs(S._goalFlag.y - S.y) < 100) onWin()
}

function collides(a, player, aw, ph, looseY) {
  const ax = a.x - aw/2, ay = a.y - aw, awidth = aw, aheight = looseY ? aw * 1.4 : aw
  const px = player.x - 18, py = player.y - ph, pw = 36, pheight = ph
  return (ax + awidth > px && ax < px + pw && ay + aheight > py && ay < py + pheight)
}

// ═══════════════════════════════════════════════════════════════════
//  GOOMBA COLLISION — Math quiz on easy
// ═══════════════════════════════════════════════════════════════════
function onGoombaCollide(g) {
  if (S.invincible > 0) return
  // Stomp from above? player.vy > 0 and player.y near goomba.y - 30
  if (S.vy > 1 && S.y < g.y - 8) {
    g._g21Alive = false
    S.vy = JUMP_FORCE * 0.6
    // Combo system — chain stomps for bonus
    S.comboCount++
    S.comboTimer = 90  // 1.5s window @ 60fps
    const bonus = 100 * S.comboCount
    S.score += bonus
    sfx('sfx-stomp')
    spawnScorePopup(g.x, g.y - 40, '+' + bonus, 'coin')
    spawnParticles(g.x, g.y - 20, 'lightning', 6)
    if (S.comboCount >= 3) showMilestone('CHAIN x' + S.comboCount + '! ⚡', '#fbbf24')
    return
  }
  if (S.starMode > 0) {
    g._g21Alive = false
    S.score += 200
    sfx('sfx-stomp')
    spawnScorePopup(g.x, g.y - 40, '+200', 'heal')
    spawnParticles(g.x, g.y - 20, 'lightning', 8)
    return
  }
  // Side hit — damage
  S.invincible = 90
  S.hitFrames = 60
  knockback()
  sfx('sfx-damage')
  screenShake()
  S.goombaHitsThisLevel++
  // Mushroom shield — Pikachu shrinks back to small instead of losing life
  if (S.pikachuState === 'big') {
    S.pikachuState = 'small'
    showMilestone('SHRINK!', '#f59e0b')
    const wrap = document.getElementById('pikachu-wrap')
    if (wrap) {
      wrap.style.transition = 'transform 0.4s ease, width 0.4s ease, height 0.4s ease'
      wrap.style.width = '84px'
      wrap.style.height = '84px'
      setTimeout(() => { if (wrap) wrap.style.transition = '' }, 450)
    }
    return
  }
  if (S.difficulty === 'easy') {
    S.lives -= 0.5
    updateHUD()
    if (S.lives <= 0) { onDeath('goomba'); return }
    triggerMathQuiz()
  } else {
    S.lives -= 1
    updateHUD()
    if (S.lives <= 0) onDeath('goomba')
  }
}

function knockback() {
  S.vy = -7
  S.vx = -S.facing * 4
}

// ═══════════════════════════════════════════════════════════════════
//  MATH QUIZ MODAL
// ═══════════════════════════════════════════════════════════════════
function makeMathQuestion(level) {
  // Hotfix #112-H: delegate to shared math-rules.js which enforces
  // difficulty + level constraints (no × in easy, max 5 for medium ×, etc).
  // G21 has 10 levels max.
  const G21_MAX_LEVEL = 10
  if (typeof window.makeGameQuestion === 'function') {
    return window.makeGameQuestion(level, G21_MAX_LEVEL, S.difficulty || 'easy')
  }
  // Fallback: simple +/− if shared module not loaded.
  const max = level <= 2 ? 10 : 15
  const a = 1 + Math.floor(Math.random() * max)
  const b = 1 + Math.floor(Math.random() * max)
  const op = (level >= 5 && Math.random() < 0.4) ? '-' : '+'
  let q, ans
  if (op === '-') {
    const big = Math.max(a, b), small = Math.min(a, b)
    q = `${big} - ${small} = ?`; ans = big - small
  } else { q = `${a} + ${b} = ?`; ans = a + b }
  const wrongs = new Set()
  while (wrongs.size < 3) {
    const off = (Math.floor(Math.random() * 6) - 3) || (Math.random() < 0.5 ? 1 : -1)
    const w = Math.max(0, ans + off)
    if (w !== ans) wrongs.add(w)
  }
  return { q, ans, choices: [...wrongs, ans].sort(() => Math.random() - 0.5) }
}

let _mqState = null
function triggerMathQuiz() {
  S.pendingMath = true
  _mqState = { idx: 0, total: 2, correct: 0, dots: ['', ''] }
  showMathQuestion()
}

function showMathQuestion() {
  const overlay = document.getElementById('math-quiz')
  const qEl = document.getElementById('mq-question')
  const choicesEl = document.getElementById('mq-choices')
  const progressEl = document.getElementById('mq-progress')
  const q = makeMathQuestion(S.level)
  // _mqState.currentAns removed — q.ans passed directly to onMathAnswer closure
  qEl.textContent = q.q
  // Progress dots
  progressEl.innerHTML = ''
  for (let i = 0; i < _mqState.total; i++) {
    const d = document.createElement('span')
    d.className = 'mq-dot' + (i === _mqState.idx ? ' active' : '') + (_mqState.dots[i] === 'done' ? ' done' : '') + (_mqState.dots[i] === 'fail' ? ' fail' : '')
    progressEl.appendChild(d)
  }
  choicesEl.innerHTML = ''
  q.choices.forEach(c => {
    const b = document.createElement('button')
    b.className = 'mq-btn'
    b.textContent = c
    b.onclick = () => onMathAnswer(b, c, q.ans)
    choicesEl.appendChild(b)
  })
  overlay.classList.add('show')
}

function onMathAnswer(btn, picked, correct) {
  if (btn.dataset.locked) return
  btn.dataset.locked = '1'
  Array.from(btn.parentElement.children).forEach(b => b.dataset.locked = '1')
  const isCorrect = Number(picked) === Number(correct)
  btn.classList.add(isCorrect ? 'correct' : 'wrong')
  if (isCorrect) {
    _mqState.correct++
    _mqState.dots[_mqState.idx] = 'done'
  } else {
    _mqState.dots[_mqState.idx] = 'fail'
    // highlight correct
    Array.from(btn.parentElement.children).forEach(b => {
      if (parseInt(b.textContent) === correct) b.classList.add('correct')
    })
  }
  setTimeout(() => {
    _mqState.idx++
    if (_mqState.idx >= _mqState.total) finishMathQuiz()
    else showMathQuestion()
  }, isCorrect ? 700 : 1100)
}

function finishMathQuiz() {
  document.getElementById('math-quiz').classList.remove('show')
  S.pendingMath = false
  const c = _mqState.correct
  if (c === 2) {
    S.lives = Math.min(MAX_LIVES, S.lives + 0.5)
    S.perfectMath++
    showMilestone('SEMPURNA! ⚡', '#fbbf24')
    spawnScorePopup(S.x, S.y - 100, '+0.5 ❤️', 'heal')
  } else if (c === 1) {
    showToast('Bagus! Lanjut!')
  } else {
    S.lives -= 0.5
    showToast('Coba lagi! 💪')
    if (S.lives <= 0) { onDeath('math'); return }
  }
  updateHUD()
  _mqState = null
}

// ═══════════════════════════════════════════════════════════════════
//  HUD + UI
// ═══════════════════════════════════════════════════════════════════
function updateHUD() {
  document.getElementById('coin-count').textContent = S.coins
  const scEl = document.getElementById('score-count')
  if (scEl) scEl.textContent = S.score
  const heartsEl = document.getElementById('lives-hearts')
  const full = Math.floor(S.lives)
  const half = (S.lives - full) >= 0.5
  let html = ''
  for (let i = 0; i < MAX_LIVES; i++) {
    if (i < full) html += '<span class="life-heart">❤️</span>'
    else if (i === full && half) html += '<span class="life-heart half">💔</span>'
    else html += '<span class="life-heart empty">🖤</span>'
  }
  heartsEl.innerHTML = html
  // Update difficulty chip active state
  document.querySelectorAll('.diff-chip').forEach(b => {
    b.classList.toggle('active', b.dataset.diff === S.difficulty)
  })
}

function setDifficulty(diff) {
  if (!['easy','medium','hard'].includes(diff)) return
  S.difficulty = diff
  document.getElementById('level-text').textContent = `LEVEL ${S.level} • ${diff.toUpperCase()}`
  updateHUD()
  showToast(`Tingkat: ${diff === 'easy' ? '😊 Mudah' : diff === 'medium' ? '⚡ Sedang' : '🔥 Sulit'}`)
}
window.setDifficulty = setDifficulty

function checkLifeFromCoins() {
  if (S.coins >= 100) {
    S.coins -= 100
    S.lives = Math.min(MAX_LIVES, S.lives + 1)
    sfx('sfx-1up')
    showMilestone('1-UP! ❤️', '#4ade80')
    spawnParticles(S.x, S.y - 60, 'heal', 10)
  }
}

function spawnScorePopup(x, y, txt, kind) {
  const p = document.createElement('div')
  p.className = 'score-popup' + (kind ? ' ' + kind : '')
  p.textContent = txt
  // Convert world x to screen
  const screenX = x - S.camX + (window.innerWidth - levelData.width*TILE > 0 ? 0 : 0)
  p.style.left = (screenX) + 'px'
  p.style.top = y + 'px'
  document.body.appendChild(p)
  setTimeout(() => p.remove(), 950)
}

// Particle bursts at world position. `kind`:
//   'dust'   = jump landing / footstep (gray puffs)
//   'spark'  = coin pickup (gold sparkles)
//   'squish' = goomba stomp (red bits)
function spawnParticles(x, y, kind, count) {
  count = count || 5
  const screenX = x - S.camX
  const emojis = kind === 'dust' ? ['💨','💨','·']
                : kind === 'spark' ? ['✨','⭐','✨']
                : kind === 'squish' ? ['💥','✨','💢']
                : kind === 'heal' ? ['💚','✨','💖']
                : kind === 'lightning' ? ['⚡','✨','⚡','⚡']
                : ['✨']
  for (let i = 0; i < count; i++) {
    const p = document.createElement('span')
    p.className = 'fx-particle fx-' + (kind === 'heal' ? 'spark' : kind)
    p.textContent = emojis[i % emojis.length]
    p.style.left = screenX + 'px'
    p.style.top = y + 'px'
    const ang = (Math.random() * Math.PI * 2)
    const dist = 24 + Math.random() * 36
    p.style.setProperty('--dx', Math.cos(ang) * dist + 'px')
    p.style.setProperty('--dy', (Math.sin(ang) * dist - 8) + 'px')
    p.style.fontSize = (12 + Math.random() * 8) + 'px'
    document.body.appendChild(p)
    setTimeout(() => p.remove(), 750)
  }
}

let _shakeT = 0
function screenShake() {
  if (_shakeT) return
  _shakeT = 1
  document.body.classList.add('shake')
  setTimeout(() => { document.body.classList.remove('shake'); _shakeT = 0 }, 360)
}

// ═══════════════════════════════════════════════════════════════════
//  ELECTRIC BOLT PROJECTILE (Hotfix #106 Phase 5)
// ═══════════════════════════════════════════════════════════════════
function spawnBolt(x, y, dir) {
  const PIXI = window.PIXI
  const g = new PIXI.Graphics()
  // Yellow lightning ball with white core + outline
  g.circle(0, 0, 14).fill(0xfde047)
  g.circle(0, 0, 8).fill(0xffffff)
  g.x = x; g.y = y
  g._g21Vx = dir * 12
  g._g21Vy = -2
  g._g21TTL = 70
  world.addChild(g)
  S.bolts.push(g)
  sfx('sfx-jump')
  // Trailing emoji label
  const trail = document.createElement('span')
  trail.textContent = '⚡'
  trail.style.cssText = 'position:fixed;font-size:22px;z-index:118;pointer-events:none;animation:fxSparkPop 0.7s ease-out forwards'
  trail.style.left = (x - S.camX) + 'px'
  trail.style.top = y + 'px'
  trail.style.setProperty('--dx', (dir * 30) + 'px')
  trail.style.setProperty('--dy', '-10px')
  document.body.appendChild(trail)
  setTimeout(() => trail.remove(), 750)
}

function updateBolts() {
  for (let i = S.bolts.length - 1; i >= 0; i--) {
    const b = S.bolts[i]
    b.x += b._g21Vx
    b.y += b._g21Vy
    b._g21Vy += 0.4
    b._g21TTL--
    b.rotation += 0.4
    // Hit goomba?
    let hit = false
    for (const g of S.goombas) {
      if (!g._g21Alive) continue
      if (Math.abs(b.x - g.x) < 30 && Math.abs(b.y - g.y + 30) < 40) {
        g._g21Alive = false
        S.score += 200
        sfx('sfx-stomp')
        spawnScorePopup(g.x, g.y - 40, '+200', 'heal')
        spawnParticles(g.x, g.y - 20, 'lightning', 8)
        hit = true; break
      }
    }
    if (hit || b._g21TTL <= 0) {
      world.removeChild(b)
      S.bolts.splice(i, 1)
    }
  }
}

// Allow X / J keys (PC) and dedicated mobile button later to fire bolt.
function tryFireBolt() {
  if (S.electricMode <= 0) return
  if (!S.onGround) return
  // Cooldown — 20-frame gate
  if (S._lastBolt && (performance.now() - S._lastBolt) < 350) return
  S._lastBolt = performance.now()
  spawnBolt(S.x + S.facing * 30, S.y - 50, S.facing)
}

// ═══════════════════════════════════════════════════════════════════
//  WIN / LOSE
// ═══════════════════════════════════════════════════════════════════
function onWin() {
  if (S.won) return
  S.won = true; S.running = false
  sfx('sfx-flag')
  setPikachuAnim('happy')
  spawnParticles(S.x, S.y - 50, 'lightning', 18)
  spawnParticles(S.x, S.y - 50, 'spark', 14)
  showMilestone('LEVEL CLEAR! 🏆', '#10b981')
  const elapsed = (performance.now() - S.startTime) / 1000
  const totalCoinsInLevel = (levelData.coins || []).length
  const stars = computeStars(totalCoinsInLevel, elapsed)
  saveProgress(stars)
  setTimeout(() => showWinModal(stars), 1500)
}

function computeStars(totalCoins, elapsed) {
  const coinPct = totalCoins > 0 ? Math.min(1, S.coins / totalCoins) : 1
  let stars = 1
  if (coinPct >= 0.95 && S.goombaHitsThisLevel === 0) stars = 5
  else if (coinPct >= 0.8 && S.goombaHitsThisLevel <= 1) stars = 4
  else if (coinPct >= 0.6) stars = 3
  else if (coinPct >= 0.3) stars = 2
  // Bonus from perfect math
  if (S.perfectMath >= 2 && stars < 5) stars = Math.min(5, stars + 1)
  return stars
}

function showWinModal(stars) {
  if (typeof GameModal !== 'undefined' && GameModal.show) {
    const lv = S.level
    const nextLv = lv < LEVELS.length ? () => {
      try { sessionStorage.setItem('g21Config', JSON.stringify({ level: lv + 1, difficulty: S.difficulty })) } catch(_){}
      cleanup(); setTimeout(() => location.reload(), 50)
    } : null
    GameModal.show({
      emoji: stars >= 5 ? '🏆' : stars >= 4 ? '🌟' : stars >= 3 ? '⭐' : '💪',
      title: stars >= 5 ? 'Sempurna!' : stars >= 4 ? 'Hebat!' : stars >= 3 ? 'Bagus!' : 'Selesai',
      stars,
      msg: stars >= 4 ? 'Kamu master Mario Pokemon!' : 'Coba kumpulkan lebih banyak koin & hindari musuh.',
      onNext: nextLv,
      onAgain: () => restartLevel(),
      onBack: () => goBack(),
    })
  } else {
    showToast(`Selesai! ${stars}⭐`, 4000)
    setTimeout(goBack, 4500)
  }
}

function onDeath(reason) {
  if (S.gameOver) return
  S.gameOver = true; S.running = false
  sfx('sfx-damage')
  showMilestone('GAME OVER 💔', '#ef4444')
  const wrap = document.getElementById('pikachu-wrap')
  if (wrap) {
    const rect = wrap.getBoundingClientRect()
    const fallY = window.innerHeight + 200
    wrap.style.transition = 'transform 1.2s cubic-bezier(0.5,0,0.5,1)'
    wrap.style.transform = `translate3d(${rect.left}px, ${fallY}px, 0) rotate(720deg)`
  }
  setTimeout(() => {
    if (wrap) wrap.style.transition = ''
    if (typeof GameModal !== 'undefined' && GameModal.show) {
      GameModal.show({
        emoji: '💔',
        title: reason === 'pit' ? 'Jatuh ke jurang!' : 'Game Over',
        stars: 0,
        msg: 'Coba lagi, kamu pasti bisa! ⚡',
        onAgain: () => restartLevel(),
        onBack: () => goBack(),
      })
    } else {
      setTimeout(restartLevel, 1500)
    }
  }, 1300)
}

// ═══════════════════════════════════════════════════════════════════
//  PROGRESS SAVE — Hotfix #115: prefer shared save-engine (avatar-keyed).
// ═══════════════════════════════════════════════════════════════════
function saveProgress(stars) {
  if (typeof window.saveLevelProgress === 'function') {
    window.saveLevelProgress('g21', S.level, stars)
    return
  }
  try {
    const aSlot = JSON.parse(localStorage.getItem('dunia-active-slot') || '[0,1]')
    const slotIdx = Array.isArray(aSlot) ? parseInt(aSlot[0]) : 0
    const slots = JSON.parse(localStorage.getItem('dunia-players') || '[]')
    const animal = slots && slots[slotIdx] && slots[slotIdx].animal
    const _SLUGS = {lion:'lion',rabbit:'rabbit',elephant:'elephant',fox:'fox',frog:'frog',tiger:'tiger',panda:'panda',koala:'koala'}
    const av = animal ? (_SLUGS[animal] || String(animal)) : String(slotIdx)
    const key = `dunia-avatar-${av}-progress`
    const prog = JSON.parse(localStorage.getItem(key) || '{}')
    if (!prog.g21) prog.g21 = { completed: [], stars: {} }
    if (!prog.g21.completed.includes(S.level)) prog.g21.completed.push(S.level)
    if ((prog.g21.stars[S.level] || 0) < stars) prog.g21.stars[S.level] = stars
    localStorage.setItem(key, JSON.stringify(prog))
  } catch (_) {}
  // Propagate to main app via sessionStorage (pageshow handler picks this up)
  try { sessionStorage.setItem('g21Result', JSON.stringify({ stars, level: S.level })) } catch (_) {}
}

// ═══════════════════════════════════════════════════════════════════
//  CONTROLS — pause / restart / back
// ═══════════════════════════════════════════════════════════════════
function togglePause() {
  if (S.gameOver || S.won || S.pendingMath) return
  S.paused = !S.paused
  document.getElementById('pause-overlay').classList.toggle('show', S.paused)
  document.getElementById('btn-pause').textContent = S.paused ? '▶' : '⏸'
}

function restartLevel() {
  document.getElementById('pause-overlay').classList.remove('show')
  S.lives = MAX_LIVES; S.coins = 0; S.score = 0
  S.pikachuState = 'small'
  // Reset Pikachu wrap (clear death-fall transform + size)
  const wrap = document.getElementById('pikachu-wrap')
  if (wrap) {
    wrap.style.transition = ''
    wrap.style.transform = ''
    wrap.style.top = '0'
    wrap.style.width = '84px'
    wrap.style.height = '84px'
  }
  S.comboCount = 0; S.comboTimer = 0
  S.pendingMath = false; S.electricMode = 0; S.starMode = 0
  document.getElementById('math-quiz').classList.remove('show')
  const boltEl = document.getElementById('btn-bolt')
  if (boltEl) boltEl.style.display = 'none'
  const aura = document.getElementById('pikachu-aura')
  if (aura) aura.style.opacity = '0'
  loadLevel(S.level)
  S.running = true
  S.startTime = performance.now()
  S.paused = false; S.gameOver = false; S.won = false
  document.getElementById('btn-pause').textContent = '⏸'
}
window.restartLevel = restartLevel

function cleanup() {
  if (cleanedUp) return
  cleanedUp = true
  try { if (app && app.ticker) app.ticker.stop() } catch (_) {}
  try { document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0 }) } catch(_) {}
  stopBGM()
}

function goBack() {
  cleanup()
  setTimeout(() => history.back(), 30)
}
window.goBack = goBack
window.togglePause = togglePause

// ═══════════════════════════════════════════════════════════════════
//  RESIZE — Hotfix #106: debounce 200ms + skip parallax rebuild
//  (was rebuilding entire bg layer per resize event = main thread stall
//  + memory pressure during orientation change → freeze).
// ═══════════════════════════════════════════════════════════════════
let _resizeT = 0
function onResize() {
  if (!app) return
  clearTimeout(_resizeT)
  _resizeT = setTimeout(() => {
    try {
      app.renderer.resize(window.innerWidth, _gameH())
    } catch (e) { console.warn('[g21] resize:', e) }
  }, 200)
}

// ═══════════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════════
initPixi().catch(e => {
  console.error('[g21] init failed:', e)
  document.getElementById('loading').innerHTML = '<div style="color:#fbbf24">Gagal memuat game.<br><small>'+e.message+'</small><br><button onclick="history.back()" style="margin-top:14px;padding:10px 18px;border-radius:10px;border:none;background:#7C3AED;color:#fff;font-weight:900;cursor:pointer">Kembali</button></div>'
})
</script>
