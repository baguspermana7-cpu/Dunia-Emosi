<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Pokemon Run 🏃</title>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100svh;overflow:hidden;font-family:'Fredoka One',Arial,sans-serif;touch-action:none;-webkit-user-select:none;user-select:none;background:#111}

/* ── Parallax BG layers ── */
.bg-layer{position:fixed;inset:0;background-size:cover;background-position:center bottom;background-repeat:no-repeat;z-index:0;will-change:background-position-x}
#bg-sky  {z-index:0}
#bg-far  {z-index:1;opacity:.85}
#bg-mid  {z-index:2;opacity:.9}
#bg-near {z-index:3;opacity:.95}
#bg-gym  {z-index:4;background-size:cover;background-position:center bottom;opacity:.7}

#pixi-canvas{position:fixed;inset:0;width:100vw;height:100svh;display:block;z-index:5}
#player-img{position:fixed;z-index:40;pointer-events:none;image-rendering:auto;display:none;transition:filter .3s ease;transform:scaleX(-1);will-change:left,top;transform-origin:50% 100%;object-fit:contain}
#player-img.sliding{transform:scaleX(-1) scaleY(0.47);transition:transform .08s ease-out,filter .3s ease}
@keyframes jumpSquash{0%{transform:scaleX(-1) scaleY(1)}25%{transform:scaleX(-1) scaleY(0.75)}65%{transform:scaleX(-1) scaleY(1.1)}100%{transform:scaleX(-1) scaleY(1)}}
@keyframes landBounce{0%{transform:scaleX(-1) scaleY(0.68)}40%{transform:scaleX(-1) scaleY(1.12)}70%{transform:scaleX(-1) scaleY(0.94)}100%{transform:scaleX(-1) scaleY(1)}}
#player-img.jump-anim{animation:jumpSquash 0.16s ease-out}
#player-img.land-anim{animation:landBounce 0.2s ease-out}
#slide-btn{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));left:max(20px,env(safe-area-inset-left));z-index:100;width:clamp(72px,16vmin,104px);height:clamp(60px,13vmin,88px);border-radius:18px;background:linear-gradient(160deg,#34d399,#10b981);border:2.5px solid #6ee7b7;color:#fff;font-size:clamp(26px,6.5vmin,36px);font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent;display:none;align-items:center;justify-content:center;box-shadow:0 4px 0 rgba(0,80,50,0.3),0 6px 16px rgba(0,0,0,.35);transition:transform .08s,filter .1s;text-shadow:0 1px 3px rgba(0,0,0,0.4);touch-action:manipulation}
#slide-btn:active{transform:scale(0.91) translateY(3px);filter:brightness(1.1);box-shadow:0 1px 6px rgba(0,0,0,0.2)}
@media(pointer:coarse){#slide-btn{display:flex}}

/* ── HUD Top ── */
#hud-top{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;gap:clamp(4px,1.5vw,10px);padding:max(14px,env(safe-area-inset-top)) clamp(12px,3vw,18px) 8px;background:linear-gradient(180deg,rgba(0,0,0,0.82) 0%,transparent 100%);pointer-events:none}
#btn-back{background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.22);border-radius:12px;color:#fff;padding:7px 12px;font-size:15px;cursor:pointer;font-family:inherit;pointer-events:all;flex-shrink:0}
#game-badge{background:rgba(0,0,0,0.5);border:1.5px solid rgba(239,68,68,0.5);border-radius:10px;padding:5px 10px;color:#fca5a5;font-size:clamp(10px,3vw,13px);font-weight:700;flex-shrink:0;white-space:nowrap}
#hud-center{flex:1;text-align:center;min-width:0}
#level-text{font-size:12px;color:#fca5a5;font-weight:700}
#status-text{font-size:clamp(13px,4vw,18px);font-weight:900;color:#fff}
#hud-lives{font-size:clamp(14px,4vw,20px);flex-shrink:0}
#score-display{font-size:clamp(11px,3vw,14px);color:#86efac;font-weight:700;flex-shrink:0}
#btn-pause{background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.22);border-radius:12px;color:#fff;padding:6px 10px;font-size:15px;cursor:pointer;font-family:inherit;pointer-events:all;flex-shrink:0}

/* ── Power-up HUD ── */
#pu-hud{position:fixed;bottom:clamp(10px,3vh,18px);right:clamp(12px,3vw,20px);z-index:60;display:none;align-items:center;gap:8px;background:rgba(0,0,0,0.80);border-radius:16px;padding:8px 12px;border:2px solid rgba(255,255,255,0.2)}
#pu-icon{font-size:28px;line-height:1}
#pu-bar-bg{width:80px;height:8px;background:rgba(255,255,255,0.15);border-radius:4px;overflow:hidden}
#pu-bar{height:100%;width:100%;border-radius:4px;transition:width .1s linear}

/* ── Team Rocket Balloon ── */
#tr-balloon{position:fixed;pointer-events:none;z-index:45;display:none;width:clamp(90px,18vw,160px);image-rendering:auto;transition:filter .2s}
@keyframes balloonBob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-14px) rotate(2deg)}}
#tr-balloon.bobbing{animation:balloonBob 1.8s ease-in-out infinite}
@keyframes balloonExit{to{transform:translate(150%,-180%) scale(0.06);opacity:0;filter:brightness(5) saturate(0)}}
#tr-balloon.exiting{animation:balloonExit 1.6s cubic-bezier(.4,0,.6,1) forwards}

/* ── TR Warning banner ── */
#tr-warning{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-120px);z-index:80;background:linear-gradient(135deg,rgba(220,38,38,.95),rgba(185,28,28,.98));border:2.5px solid #fca5a5;border-radius:18px;padding:10px 20px;color:#fff;font-size:clamp(13px,3.5vw,18px);font-weight:900;white-space:nowrap;transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;box-shadow:0 8px 24px rgba(220,38,38,.5)}
#tr-warning.show{transform:translateX(-50%) translateY(0)}

/* ── TR Battle Overlay ── */
#tr-battle{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;background:#0a0212;transform:translateY(110%);transition:transform .5s cubic-bezier(.4,0,.2,1)}
#tr-battle.open{display:flex;transform:translateY(0)}
#tr-battle-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.55) saturate(.8)}
#tr-battle-content{position:relative;z-index:10;display:flex;flex-direction:column;height:100%;padding:max(14px,env(safe-area-inset-top)) 16px 16px}
/* HP bars */
.tr-hp-card{background:rgba(0,0,0,0.88);border:1.5px solid rgba(255,255,255,0.18);border-radius:14px;padding:8px 12px;min-width:140px}
.tr-hp-name{font-size:clamp(11px,3vw,14px);font-weight:900;color:#e9d5ff;margin-bottom:4px}
.tr-hp-hearts{font-size:22px;letter-spacing:2px;line-height:1}
/* Pokemon sprites */
#tr-poke-enemy{position:absolute;top:clamp(60px,12vh,100px);right:clamp(24px,8vw,60px);width:clamp(100px,22vw,160px);height:auto;object-fit:contain;filter:drop-shadow(0 8px 20px rgba(0,0,0,0.6));transition:opacity .3s,transform .3s;image-rendering:auto;z-index:12}
#tr-poke-player{position:absolute;bottom:clamp(160px,28vh,220px);left:clamp(24px,8vw,60px);width:clamp(110px,24vw,170px);height:auto;object-fit:contain;filter:drop-shadow(0 8px 20px rgba(0,0,0,0.6));z-index:12;transform:scaleX(-1)}
/* HP bars row */
#tr-hp-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;z-index:15}
/* Battle log */
#tr-log{position:absolute;bottom:clamp(120px,22vh,180px);left:0;right:0;text-align:center;z-index:15;font-size:clamp(14px,4vw,20px);font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.8);padding:0 16px;animation:logFade 2s ease}
@keyframes logFade{0%{opacity:0;transform:scale(.9)}15%{opacity:1;transform:scale(1)}80%{opacity:1}100%{opacity:0}}
@keyframes typeHitPop{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx,0px),var(--dy,-40px)) scale(0.5)}}
/* Attack question */
#tr-quiz-wrap{position:absolute;bottom:0;left:0;right:0;z-index:20;padding:12px 16px max(16px,env(safe-area-inset-bottom));background:linear-gradient(0deg,rgba(10,2,25,0.97),rgba(30,12,60,.95));border-top:2.5px solid #7c3aed}
#tr-atk-prompt{color:#c4b5fd;font-size:10px;font-weight:700;letter-spacing:3px;margin-bottom:4px;animation:dangerPulse .8s ease-in-out infinite}
#tr-question{color:#fff;font-size:clamp(20px,6vw,32px);font-weight:900;text-align:center;margin-bottom:10px;text-shadow:0 0 20px rgba(196,181,253,.6)}
#tr-choices{display:flex;gap:clamp(5px,2vw,10px);justify-content:center;width:100%;flex-wrap:wrap}
.tr-btn{flex:1;min-width:clamp(50px,14vw,76px);max-width:clamp(64px,22vw,116px);padding:clamp(9px,3vh,16px) 4px;border:2.5px solid rgba(255,255,255,.35);border-radius:14px;background:linear-gradient(160deg,#7C3AED,#6D28D9);color:#fff;font-size:clamp(15px,5vw,24px);font-weight:900;cursor:pointer;font-family:inherit;transition:transform .1s;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 0 #4C1D95}
.tr-btn:nth-child(2){background:linear-gradient(160deg,#E85A32,#C84020);box-shadow:0 4px 0 #9A2A10}
.tr-btn:nth-child(3){background:linear-gradient(160deg,#2DBF7E,#1A9E66);box-shadow:0 4px 0 #0A7A48}
.tr-btn:nth-child(4){background:linear-gradient(160deg,#F59E0B,#D97706);box-shadow:0 4px 0 #92400E}
.tr-btn:active{transform:scale(.91) translateY(3px)}
.tr-btn.correct{border-color:#4ade80;background:rgba(74,222,128,.3)!important;animation:correctFlash .4s ease}
.tr-btn.wrong  {border-color:#ef4444;background:rgba(239,68,68,.3)!important;animation:wrongShake .35s ease}
/* TR trainer portrait */
#tr-trainer-tag{display:none}
/* Trainer sprite in battle */
#tr-trainer-sprite{position:absolute;top:clamp(50px,10vh,78px);right:clamp(18px,6vw,52px);width:clamp(42px,10vw,68px);height:auto;object-fit:contain;z-index:13;filter:drop-shadow(0 2px 8px rgba(0,0,0,.8));transform:scaleX(-1);pointer-events:none}
/* Type projectile (ported from g13c) */
.type-proj{position:fixed;font-size:32px;pointer-events:none;z-index:400;filter:drop-shadow(0 0 10px rgba(255,255,255,.8));transition:left .35s cubic-bezier(.35,0,.65,1.1),top .35s cubic-bezier(.35,0,.65,1.1),opacity .25s,transform .35s}
.type-proj-trail{position:fixed;font-size:18px;pointer-events:none;z-index:399;opacity:.6}
/* Move selector panel */
#tr-move-wrap{position:absolute;bottom:0;left:0;right:0;z-index:20;padding:12px 16px max(16px,env(safe-area-inset-bottom));background:linear-gradient(0deg,rgba(10,2,25,.97),rgba(30,12,60,.95));border-top:2.5px solid #7c3aed;display:none;flex-direction:column;align-items:center;gap:8px}
#tr-move-wrap.show{display:flex}
#tr-move-title{color:#c4b5fd;font-size:10px;font-weight:700;letter-spacing:3px}
#tr-move-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:340px}
.tr-move-btn{padding:10px 6px;border:2px solid rgba(255,255,255,.32);border-radius:14px;background:linear-gradient(160deg,#7C3AED,#6D28D9);color:#fff;font-size:clamp(11px,3.5vw,14px);font-weight:900;cursor:pointer;font-family:inherit;transition:transform .1s;text-align:center;-webkit-tap-highlight-color:transparent;box-shadow:0 3px 0 #4C1D95}
.tr-move-btn:active{transform:scale(.92) translateY(2px)}
/* Attack name flash */
#tr-atk-name{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:25;font-size:clamp(20px,6vw,34px);font-weight:900;color:#fff;text-shadow:0 0 20px rgba(196,181,253,.9),0 2px 4px rgba(0,0,0,.9);pointer-events:none;transition:transform .2s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;white-space:nowrap}
#tr-atk-name.show{transform:translate(-50%,-50%) scale(1);opacity:1}

/* ── Quiz Panel (runner) ── */
#quiz-panel{position:fixed;bottom:0;left:0;right:0;z-index:120;display:none;flex-direction:column;align-items:center;padding:clamp(10px,3vh,16px) clamp(12px,4vw,20px) clamp(16px,5vh,26px);background:linear-gradient(0deg,rgba(10,2,25,0.98),rgba(26,5,53,0.96));border-top:3px solid #ef4444;backdrop-filter:blur(14px)}
#quiz-panel.show{display:flex}
#quiz-title{color:#ef4444;font-size:10px;font-weight:700;letter-spacing:3px;margin-bottom:4px;animation:dangerPulse .8s ease-in-out infinite}
@keyframes dangerPulse{50%{opacity:.4}}
#quiz-question{color:#fff;font-size:clamp(22px,6.5vw,34px);font-weight:900;text-align:center;margin-bottom:clamp(10px,3vh,16px);text-shadow:0 0 20px rgba(251,191,36,.6)}
#quiz-choices{display:flex;gap:clamp(6px,2vw,12px);justify-content:center;width:100%;flex-wrap:wrap}
.choice-btn{flex:1;min-width:clamp(52px,15vw,80px);max-width:clamp(68px,24vw,120px);padding:clamp(10px,3.5vh,18px) 4px;border:2.5px solid rgba(255,255,255,.35);border-radius:16px;background:linear-gradient(160deg,#7C3AED,#6D28D9);color:#fff;font-size:clamp(16px,5.5vw,26px);font-weight:900;cursor:pointer;font-family:inherit;transition:all .12s;-webkit-tap-highlight-color:transparent;box-shadow:0 5px 0 #4C1D95}
.choice-btn:nth-child(2){background:linear-gradient(160deg,#E85A32,#C84020);border-color:#F07050;box-shadow:0 5px 0 #9A2A10}
.choice-btn:nth-child(3){background:linear-gradient(160deg,#2DBF7E,#1A9E66);border-color:#50E0A0;box-shadow:0 5px 0 #0A7A48}
.choice-btn:nth-child(4){background:linear-gradient(160deg,#F59E0B,#D97706);border-color:#FCD34D;box-shadow:0 5px 0 #92400E}
.choice-btn:active{transform:scale(.91) translateY(4px)}
.choice-btn.correct{border-color:#4ade80;background:rgba(74,222,128,.3);animation:correctFlash .4s ease}
.choice-btn.wrong{border-color:#ef4444;background:rgba(239,68,68,.3);animation:wrongShake .35s ease}
@keyframes correctFlash{50%{transform:scale(1.12)}}
@keyframes wrongShake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* ── Flash ── */
#flash{position:fixed;inset:0;z-index:99;pointer-events:none;opacity:0;transition:opacity .08s}
@keyframes screenShake{0%,100%{transform:translate(0,0)}15%{transform:translate(-8px,4px)}30%{transform:translate(8px,-5px)}45%{transform:translate(-6px,6px)}60%{transform:translate(6px,-3px)}75%{transform:translate(-4px,2px)}90%{transform:translate(3px,-1px)}}
.hit-shake{animation:screenShake 0.42s ease-out}

/* ── Start Overlay ── */
#start-overlay{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(10,2,25,0.92);backdrop-filter:blur(8px)}
#start-overlay.hidden{display:none}
#start-hint{font-size:16px;color:#86efac;animation:hintPulse 1.5s ease-in-out infinite}
@keyframes hintPulse{50%{opacity:.5;transform:scale(.96)}}

/* ── Pause Overlay ── */
#pause-overlay{position:fixed;inset:0;z-index:350;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(10,2,25,0.92);backdrop-filter:blur(8px)}
/* ── Bag Overlay ── */
#bag-overlay{position:fixed;inset:0;z-index:400;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(10,2,25,0.95);backdrop-filter:blur(10px)}
/* ── Jump button (touch) ── */
#jump-btn{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));right:max(20px,env(safe-area-inset-right));z-index:100;width:clamp(72px,16vmin,104px);height:clamp(60px,13vmin,88px);border-radius:18px;background:linear-gradient(160deg,#f87171,#ef4444);border:2.5px solid #fca5a5;color:#fff;font-size:clamp(26px,6.5vmin,36px);font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent;display:none;align-items:center;justify-content:center;box-shadow:0 4px 0 rgba(127,0,0,0.3),0 6px 16px rgba(0,0,0,.35);transition:transform .08s,filter .1s,background .2s;text-shadow:0 1px 3px rgba(0,0,0,0.4);touch-action:manipulation}
#jump-btn:active{transform:scale(0.91) translateY(3px);filter:brightness(1.1);box-shadow:0 1px 6px rgba(0,0,0,0.2)}
#jump-btn.in-air{background:linear-gradient(160deg,#fbbf24,#f59e0b);border-color:#fef3c7}
#jump-x2{position:absolute;top:4px;right:6px;font-size:11px;font-weight:900;color:#fef3c7;background:rgba(0,0,0,0.45);border-radius:8px;padding:1px 5px;display:none;text-shadow:none}
#jump-btn.in-air #jump-x2{display:block}
@media (pointer:coarse){#jump-btn{display:flex}}
</style>
</head>
<body>

<!-- Parallax BG layers (behind Pixi) -->
<div class="bg-layer" id="bg-sky"></div>
<div class="bg-layer" id="bg-far"></div>
<div class="bg-layer" id="bg-mid"></div>
<div class="bg-layer" id="bg-near"></div>
<div class="bg-layer" id="bg-gym"></div>

<canvas id="pixi-canvas"></canvas>
<img id="player-img" src="" alt="Pokemon">

<!-- TR Balloon -->
<img id="tr-balloon" src="../assets/Pokemon/g23/tr-balloon.gif" alt="Team Rocket">
<div id="tr-warning">⚠️ Team Rocket Muncul!</div>

<!-- HUD -->
<div id="hud-top">
  <button id="btn-back" onclick="goBack()">◀</button>
  <div id="game-badge">🏃 Pokemon Run</div>
  <div id="hud-center">
    <div id="level-text"></div>
    <div id="status-text">Bersiap...</div>
  </div>
  <button id="btn-pause" onclick="togglePause()">⏸</button>
  <div id="hud-lives">❤️❤️❤️</div>
  <div id="score-display">0m</div>
  <div id="quiz-progress" style="font-size:clamp(10px,2.5vw,12px);color:#fbbf24;font-weight:700;flex-shrink:0;white-space:nowrap">✅ 0/<span id="quiz-total"></span></div>
</div>

<!-- Power-up HUD -->
<div id="pu-hud">
  <span id="pu-icon">⚡</span>
  <div id="pu-bar-bg"><div id="pu-bar"></div></div>
</div>

<!-- Runner Quiz Panel -->
<div id="quiz-panel">
  <div id="quiz-title">⚠️ RINTANGAN ⚠️</div>
  <div id="quiz-question"></div>
  <div id="quiz-choices"></div>
</div>

<!-- TR Battle Overlay -->
<div id="tr-battle">
  <div id="tr-battle-bg"></div>
  <div id="tr-battle-content">
    <div id="tr-hp-row">
      <div class="tr-hp-card">
        <div class="tr-hp-name" id="tr-enemy-name">Arbok</div>
        <div class="tr-hp-hearts" id="tr-enemy-hp">❤️❤️❤️</div>
      </div>
      <div class="tr-hp-card" style="text-align:right">
        <div class="tr-hp-name" id="tr-player-name">Pikachu</div>
        <div class="tr-hp-hearts" id="tr-player-hp">❤️❤️❤️</div>
      </div>
    </div>
    <div id="tr-trainer-tag">Jessie · Team Rocket</div>
    <img id="tr-trainer-sprite" src="" alt="">
    <img id="tr-poke-enemy" src="" alt="">
    <img id="tr-poke-player" src="" alt="">
    <div id="tr-atk-name"></div>
    <div id="tr-log"></div>
    <!-- Move selector (shown first) -->
    <div id="tr-move-wrap">
      <div id="tr-move-title">⚔️ PILIH SERANGAN ⚔️</div>
      <div id="tr-move-grid"></div>
    </div>
    <!-- Quiz (shown after move selected) -->
    <div id="tr-quiz-wrap">
      <div id="tr-atk-prompt">⚔️ SERANG ⚔️</div>
      <div id="tr-question"></div>
      <div id="tr-choices"></div>
    </div>
  </div>
</div>

<div id="flash"></div>
<audio id="game-bgm" preload="auto" loop style="display:none"></audio>

<div id="start-overlay">
  <div id="start-icon" style="font-size:64px">🏃</div>
  <div style="font-size:clamp(24px,7vw,36px);font-weight:900;color:#fca5a5">Pokemon Run</div>
  <div id="start-level" style="font-size:18px;color:#f87171"></div>
  <div id="start-hint">Tap untuk Berlari!</div>
</div>

<div id="pause-overlay">
  <div style="font-size:36px">⏸</div>
  <div style="font-size:24px;font-weight:900;color:#fbbf24">PAUSE</div>
  <label style="color:#e9d5ff;font-size:13px;display:flex;align-items:center;gap:8px;width:clamp(180px,60vw,260px)">🎵 BGM<input type="range" id="vol-bgm" min="0" max="100" value="50" style="flex:1;accent-color:#22c55e" oninput="updateVolBGM()"></label>

function spawnProjectile(fromEl, toEl, type, cb){
  const fr=fromEl.getBoundingClientRect(), tr=toEl.getBoundingClientRect()
  const sx=fr.left+fr.width/2, sy=fr.top+fr.height/2
  const ex=tr.left+tr.width/2, ey=tr.top+tr.height/2
  const emoji=(TYPE_PROJ[type]||TYPE_PROJ.normal).emoji
  // Launch SFX
  ensureAudio()
  const sfxFreqs={fire:700,water:450,electric:1100,grass:550,psychic:900,ghost:380,ice:650,dragon:280,dark:250,fighting:400,rock:380,poison:700,ground:320,bug:600,steel:500,normal:480,flying:650,fairy:800}
  const freq=sfxFreqs[type]||500
  playTone(freq,80,'sine',0.1); setTimeout(()=>playTone(freq*1.2,60,'sine',0.08),50)
  const proj=document.createElement('div')
  proj.className='type-proj'; proj.textContent=emoji
  proj.style.left=sx+'px'; proj.style.top=sy+'px'
  proj.style.transform='translate(-50%,-50%) scale(0.5)'
  document.body.appendChild(proj)
  for(let i=0;i<3;i++){
    const trail=document.createElement('div'); trail.className='type-proj-trail'; trail.textContent=emoji
    trail.style.left=(sx+(Math.random()-.5)*20)+'px'; trail.style.top=(sy+(Math.random()-.5)*20)+'px'
    trail.style.transition=`left ${0.3+i*.05}s ease,top ${0.3+i*.05}s ease,opacity 0.3s`
    document.body.appendChild(trail)
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      trail.style.left=(ex+(Math.random()-.5)*30)+'px'; trail.style.top=(ey+(Math.random()-.5)*30)+'px'; trail.style.opacity='0'
    })); setTimeout(()=>trail.remove(),500)
  }
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    proj.style.left=ex+'px'; proj.style.top=ey+'px'; proj.style.transform='translate(-50%,-50%) scale(1.4)'
    setTimeout(()=>{ proj.style.opacity='0'; playTone(freq*0.7,100,'sawtooth',0.09); setTimeout(()=>{ proj.remove(); if(cb) cb() },120) },300)
  }))
}

let _battleBgmEl = null
let _battleFadeInterval = null
function battleBgmPlay(){
  if(_battleFadeInterval){ clearInterval(_battleFadeInterval); _battleFadeInterval = null }
  if(!_battleBgmEl){
    _battleBgmEl = document.createElement('audio')
    _battleBgmEl.src = '../assets/Pokemon/sound/18 Pokémon Gym（１９９７－１９９８｜Ｍ５７Ｂ） - Satoshi Sakai No Masta - SoundLoadMate.com.mp3'
    _battleBgmEl.loop = true
    document.body.appendChild(_battleBgmEl)
  }
  _battleBgmEl.volume = 0.32
  _battleBgmEl.currentTime = 0
  _battleBgmEl.play().catch(()=>{})
}
function battleBgmStop(){
  if(!_battleBgmEl || _battleBgmEl.paused) return
  if(_battleFadeInterval){ clearInterval(_battleFadeInterval); _battleFadeInterval = null }
  let v = _battleBgmEl.volume
  _battleFadeInterval = setInterval(()=>{
    v = Math.max(0, v - 0.04)
    _battleBgmEl.volume = v
    if(v <= 0){ clearInterval(_battleFadeInterval); _battleFadeInterval = null; _battleBgmEl.pause(); _battleBgmEl.volume = 0.32 }
  }, 40)
}
function playTone(freq,dur,type='sine',vol=0.12){
  if(!audioCtx) return
  const o=audioCtx.createOscillator(),g=audioCtx.createGain()
  o.type=type;o.frequency.value=freq
  g.gain.value=vol;g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur/1000)
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur/1000)
}

function drawGround(){
  // Static ground fill (never scrolled)
  const g=new PIXI.Graphics()
  g.rect(0,GROUND_Y,W,H-GROUND_Y).fill(BG.ground)
  g.rect(0,GROUND_Y,W,5).fill(BG.groundTop)
  g.rect(0,GROUND_Y,W,2).fill({color:0xffffff,alpha:0.12})
  groundContainer.addChild(g)
  // All decorations merged into ONE Graphics (scrollable single node instead of 50-230 nodes)
  const deco=new PIXI.Graphics()
  deco.y=GROUND_Y
  for(let x=0;x<W*2.5;x+=14+Math.random()*14){
    if(Math.random()<0.7){
      const h2=5+Math.random()*5
      deco.poly([x,0,x+3,-h2,x+6,0]).fill({color:BG.groundTop,alpha:0.45})
    } else {
      deco.circle(x+3,0,2+Math.random()*2.5).fill({color:0x888888,alpha:0.28})
    }
  }
  groundContainer.addChild(deco)
  groundDeco.push(deco)   // single scrollable node
}

let _playerImgEl = null
function _getPlayerImg(){ return _playerImgEl || (_playerImgEl = document.getElementById('player-img')) }
let _gifRetryT = null   // self-healing GIF retry timer
function _scheduleGifRetry(gifSrc, attempt){
  if(_gifRetryT) clearTimeout(_gifRetryT)
  if(attempt > 3) return   // give up after 3 retries
  const delay = [1000, 3000, 9000][attempt - 1]   // 1s, 3s, 9s exponential backoff
  _gifRetryT = setTimeout(()=>{
    const img=_getPlayerImg(); if(!img) return
    // Only retry if currently on HD fallback (not already showing GIF)
    if(img.src.endsWith('.gif')) return
    const probe = new Image()
    probe.onload = () => { img.src = gifSrc }   // GIF works now; swap back
    probe.onerror = () => _scheduleGifRetry(gifSrc, attempt + 1)
    probe.src = gifSrc + '?_retry=' + Date.now()   // bust browser cache
  }, delay)
}
function setupPlayerImg(){
  const img=_getPlayerImg()
  const p=G23_POKEMON[selectedPokemon]
  const gifSrc = p.evo ? p.evo[S.evoStage||0].gif : p.gif
  const hdSrc  = p.evo ? p.evo[S.evoStage||0].hd  : p.hd
  img.src=gifSrc
  img.onerror=()=>{ img.src=hdSrc; img.onerror=null; _scheduleGifRetry(gifSrc, 1) }
  img.style.width=PLAYER_W+'px'; img.style.height=PLAYER_H+'px'
  img.style.display='block'; img.style.filter='drop-shadow(0 4px 8px rgba(0,0,0,0.4))'
  syncPlayerPos()
}
function syncPlayerPos(){
  const img=_getPlayerImg(); if(!img) return
  // Forward X lunge during jump: up to +55px at apex, eases back on landing
  const airFraction = S.isGrounded ? 0 : Math.max(0, (GROUND_Y - S.playerY) / (PLAYER_H * 1.1))
  const jumpXOffset = Math.min(airFraction, 1) * 55
  img.style.left=(PLAYER_X-PLAYER_W/2+jumpXOffset)+'px'
  img.style.top=(S.playerY-PLAYER_H)+'px'
  img.classList.toggle('sliding',S.isSliding)
}
function applyPokemon(idx){
  selectedPokemon=Math.max(0,Math.min(idx,G23_POKEMON.length-1))
  const p=G23_POKEMON[selectedPokemon]
  S.evoStage=0; _g23EvolveTrigger=false
  cfg.pokemon=selectedPokemon
  try{ sessionStorage.setItem('g23Config',JSON.stringify(cfg)) }catch(_){}
  const gifSrc = p.evo ? p.evo[0].gif : p.gif
  const hdSrc  = p.evo ? p.evo[0].hd  : p.hd
  const img=_getPlayerImg()
  img.src=gifSrc
  img.onerror=()=>{ img.src=hdSrc; img.onerror=null; _scheduleGifRetry(gifSrc, 1) }
  img.style.display='block'
}

const GROUND_OBS = [
  {type:'box',   w:52,  h:52,  lane:'ground'},
  {type:'spike', w:60,  h:42,  lane:'ground'},
  {type:'bush',  w:72,  h:48,  lane:'ground'},

]
const MID_OBS = [
  {type:'mid-bar', w:90, h:50, lane:'mid'},
  {type:'mid-rock',w:65, h:46, lane:'mid'},
]
const HIGH_OBS = [
  {type:'high-bird',w:70, h:36, lane:'high'},

function spawnObstacle(){
  S.obsSpawnedSinceQuiz++
  const isQuiz = S.quizDone<TOTAL_QUIZ && S.obsSpawnedSinceQuiz>=4
  if(isQuiz){ S.obsSpawnedSinceQuiz=0; spawnQuizGate(); return }

  const active = S.obstacles.filter(o=>!o.hit)
  // Only one action-required obstacle at a time (rule: 1 per Y lane)
  const hasAction = active.some(o=>o.lane==='ground'||o.lane==='mid')

  // Lane weights: 58% ground, 28% mid, 14% high
  const r = Math.random()
  let lane = r<0.58 ? 'ground' : r<0.86 ? 'mid' : 'high'

  // Enforce same-Y constraint: can't have same lane twice; two action lanes simultaneously forbidden
  if(lane!=='high' && (hasAction || active.some(o=>o.lane===lane))) lane='high'

  const pool = lane==='ground' ? GROUND_OBS : lane==='mid' ? MID_OBS : HIGH_OBS
  const tpl  = pool[Math.floor(Math.random()*pool.length)]

  const MID_Y  = GROUND_Y - 55
  const HIGH_Y = GROUND_Y - PLAYER_H - 30
  const gfxY   = lane==='ground' ? GROUND_Y : lane==='mid' ? MID_Y : HIGH_Y

  const gfx=drawObstGfx(tpl.type)
  gfx._g23Type = tpl.type   // tag for destroyObs dispatch
  gfx.x=W+120; gfx.y=gfxY
  // Pulsing glow ring (added as child of gfx)
  const glowColor=lane==='mid'?0x38BDF8:lane==='high'?0x94A3B8:0xFF4444
  const glowRing=new PIXI.Graphics()
  glowRing.roundRect(-tpl.w/2-10,-tpl.h-10,tpl.w+20,tpl.h+10,14).stroke({color:glowColor,width:5,alpha:0.45})
  gfx.addChild(glowRing)
  // Electric sparks on mid-bar
  let sparks=null
  if(tpl.type==='mid-bar'){
    sparks=[]
    for(let i=0;i<3;i++){
      const sg=new PIXI.Graphics(); sg.circle(0,0,4).fill(0xE0F2FE)
      sg.x=-36+i*36; sg.y=-25; gfx.addChild(sg)
      sparks.push({gfx:sg,x:-36+i*36,spd:1.4+Math.random()*0.8})
    }
  }
  worldContainer.addChild(gfx)
  S.obstacles.push({x:W+120, w:tpl.w, h:tpl.h, gfx, gfxY, lane, hit:false, phase:0, glowRing, sparks})
}

const PU_TYPES=Object.keys(PU_DEFS)
const PU_DUR={thunder:360,blaze:300,nature:480,venom:360}

function spawnPowerUp(){
  const type=PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)]
  const def=PU_DEFS[type]
  const g=new PIXI.Graphics()
  // Unified GOLD aura makes pickups visually distinct from RED-rimmed obstacles.
  // Body still uses per-type tint for visual variety, but aura is consistent.
  g.circle(0,0,34).fill({color:0xFCD34D,alpha:0.18})  // outer gold halo
  g.circle(0,0,28).fill({color:0xFBBF24,alpha:0.32})  // mid gold glow

  g.circle(0,0,22).stroke({color:0xFEF3C7,width:2.5,alpha:0.95})  // gold rim
  // Sparkle dots around the orb (4 corners)
  for(let s=0; s<4; s++){
    const ang = (Math.PI*2 / 4) * s + Math.PI/4
    const sx = Math.cos(ang) * 30, sy = Math.sin(ang) * 30
    g.circle(sx, sy, 2.5).fill({color:0xFEF3C7, alpha:0.85})
  }
  const t=new PIXI.Text({text:def.emoji,style:{fontSize:22}});t.anchor.set(0.5);g.addChild(t)
  // Upward-pointing chevron above the orb — "collect me" affordance
  const chev=new PIXI.Graphics()
  chev.poly([-6,4, 0,-4, 6,4]).stroke({color:0xFEF3C7,width:2.5,alpha:0.95})
  chev.y = -34

// Power-up particles (auraGfx initialized inside initPixi after Pixi app is ready)
let auraGfx=null
const blazePts=Array.from({length:14},()=>({x:0,y:0,vy:0,alpha:0,r:0,hue:0}))
const natLeaves=Array.from({length:6},()=>({angle:Math.random()*Math.PI*2,speed:0.03+Math.random()*0.02}))
const venBubs=Array.from({length:8},()=>({x:0,y:0,r:0,alpha:0}))
const venDrips=Array.from({length:5},()=>({x:0,y:0,alpha:0}))

function respawnBlaze(p){ p.x=PLAYER_X+(Math.random()-.5)*28;p.y=S.playerY-8;p.vy=-(0.8+Math.random()*1.4);p.alpha=0.85;p.r=4+Math.random()*7;p.hue=Math.random() }

function activatePowerUp(type){
  clearAura()
  const def=PU_DEFS[type]
  S.activepu={type,timer:PU_DUR[type],maxTimer:PU_DUR[type],shotCooldown:0}
  if(type==='thunder') gameSpeed=BASE_SPEED*1.2
  if(type==='nature')  S.shieldHits=2

  if(type==='venom'){  venBubs.forEach(b=>respawnVenBub(b)); venDrips.forEach(d=>respawnVenDrip(d)) }
  const filters={

    nature: 'drop-shadow(0 0 10px #22c55e) drop-shadow(0 0 20px #4ade80) brightness(1.06)',

function clearAura(){
  if(S.activepu?.type==='thunder') gameSpeed=BASE_SPEED
  if(S.activepu?.type==='nature')  S.shieldHits=0
  S.activepu=null; auraGfx.clear()
  document.getElementById('pu-hud').style.display='none'
  document.getElementById('player-img').style.filter='drop-shadow(0 4px 8px rgba(0,0,0,0.4))'
}
function updateAura(){
  auraGfx.clear()
  // ── Ground shadow indicator (always visible, like g19) ──
  const airFrac = S.isGrounded ? 0 : Math.max(0, (GROUND_Y - S.playerY) / (PLAYER_H * 1.3))
  const jumpX = Math.min(airFrac, 1) * 55  // matches syncPlayerPos forward lunge
  const shadowAlpha = 0.28 - airFrac * 0.12
  const shadowRx = (PLAYER_W * 0.42) * (1 - airFrac * 0.3)
  auraGfx.ellipse(PLAYER_X + jumpX, GROUND_Y + 3, shadowRx, 7).fill({color:0x000000, alpha:shadowAlpha + 0.1})
  auraGfx.ellipse(PLAYER_X + jumpX, GROUND_Y + 3, shadowRx, 7).stroke({width:1.5, color:0xffffff, alpha:shadowAlpha * 0.65})

  // ── Hitbox circle indicator (always visible) ──
  const _hbR = PLAYER_W / 2 - HIT_MARGIN   // ~46px — matches AABB half-width
  const _hbCy = S.playerY - (PLAYER_H - HIT_MARGIN) * 0.5 - 3  // center of hitbox vertically
  const _hbAlpha = S.invincible > 0 ? 0.0 : 0.32  // hide during invincibility frames
  if(_hbAlpha > 0){
    auraGfx.circle(PLAYER_X, _hbCy, _hbR).stroke({color:0xffffff, width:1.5, alpha:_hbAlpha})
  }

  const pu=S.activepu; if(!pu) return
  const cx=PLAYER_X, cy=S.playerY-PLAYER_H*.5

  if(pu.type==='thunder'){
    if(S.frame%2===0){
      for(let i=0;i<5;i++){
        const angle=(i/5)*Math.PI*2+S.frame*.15
        const len=20+Math.random()*18
        let px=cx,py=cy; auraGfx.moveTo(px,py)
        for(let s=0;s<4;s++){ px+=Math.cos(angle+(Math.random()-.5)*1.8)*len/4; py+=Math.sin(angle+(Math.random()-.5)*1.8)*len/4; auraGfx.lineTo(px,py) }
        auraGfx.stroke({width:1.5,color:0xFEF08A,alpha:0.75})
      }
    }
    for(let i=0;i<4;i++){
      const sy=cy+(i-2)*15,sw=14+Math.random()*26
      auraGfx.rect(cx-PLAYER_W/2-sw-8,sy-1,sw,2).fill({color:0xffffff,alpha:0.32-i*.06})
    }
    for(let i=0;i<3;i++) auraGfx.circle(cx+(Math.random()-.5)*52,cy+(Math.random()-.5)*42,1.5).fill({color:0xFBBF24,alpha:0.8})
  }

  if(pu.type==='blaze'){
    for(const p of blazePts){
      p.y+=p.vy; p.alpha-=0.022; p.r*=0.97
      if(p.alpha<=0){ respawnBlaze(p); continue }
      auraGfx.circle(p.x,p.y,Math.max(1,p.r)).fill({color:p.hue<.5?0xFF8800:0xFF4400,alpha:p.alpha})
      auraGfx.circle(p.x,p.y,Math.max(.5,p.r*.42)).fill({color:0xFEF08A,alpha:p.alpha*.55})
    }
    const fl=S.frame*.18,flH=18+Math.sin(fl)*6
    auraGfx.poly([cx-18,S.playerY-4,cx,S.playerY-flH-4,cx+18,S.playerY-4]).fill({color:0xFF6600,alpha:0.48})
    pu.shotCooldown--; if(pu.shotCooldown<=0){ spawnPowerUpProj('blaze'); pu.shotCooldown=58 }
  }

  if(pu.type==='nature'){
    const rr=PLAYER_W*.65
    auraGfx.circle(cx,cy,rr).stroke({width:3,color:0x22C55E,alpha:0.65})
    auraGfx.circle(cx,cy,rr*.8).fill({color:0x22C55E,alpha:0.06+Math.sin(S.frame*.1)*.04})
    for(const leaf of natLeaves){
      leaf.angle+=leaf.speed
      const lx=cx+rr*Math.cos(leaf.angle),ly=cy+rr*Math.sin(leaf.angle)
      const rot=leaf.angle+Math.PI/2,cos=Math.cos(rot),sn=Math.sin(rot),le=8,lw=3.5
      auraGfx.poly([lx+cos*le,ly+sn*le,lx+sn*lw,ly-cos*lw,lx-cos*le,ly-sn*le,lx-sn*lw,ly+cos*lw]).fill({color:0x4ADE80,alpha:0.88})
    }
    if(S.shieldHits>0){
      const pulse=0.5+Math.sin(S.frame*.15)*.3
      auraGfx.circle(cx,cy,rr+6).stroke({width:1.5,color:0x86EFAC,alpha:pulse})
    }
  }

  if(pu.type==='venom'){
    for(const b of venBubs){ b.y-=.7; b.alpha-=.013; if(b.alpha<=0||b.y<S.playerY-PLAYER_H*1.5){ respawnVenBub(b); continue } auraGfx.circle(b.x,b.y,b.r).stroke({width:1.5,color:0xA855F7,alpha:b.alpha}); auraGfx.circle(b.x-b.r*.3,b.y-b.r*.35,b.r*.22).fill({color:0xffffff,alpha:b.alpha*.4}) }
    for(const d of venDrips){ d.y+=1.8; d.alpha-=.018; if(d.alpha<=0||d.y>S.playerY){ respawnVenDrip(d); continue } auraGfx.circle(d.x,d.y,2.8).fill({color:0xA855F7,alpha:d.alpha}) }
    auraGfx.circle(cx,cy,PLAYER_W*.55).fill({color:0x7C3AED,alpha:0.12+Math.sin(S.frame*.12)*.06})
    pu.shotCooldown--; if(pu.shotCooldown<=0){ spawnPowerUpProj('venom'); pu.shotCooldown=46 }
  }

  pu.timer--
  const pct=pu.timer/pu.maxTimer
  document.getElementById('pu-bar').style.width=(pct*100)+'%'
  document.getElementById('pu-hud').style.opacity=(pu.timer<=60&&S.frame%12<6)?'0.45':'1'
  if(pu.timer<=0) clearAura()
}

function updateProjectiles(){
  for(const p of S.projectiles){
    if(p.dead) continue
    p.x+=p.vx; p.rot+=.2; p.gfx.x=p.x; p.gfx.rotation=p.rot
    if(S.frame%3===0){ const sp=new PIXI.Graphics(); sp.circle(0,0,3).fill({color:p.type==='blaze'?0xFF8800:0xA855F7,alpha:.55}); sp.x=p.x-8;sp.y=p.y+(Math.random()-.5)*8; fxContainer.addChild(sp); _trailParticles.push({sp,life:12}) }
    if(p.x>W+60){ destroyProj(p) }
    for(const obs of S.obstacles){ if(!obs.hit&&p.x>obs.x-obs.w/2-8&&p.x<obs.x+obs.w/2+8&&!p.dead){ destroyProj(p); destroyObs(obs,true); break } }
  }
  S.projectiles=S.projectiles.filter(p=>!p.dead)
}
function destroyProj(p){ p.dead=true; worldContainer.removeChild(p.gfx); burst(p.x,p.y,p.type==='blaze'?0xFF6600:0xA855F7,6) }

function checkCollisions(){
  // Power-ups — collected regardless of invincible state
  for(const pu of S.powerUpItems){
    if(pu.collected) continue
    if(Math.abs(pu.x-PLAYER_X)<PLAYER_W/2+22&&Math.abs(pu.gfx.y-S.playerY+PLAYER_H*.5)<PLAYER_H/2+22){
      pu.collected=true; worldContainer.removeChild(pu.gfx)
      burst(pu.x,pu.gfx.y,PU_DEFS[pu.type].color,8); activatePowerUp(pu.type)
    }
  }
  S.powerUpItems=S.powerUpItems.filter(p=>!p.collected)
  if(S.invincible>0){ S.invincible--; return }
  const px_l=PLAYER_X-PLAYER_W/2+HIT_MARGIN
  const px_r=PLAYER_X+PLAYER_W/2-HIT_MARGIN
  const effH=S.isSliding ? SLIDE_H : PLAYER_H
  const py_t=S.playerY-effH+HIT_MARGIN
  const py_b=S.playerY-6
  // Obstacles
  for(const obs of S.obstacles){
    if(obs.hit) continue
    if(obs.lane==='high') continue  // overhead — no collision
    const gfxY=obs.gfxY!==undefined ? obs.gfxY : GROUND_Y
    // Obstacle hitbox = visual fill rect (no inset). Was +4 inset which made
    // the visual outline NOT count as solid — player could clip through edges.
    const ox_l=obs.x-obs.w/2, ox_r=obs.x+obs.w/2
    const oy_t=gfxY-obs.h, oy_b=gfxY
    if(!(px_r>ox_l&&px_l<ox_r&&py_b>oy_t&&py_t<oy_b)) continue
    if(obs.isQuiz){ obs.hit=true; S.paused=true; S.pendingQuizGate=obs; showRunnerQuiz(obs) }
    else if(S.activepu?.type==='nature'&&S.shieldHits>0){
      S.shieldHits--; destroyObs(obs,false)
      burst(PLAYER_X,S.playerY-PLAYER_H*.5,0x22C55E,12); flashScreen('#22c55e'); S.invincible=40
      if(!S.shieldHits) clearAura()
    } else { triggerObstacleQuiz(obs) }
    break
  }
}

// Each helper spawns N small PIXI.Graphics shards/leaves/sparks at (x, y) with
// appropriate motion (gravity, scatter, drift). Particles use the extended
// shape {gfx, alpha, vx, vy, ay, rot, vr, life, maxLife} consumed by
// updateObsParticles below.
function _spawnShard(x, y, gfx, vx, vy, ay, vr, life){
  gfx.x = x; gfx.y = y
  worldContainer.addChild(gfx)
  _obsParticles.push({gfx, alpha:1, vx, vy, ay, vr, life, maxLife:life})
}
function _burstWoodSplinters(x, y){
  for(let i=0; i<6; i++){
    const g = new PIXI.Graphics()
    const w = 4 + Math.random()*4, h = 8 + Math.random()*6
    g.rect(-w/2, -h/2, w, h).fill(i%2 ? 0x8B4513 : 0xA0522D)
    const ang = -Math.PI/2 + (Math.random()-0.5) * Math.PI * 0.7
    const sp = 4 + Math.random()*3
    _spawnShard(x, y, g, Math.cos(ang)*sp, Math.sin(ang)*sp, 0.35, (Math.random()-0.5)*0.3, 32)
  }
}
function _burstShards(x, y, color){
  for(let i=0; i<5; i++){
    const g = new PIXI.Graphics()
    g.poly([0,-7, 6,5, -6,5]).fill(color)
    const ang = -Math.PI/2 + (Math.random()-0.5) * Math.PI
    const sp = 5 + Math.random()*2.5
    _spawnShard(x, y, g, Math.cos(ang)*sp, Math.sin(ang)*sp, 0.32, (Math.random()-0.5)*0.4, 28)
  }
}
function _burstLeaves(x, y){
  for(let i=0; i<7; i++){
    const g = new PIXI.Graphics()
    g.ellipse(0, 0, 6, 3).fill(i<3 ? 0x4ADE80 : 0x22C55E)
    const ang = -Math.PI/2 + (Math.random()-0.5) * Math.PI * 1.2
    const sp = 2 + Math.random()*1.5
    _spawnShard(x, y-12, g, Math.cos(ang)*sp, Math.sin(ang)*sp - 1, 0.08, (Math.random()-0.5)*0.2, 50)
  }
}
function _burstRubble(x, y){
  for(let i=0; i<4; i++){
    const g = new PIXI.Graphics()
    const r = 3 + Math.random()*3
    g.circle(0, 0, r).fill(i%2 ? 0x6B7280 : 0x9CA3AF)
    const ang = -Math.PI/2 + (Math.random()-0.5) * Math.PI * 0.8
    const sp = 4 + Math.random()*2.5
    _spawnShard(x, y, g, Math.cos(ang)*sp, Math.sin(ang)*sp, 0.4, (Math.random()-0.5)*0.5, 36)
  }
}
function _burstSparks(x, y){
  for(let i=0; i<8; i++){
    const g = new PIXI.Graphics()
    g.circle(0, 0, 3).fill(i%2 ? 0xBAE6FD : 0x38BDF8)
    const ang = (Math.PI*2 / 8) * i + Math.random()*0.4
    const sp = 5 + Math.random()*2
    _spawnShard(x, y, g, Math.cos(ang)*sp, Math.sin(ang)*sp, 0, (Math.random()-0.5)*0.3, 22)
  }
  flashScreen('#38BDF8')
}
function _burstFeathers(x, y){
  for(let i=0; i<5; i++){
    const g = new PIXI.Graphics()
    g.ellipse(0, 0, 5, 2.5).fill(0xFFFFFF)
    const ang = -Math.PI/2 + (Math.random()-0.5) * Math.PI * 0.9
    const sp = 1.5 + Math.random()
    _spawnShard(x, y, g, Math.cos(ang)*sp, Math.sin(ang)*sp, 0.05, (Math.random()-0.5)*0.15, 60)
  }
}

function destroyObs(obs,withScore){
  if(obs._destroying) return; obs._destroying=true
  obs.hit=true
  if(withScore){ S.score+=5; spawnFT('+5',obs.x,GROUND_Y-obs.h-20,0x4ade80) }
  // Per-type destruction burst (preserves existing fade contract via legacy push below)
  const _type = obs.isQuiz ? 'quiz' : (obs.gfx && obs.gfx._g23Type)
  const fxX = obs.x, fxY = obs.gfxY - obs.h/2
  switch(_type){
    case 'box': case 'tall': case 'double':  _burstWoodSplinters(fxX, fxY); break
    case 'spike':                            _burstShards(fxX, fxY, 0x7C3AED); break
    case 'bush':                             _burstLeaves(fxX, fxY); break
    case 'rock': case 'mid-rock':            _burstRubble(fxX, fxY); break
    case 'mid-bar':                          _burstSparks(fxX, fxY); break
    case 'high-bird':                        _burstFeathers(fxX, fxY); break
    // 'quiz' or unknown → just fade
  }
  _obsParticles.push({gfx:obs.gfx, alpha:1})   // legacy fade-out preserved
}

function spawnTRBalloon(){
  const balloonEl=document.getElementById('tr-balloon')
  const bw=parseFloat(getComputedStyle(balloonEl).width)||130
  S.trBalloonX=W+bw                    // start off-screen right
  S.trBalloonY=H*0.08                  // high in the sky
  S.trState='approach'
  balloonEl.style.display='block'
  balloonEl.classList.remove('exiting')
  balloonEl.classList.add('bobbing')
  balloonEl.style.right='auto'
  syncBalloonPos()
  // Warning banner
  const warn=document.getElementById('tr-warning')
  warn.classList.add('show'); sfxDanger()
  setTimeout(()=>warn.classList.remove('show'),2200)
}

function syncBalloonPos(){
  const el=document.getElementById('tr-balloon')
  el.style.left=S.trBalloonX+'px'
  el.style.top =S.trBalloonY+'px'
}

function updateTRBalloon(){
  if(S.trState==='idle'||S.trState==='battle'||S.trState==='exiting') return
  const el=document.getElementById('tr-balloon')

  if(S.trState==='approach'){
    // Balloon drifts left slowly until it reaches ~35% of screen
    const targetX=W*0.35
    S.trBalloonX+=(targetX-S.trBalloonX)*0.018
    syncBalloonPos()
    // When close enough → engage
    if(Math.abs(S.trBalloonX-targetX)<4) engageTRBattle()
  }
}

function checkTRTrigger(){
  if(S.trState!=='idle') return
  if(S.trEncountersDone>=TR_ENCOUNTERS) return
  if(S.distance>=S.trEncounterTriggerDist) spawnTRBalloon()
}

function engageTRBattle(){
  if(S.trState==='battle') return
  S.trState='battle'
  S.paused=true
  bgmPause()
  battleBgmPlay()
  // Pick random TR Pokemon + trainer
  const trPoke=TR_POKEMON[Math.floor(Math.random()*TR_POKEMON.length)]
  const trainer=TR_TRAINERS[Math.floor(Math.random()*TR_TRAINERS.length)]

    playerHP:3, enemyHP:3,
    attacksDone:0,   // player attacks done this set-of-2

    qIdx:0, answered:false,
    questions: (()=>{ const used=new Set((S.questions||[]).map(q=>q.q)); const fresh=pickQ(cfg.level).filter(q=>!used.has(q.q)); return fresh.length>=4?fresh:pickQ(cfg.level) })(),
  }
  // Build UI
  document.getElementById('tr-battle-bg').style.backgroundImage=`url('${gymBg}')`

    this.src=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${Math.ceil(Math.random()*150)}.png`

  playerPokeEl.onerror=function(){ this.src=playerPoke.src; this.onerror=null }

function updateTRHPDisplay(){

  document.getElementById('tr-player-hp').textContent='❤️'.repeat(Math.max(0,b.playerHP))+'🖤'.repeat(Math.max(0,3-b.playerHP))
}

const TYPE_MOVE_COLORS={fire:'#FF6B35',water:'#4FC3F7',grass:'#4CAF50',electric:'#FFCB05',
  psychic:'#F95587',ghost:'#705898',ice:'#98D8D8',dragon:'#7038F8',dark:'#3a0a5a',
  fighting:'#C03028',rock:'#B8A038',poison:'#A040A0',ground:'#E0C068',bug:'#A8B820',
  steel:'#B8B8D0',normal:'#A8A878',fairy:'#EE99AC',flying:'#A890F0'}
function showMoveSelector(){
  const b=S.trBattle; if(!b) return
  const moves=b.playerPoke.moves||[{name:'Tackle',type:'normal'},{name:'Scratch',type:'normal'},{name:'Quick Attack',type:'normal'},{name:'Swift',type:'normal'}]
  const grid=document.getElementById('tr-move-grid'); grid.innerHTML=''

    btn.innerHTML=`<div style="font-size:clamp(13px,4vw,17px);font-weight:900">${m.name}</div><div style="font-size:10px;opacity:.8;margin-top:2px;text-transform:uppercase;letter-spacing:1px">${m.type}</div>`

      b.selectedMove=m
      document.getElementById('tr-move-wrap').classList.remove('show')

    }

function showAtkName(name, cb){
  const el=document.getElementById('tr-atk-name'); el.textContent=name
  el.classList.add('show'); setTimeout(()=>{ el.classList.remove('show'); setTimeout(cb||function(){},200) },700)
}

function loadTRQuestion(){
  const b=S.trBattle; if(b.answered) return
  const qPool=b.questions; if(!qPool.length) return
  const q=qPool[b.qIdx%qPool.length]; b.qIdx++
  // Show quiz wrap
  document.getElementById('tr-quiz-wrap').style.display=''
  document.getElementById('tr-question').textContent=q.q
  const wrap=document.getElementById('tr-choices'); wrap.innerHTML=''
  const choices=shuffle([q.ans,...q.wrong])
  b.answered=false
  choices.forEach(c=>{
    const btn=document.createElement('button'); btn.className='tr-btn'; btn.textContent=c
    btn.onclick=()=>{
      if(b.answered) return; b.answered=true
      if(c===q.ans){
        btn.classList.add('correct'); sfxCorrect()
        const move=b.selectedMove||{name:'Quick Attack',type:'normal'}
        const atkType=move.type
        const fromEl=document.getElementById('tr-poke-player')
        const toEl=document.getElementById('tr-poke-enemy')
        showAtkName(move.name, ()=>{
          spawnProjectile(fromEl, toEl, atkType, ()=>{
            spawnTypeHitFX(toEl, atkType)
            flashTRPoke('enemy')
            b.enemyHP=Math.max(0,b.enemyHP-1)
            b.attacksDone++
            updateTRHPDisplay()
            showTRLog(`⚔️ ${b.playerPoke.name} pakai ${move.name}! -1 HP`)
            if(b.enemyHP<=0){
              b.attacksDone=0
              setTimeout(()=>trWin(),700)
            } else if(b.attacksDone>=2){
              b.attacksDone=0
              setTimeout(()=>{ trCounterAttack() },700)
            } else {
              setTimeout(()=>{ b.answered=false; showMoveSelector() },800)
            }
          })
        })
      } else {
        btn.classList.add('wrong'); sfxWrong()
        const atkType=b.trPoke.type||'normal'
        const fromEl=document.getElementById('tr-poke-enemy')
        const toEl=document.getElementById('tr-poke-player')
        spawnProjectile(fromEl, toEl, atkType, ()=>{
          spawnTypeHitFX(toEl, atkType)
          flashTRPoke('player')
          b.playerHP=Math.max(0,b.playerHP-1)
          updateTRHPDisplay()
          showTRLog(`💥 ${b.trPoke.name} menyerang balik! -1 HP`)
          if(b.playerHP<=0){ setTimeout(()=>trLose(),700) }
          else { setTimeout(()=>{ b.answered=false; showMoveSelector() },900) }
        })
      }
    }
    wrap.appendChild(btn)
  })
}

function trCounterAttack(){
  const b=S.trBattle
  const atkType=b.trPoke.type||'normal'
  const fromEl=document.getElementById('tr-poke-enemy')
  const toEl=document.getElementById('tr-poke-player')
  spawnProjectile(fromEl, toEl, atkType, ()=>{
    spawnTypeHitFX(toEl, atkType)
    flashScreen('#ef4444'); flashTRPoke('player')
    b.playerHP=Math.max(0,b.playerHP-1)
    updateTRHPDisplay()
    showTRLog(`⚡ ${b.trPoke.name} menyerang balik! -1 HP`)
    sfxHit()
    if(b.playerHP<=0){ setTimeout(()=>trLose(),700) }
    else if(b.enemyHP<=0){ setTimeout(()=>trWin(),400) }
    else { setTimeout(()=>{ b.answered=false; showMoveSelector() },900) }
  })
}

function trBalloonExit(){
  const el=document.getElementById('tr-balloon')
  el.classList.remove('bobbing')
  el.classList.add('exiting')
  // Sparkle burst around balloon
  if(app&&app.stage){
    for(let i=0;i<18;i++){
      setTimeout(()=>{
        burst(S.trBalloonX+65, S.trBalloonY+80, [0xfbbf24,0xffffff,0xf87171][Math.floor(Math.random()*3)], 4)
      }, i*60)
    }
  }
  sfxCollect(); setTimeout(sfxCollect,300); setTimeout(sfxCollect,600)
  setTimeout(()=>{
    el.style.display='none'
    el.classList.remove('exiting')

    const levelDist=500+(cfg.level-1)*300
    const spacing=levelDist/(TR_ENCOUNTERS+1)
    S.trEncounterTriggerDist=S.distance+spacing
    // Safety guard — should not reach here at 0 lives (trLose handles it), but just in case
    if(S.lives<=0){ showLose(); return }
    if(!S.gameOver&&!S.pendingQuizGate) S.paused=false
    updateHUD()
  }, 1800)
}

// ═══════════════════════════════════════════════════════════
//  FX HELPERS
// ═══════════════════════════════════════════════════════════
function burst(x,y,color,count){
  for(let i=0;i<count;i++){
    const dot=new PIXI.Graphics()
    dot.circle(0,0,3+Math.random()*4).fill({color,alpha:.85})
    dot.x=x; dot.y=y
    const angle=Math.random()*Math.PI*2, spd=2+Math.random()*4
    fxContainer.addChild(dot)
    _burstParticles.push({dot, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd, life:22})
  }
}
function updateBurstParticles(){
  for(let i=_burstParticles.length-1;i>=0;i--){
    const p=_burstParticles[i]
    p.life--; p.dot.x+=p.vx; p.dot.y+=p.vy+.2; p.dot.alpha=p.life/22
    if(p.life<=0){ fxContainer.removeChild(p.dot); _burstParticles.splice(i,1) }
  }
}
function spawnFT(text,x,y,color){
  const t=new PIXI.Text({text,style:{fontSize:20,fontWeight:'900',fontFamily:'Fredoka One',fill:color}})
  t.anchor.set(0.5); t.x=x; t.y=y; fxContainer.addChild(t)
  _ftParticles.push({t, life:38})
}
function updateFTParticles(){
  for(let i=_ftParticles.length-1;i>=0;i--){
    const p=_ftParticles[i]
    p.life--; p.t.y-=1.4; p.t.alpha=p.life/38
    if(p.life<=0){ fxContainer.removeChild(p.t); _ftParticles.splice(i,1) }
  }
}
function updateTrailParticles(){
  for(let i=_trailParticles.length-1;i>=0;i--){
    const p=_trailParticles[i]
    p.life--; p.sp.alpha=p.life/12
    if(p.life<=0){ fxContainer.removeChild(p.sp); _trailParticles.splice(i,1) }
  }
}
function updateObsParticles(){
  for(let i=_obsParticles.length-1;i>=0;i--){
    const p=_obsParticles[i]
    if(p.life !== undefined){
      // Motion shard particle: move, gravity, rotate, fade by life
      p.gfx.x += p.vx
      p.gfx.y += p.vy
      p.vy += p.ay
      if(p.vr) p.gfx.rotation += p.vr
      // Floor clamp + bounce: stop sinking past ground
      const _floorY = GROUND_Y - 4
      if(p.gfx.y > _floorY && p.vy > 0){ p.gfx.y = _floorY; p.vy *= -0.4; p.vx *= 0.7 }
      p.life--
      p.alpha = p.life / p.maxLife
      p.gfx.alpha = Math.max(0, p.alpha)
      if(p.life <= 0){ worldContainer.removeChild(p.gfx); _obsParticles.splice(i,1) }
    } else {
      // Legacy fade particle (whole-obstacle gfx fade-out)
      p.alpha-=.08; p.gfx.alpha=p.alpha
      if(p.alpha<=0){ worldContainer.removeChild(p.gfx); _obsParticles.splice(i,1) }
    }
  }
}

function handleJump(){
  if(S.gameOver) return
  ensureAudio()
  if(!S.started){
    S.started=true; S.running=true
    document.getElementById('start-overlay').classList.add('hidden')
    document.getElementById('status-text').textContent=(()=>{ const _p=G23_POKEMON[selectedPokemon]; return (_p.evo ? _p.evo[S.evoStage||0].name : _p.name)+' Berlari!' })()
    bgmStart()
    return
  }
  if(S.paused) return
  if(S.isSliding) return  // can't jump while sliding
  if(S.jumpCount<2){
    const isDouble=S.jumpCount===1
    S.playerVY=isDouble?DBLJ_POWER:JUMP_POWER
    S.jumpCount++; S.isGrounded=false; sfxJump()
    // Visual cue: button shows "2x" badge while a second jump is still available
    const _jb = document.getElementById('jump-btn')
    if(_jb) _jb.classList.toggle('in-air', S.jumpCount === 1)
    // Jump squash animation
    const img=document.getElementById('player-img')
    if(img){ img.classList.remove('jump-anim','land-anim'); void img.offsetWidth; img.classList.add('jump-anim'); setTimeout(()=>img.classList.remove('jump-anim'),180) }
    burst(PLAYER_X,S.playerY,isDouble?0xFBBF24:0xffffff,isDouble?10:3)
    if(isDouble){ burst(PLAYER_X,S.playerY,0xF472B6,6) }
  }
}
function handleSlide(){
  ensureAudio()
  if(!S.started){ handleJump(); return }
  if(!S.running||S.paused||S.gameOver||S.trState==='battle') return
  if(!S.isGrounded||S.isSliding) return
  S.isSliding=true; S.slideTimer=55
  playTone(200,100,'sine',0.08)
}

let _swipeStartY=0
document.addEventListener('pointerdown',e=>{
  // CRITICAL: also exclude #jump-btn — its own pointerdown listener already
  // fires handleJump(). Without this exclusion, document handler ALSO fires
  // → single tap consumes BOTH jumps (jumpCount 0→1→2 in one tap), making
  // double-jump unreachable.
  if(e.target.closest('#quiz-panel')||e.target.closest('#hud-top')||e.target.closest('#btn-back')||e.target.closest('#bag-overlay')||e.target.closest('#pause-overlay')||e.target.closest('#tr-battle')||e.target.closest('#slide-btn')||e.target.closest('#jump-btn')) return
  _swipeStartY=e.clientY
  handleJump()
},{passive:true})
document.addEventListener('pointermove',e=>{
  if(e.buttons===0) return
  if(e.clientY-_swipeStartY>55){ _swipeStartY=e.clientY; handleSlide() }
},{passive:true})
window.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();handleJump()}
  if(e.code==='ArrowDown'||e.code==='KeyS'){e.preventDefault();handleSlide()}
})
// Bind jump/slide buttons via pointerdown — kills the 300ms onclick debounce
// on mobile and lets rapid double-tap fire two distinct handleJump() calls
// (enabling the existing double-jump path at S.jumpCount<2).
;(function _bindActionBtns(){
  const jb = document.getElementById('jump-btn')
  const sb = document.getElementById('slide-btn')
  if(jb) jb.addEventListener('pointerdown', e=>{ e.preventDefault(); handleJump() })
  if(sb) sb.addEventListener('pointerdown', e=>{ e.preventDefault(); handleSlide() })
})()

function togglePause(){
  if(!S.started||S.gameOver||S.trState==='battle') return
  if(S.pendingQuizGate){ document.getElementById('pause-overlay').style.display='none'; document.getElementById('quiz-panel').classList.add('show'); S.paused=true; return }
  S.paused=!S.paused; S.running=!S.paused
  document.getElementById('btn-pause').textContent=S.paused?'▶':'⏸'
  document.getElementById('status-text').textContent=S.paused?'PAUSE':(()=>{ const _p=G23_POKEMON[selectedPokemon]; return (_p.evo ? _p.evo[S.evoStage||0].name : _p.name)+' Berlari!' })()
  document.getElementById('pause-overlay').style.display=S.paused?'flex':'none'
  S.paused ? bgmPause() : bgmResume()
}

function openBag(){
  if(S.started&&!S.paused){ S.paused=true;S.running=false;document.getElementById('btn-pause').textContent='▶'; bgmPause() }
  const grid=document.getElementById('bag-grid'); grid.innerHTML=''
  G23_POKEMON.forEach((p,i)=>{
    const card=document.createElement('div')
    card.style.cssText='display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;border-radius:12px;border:2px solid '+(i===selectedPokemon?'#fbbf24':'rgba(255,255,255,.15)')+';background:'+(i===selectedPokemon?'rgba(251,191,36,.15)':'rgba(255,255,255,.05)')+';cursor:pointer'
    const hdSrc = p.evo ? p.evo[0].hd : p.hd
    const img=document.createElement('img'); img.src=hdSrc; img.style.cssText='width:64px;height:60px;object-fit:contain'
    img.onerror=()=>{ img.src=`https://img.pokemondb.net/sprites/home/normal/${p.name.toLowerCase()}.png`; img.onerror=null }
    card.appendChild(img)
    const nm=document.createElement('div'); nm.style.cssText='font-size:10px;color:#e9d5ff;font-weight:700;text-align:center'; nm.textContent=p.name; card.appendChild(nm)
    if(p.evo && p.evo.length>1){ const evoTag=document.createElement('div'); evoTag.style.cssText='font-size:9px;color:#fbbf24;font-weight:700'; evoTag.textContent=`${p.evo.length}x Evo`; card.appendChild(evoTag) }
    card.onclick=()=>{ applyPokemon(i); closeBag() }
    grid.appendChild(card)
  })
  document.getElementById('bag-overlay').style.display='flex'
}
function closeBag(){
  document.getElementById('bag-overlay').style.display='none'
  if(S.pendingQuizGate){ document.getElementById('quiz-panel').classList.add('show'); S.paused=true; return }
  // Resume game state if no pending quiz and game is in-flight
  if(S.started && !S.gameOver){
    S.paused=false; S.running=true
    document.getElementById('btn-pause').textContent='⏸'
    bgmResume()
  }
}
function goBack(){
  S.running=false; bgmStop(); try{ if(app&&app.ticker) app.ticker.stop() }catch(_){} history.back()
}
window.addEventListener('resize',()=>{
  if(!app) return
  app.renderer.resize(window.innerWidth,window.innerHeight)
  W=app.screen.width; H=app.screen.height
  GROUND_Y=H*0.82; PLAYER_X=W*0.2
  S.playerY=Math.min(S.playerY,GROUND_Y)
})

// ═══════════════════════════════════════════════════════════
//  MAIN GAME LOOP
// ═══════════════════════════════════════════════════════════
//  OBSTACLE EFFECTS
// ═══════════════════════════════════════════════════════════
function updateObstacleEffects(){
  for(const obs of S.obstacles){
    if(obs.hit) continue
    if(obs.glowRing){
      const pulse=0.22+Math.sin(obs.phase*2.6)*0.18
      const dist=obs.x-PLAYER_X
      if(dist<340&&dist>-60){
        const urgency=1-Math.max(0,dist)/340
        obs.glowRing.alpha=pulse+urgency*0.55
        obs.gfx.tint=dist<120?0xFF9898:dist<220?0xFFCCCC:0xFFEEEE
      } else {
        obs.glowRing.alpha=pulse
        obs.gfx.tint=0xFFFFFF
      }
    }
    if(obs.sparks){
      for(const sp of obs.sparks){
        sp.x+=sp.spd; if(sp.x>44) sp.x=-44
        sp.gfx.x=sp.x
        sp.gfx.alpha=0.45+Math.sin(obs.phase*5+sp.x*0.18)*0.55
        sp.gfx.scale.set(0.6+Math.abs(Math.sin(obs.phase*4+sp.x*0.1))*0.8)
      }
    }
  }
}
// ═══════════════════════════════════════════════════════════
//  SPEED LINES
// ═══════════════════════════════════════════════════════════
function updateSpeedLines(dt){
  if(!speedLineGfx) return
  speedLineGfx.clear()
  const ratio=gameSpeed/BASE_SPEED
  if(ratio<1.12) return
  const intensity=Math.min(1,(ratio-1.12)/0.45)
  for(const l of speedLineDeco){
    l.x-=gameSpeed*dt*2.2; if(l.x<-l.len) l.x=W+l.len
    speedLineGfx.moveTo(l.x,l.y).lineTo(l.x-l.len*intensity,l.y)
    speedLineGfx.stroke({color:0xffffff,width:1.5,alpha:l.alpha*intensity})
  }
}
// ═══════════════════════════════════════════════════════════
function gameLoop(ticker){
  S.frame++
  if(!S.running||S.paused||S.gameOver) return
  const dt=Math.min(ticker.deltaTime,2.5)

  S.distance+=gameSpeed*dt*0.08

  // ── Evolution for Pichu chain ──
  const _curPoke = G23_POKEMON[selectedPokemon]
  if(_curPoke.evo && _curPoke.evo.length>1 && !_g23EvolveTrigger){
    const targetDist = 500+(cfg.level-1)*300
    const progress = S.distance/targetDist
    const maxEvo = _curPoke.evo.length-1
    const evoAt = maxEvo>=2 ? (S.evoStage===0 ? 0.38 : 0.72) : 0.5
    if(S.evoStage<maxEvo && progress>=evoAt){
      _g23EvolveTrigger=true
      S.evoStage++
      const nextGif = _curPoke.evo[S.evoStage].gif
      const evoName = _curPoke.evo[S.evoStage].name
      spawnFT(`✨ ${evoName}!`,PLAYER_X,S.playerY-PLAYER_H-30,0xfbbf24)
      setTimeout(()=>{ const img=_getPlayerImg(); img.src=nextGif; _g23EvolveTrigger=false },300)
    }
  }

  // ── Particle pools ──
  updateBurstParticles()
  updateFTParticles()
  updateTrailParticles()
  updateObsParticles()

  // ── Parallax scroll ──
  scrollBgLayers(gameSpeed*dt)

  // ── Player physics ──
  if(!S.isGrounded){
    S.playerVY+=GRAVITY*dt; S.playerVY=Math.min(S.playerVY,MAX_FALL)
    S.playerY+=S.playerVY*dt
    if(S.playerY>=GROUND_Y){
      S.playerY=GROUND_Y; S.playerVY=0; S.isGrounded=true; S.jumpCount=0; S.isSliding=false; sfxLand()
      const _jb=document.getElementById('jump-btn'); if(_jb) _jb.classList.remove('in-air')
      burst(PLAYER_X,GROUND_Y-6,0xD4A574,7); burst(PLAYER_X,GROUND_Y-6,0xffffff,3)
      const img=document.getElementById('player-img')
      if(img){ img.classList.remove('jump-anim','land-anim'); void img.offsetWidth; img.classList.add('land-anim'); setTimeout(()=>img.classList.remove('land-anim'),220) }
    }
  } else {
    S.playerY=GROUND_Y+Math.sin(S.frame*.3)*1.6  // subtle bob while running
    if(S.isSliding){ S.slideTimer-=dt; if(S.slideTimer<=0){ S.isSliding=false } }
  }

  // ── Clouds ──
  for(const cl of cloudGfx){ cl.x-=gameSpeed*.22*dt; if(cl.x<-80) cl.x=W+80 }

  // ── Ground deco ──
  for(const d of groundDeco){ d.x-=gameSpeed*dt; if(d.x<-20) d.x+=W*2.5 }

  // ── Spawn obstacles ──
  S.obstacleCooldown-=dt
  if(S.obstacleCooldown<=0&&S.obstacles.filter(o=>!o.hit).length<4){
    S.obstacleCooldown=Math.max(42,100+Math.random()*80-(cfg.level-1)*2)
    spawnObstacle()
  }
  // ── Scroll obstacles ──
  for(const obs of S.obstacles){
    if(obs.hit) continue
    obs.x-=gameSpeed*dt; obs.gfx.x=obs.x
    if(obs.isQuiz&&obs.ring){ obs.ringPhase=(obs.ringPhase||0)+.06; obs.ring.alpha=.4+Math.sin(obs.ringPhase)*.35; obs.ring.scale.set(1+Math.sin(obs.ringPhase)*.06) }
    if(obs.lane==='high'){ obs.phase+=0.05; obs.gfx.y=obs.gfxY+Math.sin(obs.phase)*9 }
    if(obs.lane==='mid')  { obs.phase+=0.04; obs.gfx.y=obs.gfxY+Math.sin(obs.phase)*4 }
    else { obs.phase+=0.03 }
  }
  updateObstacleEffects()
  S.obstacles=S.obstacles.filter(o=>{ if(o.x<-200&&!o.hit){ worldContainer.removeChild(o.gfx); return false } return true })

  // ── Spawn power-ups ──
  S.puCooldown-=dt
  if(S.puCooldown<=0&&S.powerUpItems.length<2){ S.puCooldown=900+Math.random()*500; spawnPowerUp() }
  for(const pu of S.powerUpItems){ pu.x-=gameSpeed*dt; pu.phase+=.06; pu.gfx.x=pu.x; pu.gfx.y=GROUND_Y-72+Math.sin(pu.phase)*10; pu.gfx.rotation+=.022; if(pu.x<-60){pu.collected=true;worldContainer.removeChild(pu.gfx)} }
  S.powerUpItems=S.powerUpItems.filter(p=>!p.collected)

  // ── TR Balloon ──
  checkTRTrigger()
  updateTRBalloon()

  // ── Aura ──
  updateAura()

  // ── Projectiles ──
  updateProjectiles()

  // ── Collision ──
  checkCollisions()

  // ── Player img sync ──
  syncPlayerPos()

  // ── HUD ──
  if(S.frame%30===0) updateHUD()

  // ── Speed lines ──
  updateSpeedLines(dt)

  // ── Level end ──
  if(S.distance>=500+(cfg.level-1)*300&&S.quizDone>=TOTAL_QUIZ) showWin()
}
</script>
